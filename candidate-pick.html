<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose your interview time</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card: rgba(20, 28, 47, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: linear-gradient(135deg, #4f46e5, #6366f1);
            --text: #fff;
            --muted: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }
        h2 { margin: 0 0 8px; font-size: 24px; text-align: center; }
        p.sub { color: var(--muted); font-size: 14px; text-align: center; margin: 0 0 24px; line-height: 1.5; }
        .slot-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .slot-btn:hover {
            border-color: #6366f1;
            background: rgba(79, 70, 229, 0.2);
        }
        .slot-btn.selected {
            border-color: #818cf8;
            background: rgba(79, 70, 229, 0.35);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.35);
        }
        button.confirm {
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        button.confirm:disabled { opacity: 0.4; cursor: not-allowed; }
        .err { color: #f87171; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Choose interview time</h2>
        <p class="sub">Pick one option below. Weekdays proposed by your interviewer.</p>
        <div id="slots"></div>
        <p class="err" id="err" hidden></p>
        <button type="button" class="confirm" id="confirmBtn" disabled onclick="submitChoice()">Confirm this slot</button>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const resumeUrl = params.get('resumeUrl');
        const N8N_PUBLIC_ORIGIN = 'https://randy-gaunt-bradley.ngrok-free.dev';
        let slots = [];

        function isLocalResumeUrl(url) {
            if (!url) return false;
            try {
                const h = new URL(url, window.location.origin).hostname;
                return h === 'localhost' || h === '127.0.0.1' || h === '::1';
            } catch (e) {
                return /localhost|127\.0\.0\.1/i.test(url);
            }
        }

        function resolveResumeUrl(raw) {
            if (!raw || !isLocalResumeUrl(raw) || isLocalResumeUrl(window.location.href)) return raw;
            const base = String(N8N_PUBLIC_ORIGIN || '').replace(/\/+$/, '');
            return base ? raw.replace(/^https?:\/\/[^/]+/i, base) : raw;
        }
        let chosen = null;

        try {
            const raw = params.get('slots_json');
            if (raw) slots = JSON.parse(decodeURIComponent(raw));
        } catch (e) {
            document.getElementById('err').hidden = false;
            document.getElementById('err').textContent = 'Invalid slot data. Use the link from your email.';
        }

        const wrap = document.getElementById('slots');
        if (!slots.length) {
            document.getElementById('err').hidden = false;
            document.getElementById('err').textContent = 'No time options found. Open the link from your email.';
        } else {
            slots.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'slot-btn';
                btn.textContent = s.label || s.start_iso;
                btn.onclick = () => {
                    chosen = s;
                    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    document.getElementById('confirmBtn').disabled = false;
                };
                wrap.appendChild(btn);
            });
        }

        const SUCCESS_PAGE = 'https://talent-acquisition-six.vercel.app/scheduling-success.html';

        async function resumeWorkflow(url) {
            const headers = { 'ngrok-skip-browser-warning': '1' };
            let res;
            try {
                res = await fetch(url, { method: 'GET', cache: 'no-store', headers });
            } catch (networkErr) {
                throw new Error(
                    'Could not reach n8n (network/CORS). Keep ngrok running and retry.'
                );
            }
            const ct = (res.headers.get('content-type') || '').toLowerCase();
            if (res.ok || res.status === 204 || res.status === 302) {
                if (ct.includes('text/html')) {
                    const snippet = (await res.text()).slice(0, 500);
                    if (/ngrok|Visit Site|ERR_NGROK/i.test(snippet)) {
                        throw new Error('ngrok blocked the resume call — use a fresh email link and retry.');
                    }
                }
                return;
            }
            throw new Error('n8n returned HTTP ' + res.status);
        }

        async function submitChoice() {
            if (!resumeUrl || !chosen?.start_iso) {
                alert('Missing resume link or selection.');
                return;
            }

            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = 'Confirming…';

            const effectiveResume = resolveResumeUrl(resumeUrl);
            const sep = effectiveResume.includes('?') ? '&' : '?';
            const q = new URLSearchParams();
            q.set('chosen_start_iso', chosen.start_iso);
            if (chosen.end_iso) q.set('chosen_end_iso', chosen.end_iso);
            const webhookUrl = effectiveResume + sep + q.toString();

            try {
                await resumeWorkflow(webhookUrl);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Confirm this slot';
                alert((err && err.message) || 'Could not resume n8n workflow. Try again.');
                return;
            }

            const label = encodeURIComponent(chosen.label || chosen.start_iso);
            window.location.replace(SUCCESS_PAGE + '?role=candidate&label=' + label);
        }
    </script>
</body>
</html>
