<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose your interview time — CONVO</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <link rel="stylesheet" href="portal-ui.css" />
    <link rel="stylesheet" href="ui-polish.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scheduling-portal.js"></script>
</head>
<body class="convo-body convo-portal-layout">
    <nav class="convo-nav">
        <a href="careers.html" class="convo-nav-brand"><span class="convo-nav-logo">CONVO</span><span class="convo-nav-tag">Scheduling</span></a>
    </nav>
    <main class="convo-portal-main">
        <div class="convo-portal-card">
            <h2>Choose interview time</h2>
            <p class="subtitle">Pick one option below. Weekdays proposed by your interviewer.</p>
            <p class="portal-status-pill" id="rolePill" hidden></p>
            <div class="convo-slot-list" id="slots"></div>
            <p class="load-err" id="err" hidden></p>
            <button type="button" class="convo-portal-btn" id="confirmBtn" disabled onclick="submitChoice()">Confirm this slot</button>
        </div>
    </main>
    <script>
        const SP = window.SchedulingPortal;
        const sessionId = SP.parseSessionId();
        let sessionRow = null;
        let slots = [];
        let chosen = null;

        const wrap = document.getElementById('slots');
        const errEl = document.getElementById('err');

        function showErr(msg) {
            errEl.hidden = false;
            errEl.textContent = msg;
            document.getElementById('confirmBtn').disabled = true;
        }

        function renderSlots(list) {
            wrap.innerHTML = '';
            list.forEach((s) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'convo-slot-item';
                btn.textContent = s.label || s.start_iso;
                btn.onclick = () => {
                    chosen = s;
                    document.querySelectorAll('.convo-slot-item').forEach((b) => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    document.getElementById('confirmBtn').disabled = false;
                };
                wrap.appendChild(btn);
            });
        }

        async function init() {
            if (!sessionId) {
                const legacy = new URLSearchParams(window.location.search).get('resumeUrl');
                showErr(
                    legacy
                        ? 'This is an old scheduling link. Open the latest email from the hiring team (?session= link).'
                        : 'Missing session in URL. Open the link from your email.'
                );
                return;
            }
            try {
                sessionRow = await SP.loadSession(sessionId);
                slots = sessionRow.proposed_slots || [];
                if (!slots.length) {
                    showErr('No time options yet. Your interviewer has not proposed slots — check back soon.');
                    return;
                }
                const pill = document.getElementById('rolePill');
                pill.hidden = false;
                pill.style.textAlign = 'center';
                pill.textContent = sessionRow.role || 'Interview scheduling';
                renderSlots(slots);
            } catch (err) {
                showErr((err && err.message) || 'Could not load scheduling options.');
            }
        }

        async function submitChoice() {
            if (!sessionId || !chosen?.start_iso) {
                alert('Please select a time slot.');
                return;
            }

            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            try {
                await SP.saveChosenSlot(sessionId, chosen);
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Confirm this slot';
                alert((err && err.message) || 'Could not save your choice.');
                return;
            }

            btn.textContent = 'Confirming…';
            await SP.notifyConfirmed(sessionId);

            SP.goSuccess('candidate', {
                label: chosen.label || chosen.start_iso,
            });
        }

        init();
    </script>
</body>
</html>
