                                    </div>
                    {dims.length ? (
                        <div className="grid sm:grid-cols-2 gap-3">

        const PhaseReviewCard = ({ item, techMax, speechIndex, speechTotal, totalPhases }) => {
            const isSpeech = isSpeechHistoryItem(item, techMax);
            const phaseLabel = `Phase ${item.phase} of ${totalPhases}`;
            const voiceLabel = speechTotal > 0 ? `Voice Q${speechIndex} of ${speechTotal}` : `Voice Q${speechIndex}`;
            const hasAnswer = Boolean(String(item.answer_text || '').trim());
            return (
                <article className={`review-card panel rounded-2xl p-6 sm:p-8 animate-fade-up ${isSpeech ? 'border-l-4 border-l-indigo-500 border border-slate-200' : 'border border-slate-200'}`}>
                    <div className="flex flex-wrap items-center justify-between gap-3 mb-5 pb-4 border-b border-slate-100">
                        <div className="flex flex-wrap items-center gap-2">
                            <span className={`badge ${isSpeech ? 'bg-indigo-50 text-indigo-700 border border-indigo-200' : 'badge-accent'}`}>
                                {phaseLabel}
                            </span>
                            {isSpeech ? (
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-500">
                                    {voiceLabel}
                                </span>
                            ) : null}
                        </div>
                        {isSpeech ? (
                            // Speech is scored ONCE overall (see the summary card above),
                            // never per question — so no per-question score badge here.
                            null
                        ) : item.score !== '—' && Number.isFinite(Number(item.score)) ? (
                            <div className="text-right">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Score</p>
                                <p className={`text-xl font-bold tabular-nums ${scoreTone(item.score)}`}>{item.score}<span className="text-sm text-slate-500 font-medium">/100</span></p>
                            </div>
                        ) : (
                            <span className="text-lg font-bold tabular-nums text-slate-500">—</span>
                        )}
                    </div>
                    <div className="grid gap-5">
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">Question</p>
                            <p className="text-sm text-slate-800 leading-relaxed whitespace-pre-wrap">{item.question_text}</p>
                        </div>
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">
                                {isSpeech ? 'Voice response' : 'Your answer'}
                            </p>
                            <p className={`text-sm leading-relaxed whitespace-pre-wrap panel-elevated rounded-xl p-4 ${isSpeech ? 'text-slate-600 italic' : (hasAnswer ? 'text-slate-700' : 'text-slate-400 italic')}`}>
                                {isSpeech
                                    ? (hasAnswer && !/^\[(no spoken|no speech)/i.test(String(item.answer_text || ''))
                                        ? 'Voice recorded — scored from audio at end of interview.'
                                        : 'No voice captured for this question.')
                                    : (hasAnswer ? item.answer_text : '—')}
                            </p>
                            {isSpeech ? (
                                <p className="text-[11px] text-slate-500 mt-2">Voice-based assessment only — no transcript is stored.</p>
                            ) : null}
                        </div>
                        {isSpeech ? <SpeechPhaseInsights item={item} /> : null}
                        {item.feedback && item.feedback !== '—' && (
                            <div className="rounded-xl border border-amber-200 bg-amber-50/80 p-4">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-amber-700 mb-2">Evaluator feedback</p>
                                <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{item.feedback}</p>
                            </div>

                        {!isSpeech && item.suggested_answer && item.suggested_answer !== '—' && (
                            <div className="rounded-xl border border-slate-200 bg-slate-50 p-4">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">Reference answer</p>
                                <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{item.suggested_answer}</p>
                            </div>
                        )}
                                </div>
                            </article>
            );
        };

        const pickLatestFeedback = (history, fallback = '') => {
            if (fallback && String(fallback).trim() && fallback !== 'Assessment completed.') {
                return String(fallback).trim();
            }
            if (!Array.isArray(history) || history.length === 0) return '';
            for (let i = history.length - 1; i >= 0; i--) {
                const f = history[i].feedback;
                if (f && String(f).trim() && f !== '—') return String(f).trim();
            }
            return '';
        };

        const FinishedView = ({ result, overallScore, feedback, onReview, isLoading, sessionId, supabase, onExitPortal }) => {
            const passed = result === 'PASS';
            const scoreNum = Number(overallScore);
            const showScore = Number.isFinite(scoreNum);
            const [schedState, setSchedState] = useState('idle');
            const [slotCount, setSlotCount] = useState(0);
            const [schedWaitMode, setSchedWaitMode] = useState('choose');
            const [scoreBreakdown, setScoreBreakdown] = useState({ technical: null, speech: null });

            useEffect(() => {
                if (!sessionId || !supabase) return undefined;
                let cancelled = false;
                supabase
                    .from('assessment_sessions')
                    .select('technical_score, speech_score')
                    .eq('id', sessionId)
                    .maybeSingle()
                    .then(({ data }) => {
                        if (cancelled || !data) return;
                        setScoreBreakdown({
                            technical: data.technical_score != null ? Number(data.technical_score) : null,
                            speech: data.speech_score != null ? Number(data.speech_score) : null,
                        });
                    })
                    .catch(() => {});
                return () => { cancelled = true; };
            }, [sessionId, supabase]);

            useEffect(() => {
                if (!passed || !sessionId || !supabase) return undefined;
                let cancelled = false;

                const poll = async () => {
                    try {
                        const { data, error } = await supabase
                            .from('assessment_sessions')
                            .select('scheduling_status, proposed_slots, chosen_slot')
                            .eq('id', sessionId)
                            .maybeSingle();
                        if (cancelled || error || !data) return;

                        const rawSlots = data.proposed_slots;
                        const slots = Array.isArray(rawSlots)
                            ? rawSlots
                            : (typeof rawSlots === 'string'
                                ? (() => { try { return JSON.parse(rawSlots); } catch (_) { return []; } })()
                                : []);

                        if (data.chosen_slot || data.scheduling_status === 'confirmed') {
                            setSchedState('confirmed');
                            return;
                        }
                        if (slots.length > 0 || data.scheduling_status === 'slots_proposed' || data.scheduling_status === 'candidate_invited') {
                            setSchedState('slots_ready');
                            setSlotCount(slots.length);
                            return;
                        }
                        setSchedState('waiting_interviewer');
                    } catch (_) {}
                };

                poll();
                const timer = setInterval(poll, 8000);
                return () => { cancelled = true; clearInterval(timer); };
            }, [passed, sessionId, supabase]);

            const candidatePickUrl = sessionId
                ? `https://talent-acquisition-six.vercel.app/candidate-pick.html?session=${encodeURIComponent(sessionId)}`
                : '';

            return (
            <Shell subtitle="Assessment complete">
                <PortalPage size="narrow">
                    <div className={`result-hero-gradient px-5 sm:px-8 xl:px-10 pt-6 sm:pt-8 pb-6 text-center border-b border-slate-100 ${passed ? '' : ''}`}>
                            <div className={`w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-4 rounded-2xl flex items-center justify-center animate-float ${passed ? 'bg-emerald-100 border border-emerald-200 shadow-sm' : 'bg-slate-100 border border-slate-200'}`}>
                                {passed ? (
                                    <svg className="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7" /></svg>
                                ) : (
                                    <svg className="w-10 h-10 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                )}
                            </div>
                            <span className={`badge mb-4 ${passed ? 'badge-success' : 'badge-warning'}`}>
                                {passed ? 'Proceed to next stage' : 'Under review'}
                            </span>
                            {showScore && (
                                <p className={`text-4xl sm:text-5xl font-bold tabular-nums mb-1 animate-fade-up ${scoreTone(scoreNum)}`}>
                                    {Math.round(scoreNum)}<span className="text-lg sm:text-xl text-slate-400 font-semibold">/100</span>
                                </p>
                            )}
                            {(Number.isFinite(scoreBreakdown.technical) || Number.isFinite(scoreBreakdown.speech)) && (
                                <div className="flex flex-wrap justify-center gap-2 mt-3 mb-1 stagger-2">
                                    {Number.isFinite(scoreBreakdown.technical) ? (
                                        <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/80 border border-slate-200 text-xs font-semibold text-slate-600">
                                            Technical <span className="text-blue-600 tabular-nums">{Math.round(scoreBreakdown.technical)}</span>
                                        </span>
                                    ) : null}
                                    {Number.isFinite(scoreBreakdown.speech) ? (
                                        <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/80 border border-slate-200 text-xs font-semibold text-slate-600">
                                            Voice <span className="text-indigo-600 tabular-nums">{Math.round(scoreBreakdown.speech)}</span>
                                        </span>
                                    ) : null}
                                </div>
                            )}
                            <h1 className="text-2xl font-bold text-slate-900 mb-2 tracking-tight stagger-2">
                                {passed ? 'Strong performance' : 'Thank you for completing'}
                            </h1>
                            <p className="text-sm text-slate-600 leading-relaxed max-w-md mx-auto stagger-3">
                                {passed
                                    ? 'You met the screening bar. Next step: pick your interview time as soon as slots are ready.'
                                    : 'Your responses have been recorded. The hiring team will review your submission.'}
                            </p>
                        </div>

                        <div className="px-6 sm:px-8 xl:px-10 py-6 sm:py-8 space-y-5">
                        {passed && sessionId && (
                            <div className="text-left p-5 rounded-2xl border border-emerald-200 bg-emerald-50/80 stagger-3">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-emerald-700 mb-2">Interview scheduling</p>
                                {schedState === 'slots_ready' ? (
                                    <>
                                        <p className="text-sm text-slate-700 mb-4">
                                            {slotCount} time option{slotCount === 1 ? '' : 's'} ready — choose one now.
                                        </p>
                                        <a
                                            href={candidatePickUrl}
                                            className="btn-primary w-full py-3 rounded-xl text-sm inline-flex items-center justify-center no-underline"
                                        >
                                            Pick interview time
                                        </a>
                                    </>
                                ) : schedState === 'confirmed' ? (
                                    <p className="text-sm text-slate-700">
                                        Your interview time is confirmed. Check your email for calendar details.
                                    </p>
                                ) : schedWaitMode === 'choose' ? (
                                    <>
                                        <p className="text-sm text-slate-700 mb-4">
                                            We notified your interviewer. They may send time options soon — choose how you would like to proceed.
                                        </p>
                                        <div className="flex flex-col gap-3">
                                            <button
                                                type="button"
                                                onClick={() => setSchedWaitMode('active_wait')}
                                                className="btn-primary w-full py-3 rounded-xl text-sm"
                                            >
                                                I&apos;ll keep waiting here
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => {
                                                    if (typeof onExitPortal === 'function') onExitPortal();
                                                }}
                                                className="btn-secondary w-full py-3 rounded-xl text-sm"
                                            >
                                                Email me when slots are ready
                                            </button>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-3 leading-relaxed">
                                            If you choose email, you can close this portal — we will notify you when it is time to pick a slot.
                                        </p>
                                    </>
                                ) : (
                                    <>
                                        <p className="text-sm text-slate-700 mb-3">
                                            Waiting for your interviewer to propose interview times. This page will update automatically.
                                        </p>
                                        <div className="flex items-center gap-2 text-xs text-slate-500 mb-4">
                                            <span className="w-3 h-3 border-2 border-emerald-200 border-t-emerald-600 rounded-full animate-spin" />
                                            Checking for slots…
                                        </div>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                if (typeof onExitPortal === 'function') onExitPortal();
                                            }}
                                            className="btn-secondary w-full py-2.5 rounded-xl text-xs"
                                        >
                                            Close portal — notify me by email
                                        </button>
                                    </>
                                )}
                            </div>
                        )}
                        {feedback && String(feedback).trim() && feedback !== 'Assessment completed.' && (
                            <div className="text-left p-5 rounded-2xl border border-indigo-100 bg-indigo-50/60 stagger-4">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-700 mb-2">Evaluator notes</p>
                                <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{feedback}</p>
                            </div>
                        )}
                        <button
                            type="button"
                            onClick={onReview}
                            disabled={isLoading}
                            className="btn-primary w-full py-3.5 rounded-xl text-sm inline-flex items-center justify-center gap-2 disabled:opacity-60 stagger-4"
                        >
                            {isLoading ? (
                                <>
                                    <span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin" />
                                    Loading review…
                                </>
                            ) : (
                                <>
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                            Review responses and notes
                                </>
                            )}
                        </button>
                        </div>
                </PortalPage>
            </Shell>
        );
        };

        const ReviewView = ({ history, onBack, overallFeedback, sessionConfig }) => {
            const techMax = inferTechPhaseCount(history);
            const totalPhases = inferTotalPhaseCount(history, sessionConfig);
            const speechTotal = Number(sessionConfig?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const technicalRows = history.filter((item) => !isSpeechHistoryItem(item, techMax));
            const speechRows = history.filter((item) => isSpeechHistoryItem(item, techMax));

            const renderSection = (title, subtitle, rows, badgeClass, isSpeechSection = false) => {
                if (!rows.length) return null;
                return (
                    <div className="space-y-4">
                        <div className="flex items-end justify-between gap-3 pt-2">
                            <div>
                                <h3 className="text-lg font-semibold text-slate-900">{title}</h3>
                                <p className="text-sm text-slate-500 mt-0.5">{subtitle}</p>
                            </div>
                            <span className={`badge ${badgeClass}`}>
                                {isSpeechSection
                                    ? `${rows.length} of ${speechTotal} voice question${speechTotal === 1 ? '' : 's'}`
                                    : `${rows.length} question${rows.length === 1 ? '' : 's'}`}
                            </span>
                        </div>
                        <div className="space-y-5">
                            {rows.map((item, index) => (
                                <PhaseReviewCard
                                    key={`${item.phase}-${index}`}
                                    item={item}
                                    techMax={techMax}
                                    speechIndex={isSpeechSection ? index + 1 : 0}
                                    speechTotal={isSpeechSection ? speechTotal : 0}
                                    totalPhases={totalPhases}
                                />
                        ))}
                    </div>
                    </div>
                );
            };

            return (
            <Shell subtitle="Response review">
                <div className="max-w-4xl mx-auto px-3 sm:px-5 lg:px-8 py-5 sm:py-8 fade-in">
                    <div className="rounded-3xl border border-slate-200 bg-white shadow-card overflow-hidden mb-8 animate-scale-in">
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 px-5 sm:px-7 py-6 text-white">
                            <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
                                <div>
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-blue-100 mb-2">Assessment review</p>
                                    <h2 className="text-2xl sm:text-3xl font-bold tracking-tight">Your responses</h2>
                                    <p className="text-sm text-blue-100/90 mt-2">Technical answers and your overall voice communication summary.</p>
                                </div>
                                <button type="button" onClick={onBack} className="bg-white/15 hover:bg-white/25 border border-white/25 text-white px-5 py-2.5 rounded-xl text-sm self-start sm:self-auto transition-all duration-200">
                                    Back to results
                                </button>
                            </div>
                        </div>
                    </div>

                    {overallFeedback && (
                        <div className="panel rounded-2xl p-6 mb-8 border border-indigo-100 bg-indigo-50/40 animate-slide-up">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-700 mb-2">Overall feedback</p>
                            <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{overallFeedback}</p>
                        </div>
                    )}

                    <SpeechSummaryCard speechRows={speechRows} />

                    {history.length === 0 ? (
                        <div className="panel rounded-2xl p-12 text-center text-slate-500 text-sm">
                            No response history for this session.
                        </div>
                    ) : (
                        <div className="space-y-10">
                            {renderSection(
                                'Written technical assessment',
                                'Typed answers from Phase 1',
                                technicalRows,
                                'badge-accent'
                            )}
                            {/* Voice round is transcription-free and scored as one
                                overall average — shown via SpeechSummaryCard above,
                                no per-question breakdown. */}
                        </div>
                    )}

                    <div className="text-center py-12 mt-8">
                        <button type="button" onClick={() => window.location.reload()} className="btn-secondary px-8 py-3 rounded-xl text-sm hover:shadow-soft transition-all">
                            Exit portal
                        </button>
                    </div>
                </div>
            </Shell>
        );
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [sessionId, setSessionId] = useState('');
            const [candidateEmail, setCandidateEmail] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [currentStep, setCurrentStep] = useState(1);
            const [totalSteps, setTotalSteps] = useState(ASSESSMENT_PHASE_DEFAULTS.tech);
            const [assessmentMode, setAssessmentMode] = useState('text');
            const [speechTotalSteps, setSpeechTotalSteps] = useState(ASSESSMENT_PHASE_DEFAULTS.speech);
            const [techMaxSteps, setTechMaxSteps] = useState(ASSESSMENT_PHASE_DEFAULTS.tech);
            const [pendingSpeechIntro, setPendingSpeechIntro] = useState(null);
            const [liveSpeechContext, setLiveSpeechContext] = useState(null);
            const [timeLeft, setTimeLeft] = useState(null);
            const [phaseTimeLimit, setPhaseTimeLimit] = useState(null);
            const deadlineAtRef = useRef(null);
            const pendingSpeechTimerRef = useRef(null);
            const [speechTimerReady, setSpeechTimerReady] = useState(false);
            const [question, setQuestion] = useState('');
            const [answer, setAnswer] = useState('');
            const [result, setResult] = useState(null);
            const [overallScore, setOverallScore] = useState(null);
            const [feedback, setFeedback] = useState('');
            const [integrityViolationCount, setIntegrityViolationCount] = useState(0);
            const [assessmentHistory, setAssessmentHistory] = useState([]);
            const [sessionConfig, setSessionConfig] = useState({});
            const [urlEntryError, setUrlEntryError] = useState('');
            const [linkSessionReady, setLinkSessionReady] = useState(false);
            const [proctorStreams, setProctorStreams] = useState(null);

            const viewRef = useRef(view);
            const sessionIdRef = useRef(sessionId);
            const candidateEmailRef = useRef(candidateEmail);
            const currentStepRef = useRef(currentStep);
            const integrityViolationCountRef = useRef(0);
            const terminatingRef = useRef(false);
            const lastViolationAtRef = useRef(0);
            const lastTabLogAtRef = useRef(0);
            const devToolsOpenRef = useRef(false);
            const escExitRef = useRef(false);
            const fullscreenRestoreInProgressRef = useRef(false);
            const fullscreenRequiredRef = useRef(false);
            const devToolsWarnedRef = useRef(false);
            const debuggerCheckCounterRef = useRef(0);
            const proctorStreamsRef = useRef(null);
            const proctorWatchCleanupRef = useRef([]);
            const cameraGraceTimerRef = useRef(null);
            const cameraGraceActiveRef = useRef(false);
            const [cameraGraceSecondsLeft, setCameraGraceSecondsLeft] = useState(null);
            const [cameraGraceBusy, setCameraGraceBusy] = useState(false);
            const [fullscreenRequired, setFullscreenRequired] = useState(false);
            const [devToolsDetected, setDevToolsDetected] = useState(false);

            const isSecurityActive = useCallback(() => (
                !PROCTORING_DISABLED &&
                (isPortalLockedView(viewRef.current) || fullscreenRequiredRef.current)
            ), []);

            const runDevToolsProbe = useCallback(() => {
                debuggerCheckCounterRef.current += 1;
                let open = isDevToolsLikelyOpen();
                if (!open && viewRef.current === 'assessment' && debuggerCheckCounterRef.current % 3 === 0) {
                    open = isDevToolsLikelyOpenByDebugger();
                }
                return open;
            }, []);

                setIsLoading(true);
                try {
                    await enterAssessmentFullscreen();
                    const overrideOk = typeof overrideSessionId === 'string' && overrideSessionId.trim().length >= 10;
                    const activeSessionId = String(
                        (overrideOk ? overrideSessionId : null) ||
                        sessionIdRef.current ||
                        sessionId ||
                        ''
                    ).trim();
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(activeSessionId);
                    let query = supabase.from('assessment_sessions').select('id, interview_history, max_phases, screening, config, assessment_stage, current_phase, status');
                    if (isUuid) {
                        query = query.eq('id', activeSessionId);
                                        } else {
                        query = query.eq('gmail_thread_id', activeSessionId);
                    }
                    const { data, error } = await query.maybeSingle();

                    if (error) throw error;
                    if (!data) throw new Error('Session not found');

                    const block = getPortalSessionBlockReason(data);
                    if (block.blocked) {
                        if (isSessionStartedPortal(data.interview_history) && !isSessionFullyComplete(data)) {
                            await markSessionAbandoned(supabase, data.id);
                        }
                        throw new Error(block.message);
                    }

                    const history = buildHistoryFromSession(data);

                    let resume = resolveResumeTarget(history, data);
                    if (resume && Number(resume.phaseNum) > 1) {
                        throw new Error(
                            'You left this assessment before finishing. Resuming is not allowed for this session. Please contact your recruiter if you need help.'
                        );
                    }

                    const resolvedId = data.id || activeSessionId;

                    if (!resume?.questionText) {
                        const dbPhase = Number(data.current_phase) || 1;
                        const fromDb = await pollNextQuestionFromSession(resolvedId, dbPhase, 4, 500);
                        if (fromDb?.nextQuestion) {
                            const phaseIndex = history.findIndex((h) => Number(h.phase) === dbPhase);
                            resume = {
                                phaseIndex: phaseIndex >= 0 ? phaseIndex : Math.max(0, history.length - 1),
                                phaseNum: dbPhase,
                                row: phaseIndex >= 0 ? history[phaseIndex] : {},
                                questionText: fromDb.nextQuestion,
                                time_limit_seconds: fromDb.time_limit_seconds,
                                deadline_at: fromDb.deadline_at,
                            };
                        }
                    }

                    if (!resume?.questionText) {
                        const cfg = parseSessionConfig(data?.config);
                        const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
                        const stage = String(data?.assessment_stage || '').toLowerCase();
                        const speechPhase = Number(data.current_phase) || maxQ + 1;
                        if (stage === 'speech' || speechPhase > maxQ) {
                            const phaseIndex = history.findIndex((h) => Number(h.phase) === speechPhase);
                            resume = {
                                phaseIndex: phaseIndex >= 0 ? phaseIndex : history.length - 1,
                                phaseNum: speechPhase,
                                row: phaseIndex >= 0 ? history[phaseIndex] : {},
                                questionText: buildClientSpeechFallback(cfg, speechPhase - maxQ),
                            };
                        }
                    }

                    if (!resume?.questionText) {
                        throw new Error('No initial question found in session history.');
                    }

                    const { phaseIndex, phaseNum, row: currentPhaseData, questionText } = resume;

                    setQuestion('');
                    setAnswer('');
                    const modeInfo = resolveAssessmentMode(data, phaseNum, currentPhaseData);
                    setAssessmentMode(modeInfo.mode);
                    setTechMaxSteps(modeInfo.techMaxSteps);
                    setSpeechTotalSteps(modeInfo.speechTotalSteps);
                    setTotalSteps(modeInfo.totalSteps);
                    setCurrentStep(phaseNum);
                    setIntegrityViolationCount(0);
                    integrityViolationCountRef.current = 0;
                    lastProctorQuestionRef.current = 0;
                    terminatingRef.current = false;
                    lastViolationAtRef.current = 0;
                    devToolsOpenRef.current = false;

                    setSessionId(resolvedId);
                        sessionStorage.setItem('current_session_id', resolvedId);
                    sessionStorage.setItem('candidate_email', candidateEmailRef.current || candidateEmail || '');
                    sessionStorage.setItem('assessment_started', 'true');

                    try {
                        await startPhaseTimerInDatabase(resolvedId, history, phaseIndex);
                    } catch (timerErr) {
                        console.warn('Timer sync failed — using local timer', timerErr);
                        applyTimerFromPhase({
                            ...currentPhaseData,
                            time_limit_seconds: resume.time_limit_seconds ?? getAiTimeLimitSeconds(currentPhaseData) ?? 240,
                            deadline_at: resume.deadline_at ?? currentPhaseData?.deadline_at,
                        });
                    }

                    if (modeInfo.mode === 'speech' && phaseNum === modeInfo.techMaxSteps + 1) {
                        setPendingSpeechIntro({
                            nextQuestion: questionText,
                            speechPhases: modeInfo.speechTotalSteps,
                            time_limit_seconds: resume.time_limit_seconds ?? currentPhaseData?.time_limit_seconds,
                            deadline_at: resume.deadline_at ?? currentPhaseData?.deadline_at,
                        });
                        setView('speech-intro');
                        return;
                    }

                    setView('assessment');

                    // Defer Q1 text so the same loading → reveal flow runs as later questions.
                    requestAnimationFrame(() => {
                        setTimeout(() => setQuestion(questionText), 60);
                    });
                } catch (e) {
                    console.error('Start Assessment Error:', e);
                    alert(e?.message || 'Failed to load the first question. Please refresh or re-open the link from your email.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleBeginFromInstructions = () => {
                if (PROCTORING_DISABLED) {
                    handleStartAssessment();
                    return;
                }
                setView('proctoring-setup');
            };

            const handleProctoringComplete = (streams) => {
                proctorStreamsRef.current = streams;
                setProctorStreams(streams);
                setupProctorWatchers(streams);
                if (window.TA_PROCTOR_ACTIVITY && sessionIdRef.current) {
                    window.TA_PROCTOR_ACTIVITY.start({
                        sessionId: sessionIdRef.current,
                        portalBase: window.location.origin,
                        getPhase: () => currentStepRef.current,
                        getStreams: () => proctorStreamsRef.current,
                    });
                }
                handleStartAssessment();
            };

            const urlEnterRanRef = useRef(false);
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const urlSession = cleanUrlParam(params.get('session'));
                const urlEmail = cleanUrlParam(params.get('email')) || '';
                const urlJob = cleanUrlParam(params.get('job')) || '';

                if (urlEnterRanRef.current) return;
                if (!urlSession && !(urlEmail && urlJob)) return;
                if (!urlSession && sessionStorage.getItem('assessment_started') === 'true') return;

                urlEnterRanRef.current = true;
                let cancelled = false;
                const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

                const pollSessionForEmail = async (email, jobId) => {
                    const deadline = Date.now() + 60000;
                    let attempt = 0;
                    while (Date.now() < deadline && !cancelled) {
                        attempt += 1;
                        const { data, error } = await supabase
                            .from('assessment_sessions')
                            .select('id, updated_at, config, requisition_id, status')
                            .eq('candidate_email', email.toLowerCase())
                            .order('updated_at', { ascending: false })
                            .limit(20);
                        if (error) {
                            console.warn('Session poll error:', error.message);
                        } else if (data?.length) {
                            const row = pickSessionForJob(data, jobId);
                            if (row?.id) return row.id;
                        }
                        const waitEl = document.querySelector('[data-bootstrap-wait]');
                        if (waitEl) {
                            waitEl.textContent = 'Waiting for your assessment session… (' + attempt + ')';
                        }
                        await sleep(attempt < 5 ? 1500 : 2500);
                    }
                    return null;
                };

                (async () => {
                setIsLoading(true);
                    setUrlEntryError('');
                    try {
                        let activeId = urlSession;
                        if ((!activeId || activeId.length < 10) && urlEmail && urlJob) {
                            activeId = await pollSessionForEmail(urlEmail, urlJob);
                        }
                        if (!activeId || activeId.length < 10) {
                            setUrlEntryError('Your assessment session is still being created. Please wait a minute and refresh, or use the link in your email.');
                            return;
                        }

                        const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(activeId);
                        let query = supabase.from('assessment_sessions').select('id, status, interview_history, requisition_id, config');
                        query = isUuid ? query.eq('id', activeId) : query.eq('gmail_thread_id', activeId);
                        const { data, error } = await query.maybeSingle();
                        if (cancelled) return;
                        if (error || !data) {
                            setUrlEntryError('Could not verify your assessment session. Check the link or contact your recruiter.');
                            return;
                        }
                        const block = getPortalSessionBlockReason(data);
                        if (block.blocked) {
                            if (isSessionStartedPortal(data.interview_history) && !isSessionFullyComplete(data)) {
                                await markSessionAbandoned(supabase, data.id);
                            }
                            setUrlEntryError(block.message);
                            return;
                        }

                        setSessionId(data.id);
                        if (urlEmail) {
                            setCandidateEmail(urlEmail);
                            sessionStorage.setItem('candidate_email', urlEmail);
                        }
                        sessionStorage.setItem('current_session_id', data.id);
                        sessionStorage.removeItem('assessment_started');
                        if (!cancelled) {
                            const nextUrl = new URL(window.location.href);
                            nextUrl.searchParams.set('session', data.id);
                            if (urlEmail) nextUrl.searchParams.set('email', urlEmail);
                            nextUrl.searchParams.delete('job');
                            nextUrl.searchParams.delete('from');
                            window.history.replaceState({}, '', nextUrl.pathname + nextUrl.search);
                            setLinkSessionReady(true);
                            setView('login');
                        }
                    } catch (e) {
                        console.error('Session link entry failed:', e);
                        setUrlEntryError('Something went wrong loading your assessment. Please refresh or try again from your email link.');
                    } finally {
                        if (!cancelled) setIsLoading(false);
                    }
                })();

                return () => { cancelled = true; };
            }, []);

            const extractNextQuestion = (data) => {
                let nextQ = data?.nextQuestion || data?.question || data?.output || data?.text || '';
                if (typeof nextQ === 'string' && nextQ.trim().startsWith('{')) {
                    try {
                        const parsed = JSON.parse(nextQ);
                        nextQ = parsed.nextQuestion || parsed.question || parsed.text || nextQ;
                    } catch (e) { /* keep raw */ }
                }
                return String(nextQ || '').trim();
            };

            const postAssessmentAnswer = async (payload) => {
                const response = await fetch(`${WEBHOOK_BASE}/assessment-answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload),
                });
                const textData = await response.text();
                if (!response.ok) {
                    throw new Error(`Workflow error (${response.status}): ${textData.slice(0, 200)}`);
                }
                let sanitizedText = textData.trim();
                if (sanitizedText.startsWith('=')) sanitizedText = sanitizedText.substring(1).trim();
                try {
                    return JSON.parse(sanitizedText);
                } catch (e) {
                    return { output: sanitizedText };
                }
            };

            const loadNextQuestionFromSession = async (sId, nextPhaseNum) => {
                if (!sId) return null;
                const { data, error } = await supabase
                    .from('assessment_sessions')
                    .select('interview_history, current_phase')
                    .eq('id', sId)
                    .maybeSingle();
                if (error || !data) return null;
                let hist = data.interview_history;
                if (typeof hist === 'string') {
                    try { hist = JSON.parse(hist); } catch (e) { hist = []; }
                }
                if (!Array.isArray(hist)) hist = [];
                const dbPhase = Number(data.current_phase);
                const phaseToLoad = Number.isFinite(dbPhase) && dbPhase >= nextPhaseNum ? dbPhase : nextPhaseNum;
                const row = hist.find((h) => Number(h.phase) === phaseToLoad);
                const question = String(row?.question_text || row?.question || '').trim();
                if (!question) return null;
                return {
                    nextQuestion: question,
                    time_limit_seconds: row.time_limit_seconds,
                    deadline_at: row.deadline_at,
                    complexity_tier: row.complexity_tier,
                    current_phase: phaseToLoad,
                };
            };

            const pollNextQuestionFromSession = async (sId, nextPhaseNum, attempts = 8, delayMs = 1500) => {
                for (let i = 0; i < attempts; i++) {
                    const fromDb = await loadNextQuestionFromSession(sId, nextPhaseNum);
                    if (fromDb?.nextQuestion) return fromDb;
                    if (i < attempts - 1) {
                        await new Promise((r) => setTimeout(r, delayMs));
                    }
                }
                return null;
            };

            const resolveNextQuestionPayload = async (data, sId, nextPhaseNum) => {
                let nextQ = extractNextQuestion(data);
                if (nextQ) return { data, nextQ };

                const fromDb = await loadNextQuestionFromSession(sId, nextPhaseNum);
                if (fromDb?.nextQuestion) {
                    return { data: { ...data, ...fromDb }, nextQ: fromDb.nextQuestion };
                }
                return { data, nextQ: '' };
            };

            const handleAssessmentSubmit = async (isTimeout = false) => {
                if (isLoading) return;
                const finalAnswer = answer.trim() || (isTimeout ? "[Timeout - No response provided]" : "");
                if (!finalAnswer) return;

                setIsLoading(true);
                try {
                    const payload = {
                            sessionId,
                            answer: finalAnswer,
                            phase: currentStep,
                            email: candidateEmail,
                        tabSwitches: integrityViolationCount,
                        integrityViolations: integrityViolationCount,
                    };

                    let data = await postAssessmentAnswer(payload);
                    const nextPhaseNum = currentStep + 1;

                    let resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                    data = resolved.data;

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < totalSteps) {
                        const fromDb = await pollNextQuestionFromSession(sessionId, nextPhaseNum);
                        if (fromDb?.nextQuestion) {
                            data = { ...data, ...fromDb };
                            resolved = { data, nextQ: fromDb.nextQuestion };
                        }
                    }

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < totalSteps) {
                        await new Promise((r) => setTimeout(r, 2000));
                        data = await postAssessmentAnswer(payload);
                        resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                        data = resolved.data;
                    }

                    if (data.startSpeech || (data.assessment_mode === 'speech' && data.nextQuestion)) {
                        const speechPhases = speechPhasesFromResponse(data);
                        let nextQ = data.nextQuestion || extractNextQuestion(data);
                        let speechTimer = {
                            time_limit_seconds: data.time_limit_seconds,
                            deadline_at: data.deadline_at,
                        };
                        const speechPhaseNum = totalSteps + 1;
                        if (!nextQ && sessionId) {
                            const fromDb = await pollNextQuestionFromSession(sessionId, speechPhaseNum, 6, 1000);
                            if (fromDb?.nextQuestion) {
                                nextQ = fromDb.nextQuestion;
                                speechTimer = {
                                    time_limit_seconds: fromDb.time_limit_seconds,
                                    deadline_at: fromDb.deadline_at,
                                };
                            }
                        }
                        if (!nextQ) {
                            alert(
                                'The first voice question is still being prepared. Please wait a few seconds and submit your last answer once more.'
                            );
                            return;
                        }
                        setAssessmentMode('speech');
                        setTechMaxSteps(totalSteps);
                        setSpeechTotalSteps(speechPhases);
                        setTotalSteps(totalSteps + speechPhases);
                        setPendingSpeechIntro({
                            nextQuestion: nextQ,
                            speechPhases,
                            ...speechTimer,
                        });
                        setView('speech-intro');
                        return;
                    }

                    if (data.isFinal === true) {
                        setView('finished');
                        sessionStorage.removeItem('assessment_started');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback(data.feedback || 'Assessment completed.');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                        if (sessionId) sessionStorage.setItem('current_session_id', sessionId);
                        if (candidateEmail) sessionStorage.setItem('candidate_email', candidateEmail);
                    } else {
                        const nextQ = resolved?.nextQ || extractNextQuestion(data);

                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep((prev) => prev + 1);
                            setAnswer('');
                            applyTimerFromPhase({
                                time_limit_seconds: data.time_limit_seconds,
                                deadline_at: data.deadline_at,
                            });
                        } else {
                            alert(
                                'AI did not return the next question yet. Please click Submit once more — ' +
                                'your answer for this phase is already saved.'
                            );
                        }
                    }
                } catch (e) {
                    console.error('Submit Error:', e);
                    alert('Connection error. Please try submitting again.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleBeginSpeechFromIntro = async () => {
                if (isLoading) return;
                if (!window.TA_LIVE?.fetchLiveSpeechStart) {
                    alert('Live speech module not loaded. Refresh the page.');
                    return;
                }
                setIsLoading(true);
                try {
                    const ctx = await window.TA_LIVE.fetchLiveSpeechStart(
                        WEBHOOK_BASE,
                        sessionId,
                        candidateEmail
                    );
                    const relay = window.TA_LIVE.resolveRelayUrl(ctx, LIVE_SPEECH_RELAY_FALLBACK);
                    if (!relay) {
                        alert('live_relay_url is not set. Update n8n CFG or run relay locally on port 8080.');
                        return;
                    }
                    const portalBase = String(
                        ctx.portal_base_url || 'https://talent-acquisition-six.vercel.app'
                    ).replace(/\/+$/, '');
                    setLiveSpeechContext({
                        ...ctx,
                        session_id: ctx.session_id || sessionId,
                        candidate_email: ctx.candidate_email || candidateEmail,
                        live_relay_url: relay,
                        portal_base_url: portalBase,
                        live_save_url: ctx.live_save_url || `${portalBase}/api/live-speech-save`,
                        supabase_url: ctx.supabase_url || ctx.config?.supabase_url || '',
                        supabase_key: ctx.supabase_key || ctx.config?.supabase_key || '',
                        config: {
                            ...(ctx.config || {}),
                            supabase_url: ctx.supabase_url || ctx.config?.supabase_url || '',
                            supabase_key: ctx.supabase_key || ctx.config?.supabase_key || '',
                            portal_base_url: portalBase,
                        },
                    });
                    setAssessmentMode('live_speech');
                    setPendingSpeechIntro(null);
                    setView('live-speech');
                } catch (e) {
                    console.error('Live speech start error:', e);
                    alert(e?.message || 'Could not start live voice interview. Check n8n workflow is active.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLiveSpeechFinished = async (data) => {
                let result = data?.result || '';
                let score = data?.score;
                let feedback = data?.feedback || 'Assessment completed.';

                const portalBase = String(
                    liveSpeechContext?.portal_base_url ||
                    liveSpeechContext?.config?.portal_base_url ||
                    'https://talent-acquisition-six.vercel.app'
                ).replace(/\/+$/, '');
                const maxQuestions = Number(liveSpeechContext?.max_questions || 5);

                let row = null;
                if (sessionId && supabase) {
                    try {
                        const { data: fetched } = await supabase
                            .from('assessment_sessions')
                            .select('result, score, speech_score, technical_score, status, assessment_stage, interview_history, config, scheduling_status')
                            .eq('id', sessionId)
                            .single();
                        row = fetched || null;
                    } catch (e) {
                        console.warn('Could not refresh session after live speech:', e);
                    }
                }

                const sessionIncomplete = !row
                    || !row.result
                    || row.status !== 'completed'
                    || row.speech_score == null
                    || row.assessment_stage !== 'completed';

                const schedulingStuck = row?.result === 'PASS'
                    && ['pending', 'none', '', null].includes(String(row?.scheduling_status || '').toLowerCase());

                if (sessionId && (sessionIncomplete || data?.complete_webhook_ok === false || schedulingStuck) && window.TA_LIVE?.finalizeLiveSpeech) {
                    try {
                        const fin = await window.TA_LIVE.finalizeLiveSpeech({
                            portalBase,
                            sessionId,
                            maxQuestions,
                            liveSpeechContext,
                        });
                        if (fin?.result) result = fin.result;
                        if (fin?.score != null) score = Number(fin.score);
                        if (sessionId && supabase) {
                            const { data: refreshed } = await supabase
                                .from('assessment_sessions')
                                .select('result, score, speech_score, technical_score, status, assessment_stage, interview_history, config, scheduling_status')
                                .eq('id', sessionId)
                                .single();
                            row = refreshed || row;
                        }
                    } catch (e) {
                        console.warn('Live speech finalize fallback failed:', e);
                    }
                }

                if (row && window.TAFinalScore?.computeFinalOutcome) {
                    const outcome = window.TAFinalScore.computeFinalOutcome(row);
                    if (outcome?.score != null) score = outcome.score;
                    if (outcome?.result) result = outcome.result;
                } else if (!result && score != null) {
                    const pt = Number(liveSpeechContext?.config?.pass_score_threshold ?? 60);
                    result = Number(score) >= pt ? 'PASS' : 'FAIL';
                }

                const passThreshold = Number(liveSpeechContext?.config?.pass_score_threshold ?? 60);
                setView('finished');
                sessionStorage.removeItem('assessment_started');
                setResult(result || (Number(score) >= passThreshold ? 'PASS' : 'FAIL'));
                if (score != null) setOverallScore(Number(score));
                setFeedback(feedback);
                sessionStorage.removeItem('time_left');
                sessionStorage.removeItem('deadline_at');
                deadlineAtRef.current = null;
                setLiveSpeechContext(null);
                if (sessionId) sessionStorage.setItem('current_session_id', sessionId);
                if (candidateEmail) sessionStorage.setItem('candidate_email', candidateEmail);
            };

            const handleSpeechSubmit = async ({ transcript, blob, durationSeconds, delivery }) => {
                if (isLoading) return { audioSaved: false, audioError: 'busy' };
                setIsLoading(true);
                let audioSaved = false;
                let audioError = '';
                try {
                    const TA = window.TA_SPEECH;
                    const cleanTranscript = TA?.sanitizeTranscript
                        ? TA.sanitizeTranscript(transcript)
                        : String(transcript || '').trim();
                    const metrics = TA
                        ? TA.computeMetrics(cleanTranscript, durationSeconds, delivery)
                        : { duration_seconds: Math.round(durationSeconds || 0) };
                    const weakBrowser = TA?.isWeakTranscript?.(cleanTranscript) ?? !cleanTranscript;
                    let audioUrl = '';
                    if (TA && blob && supabase && sessionId) {
                        const upload = TA.uploadAudioWithTimeout
                            ? await TA.uploadAudioWithTimeout(supabase, sessionId, currentStep, blob, 20000)
                            : await TA.uploadAudio(supabase, sessionId, currentStep, blob);
                        audioUrl = upload?.url || '';
                        audioSaved = !!upload?.saved;
                        audioError = upload?.error || '';
                    } else if (blob && !supabase) {
                        audioError = 'storage_not_configured';
                    }
                    const payload = {
                        sessionId,
                        phase: currentStep,
                        email: candidateEmail,
                        answer: (!weakBrowser && cleanTranscript)
                            ? cleanTranscript
                            : (audioUrl ? '[Audio recorded]' : '[No speech detected]'),
                        assessment_mode: 'speech',
                        audio_url: audioUrl,
                        speech_metrics: metrics,
                        tabSwitches: integrityViolationCount,
                        integrityViolations: integrityViolationCount,
                    };
                    let data = await postAssessmentAnswer(payload);
                    const nextPhaseNum = currentStep + 1;
                    let resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                    data = resolved.data;

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < techMaxSteps + speechTotalSteps) {
                        const fromDb = await pollNextQuestionFromSession(sessionId, nextPhaseNum);
                        if (fromDb?.nextQuestion) {
                            data = { ...data, ...fromDb };
                            resolved = { data, nextQ: fromDb.nextQuestion };
                        }
                    }

                    if (data.isFinal === true) {
                        setView('finished');
                        sessionStorage.removeItem('assessment_started');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback(data.feedback || 'Assessment completed.');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                    } else {
                        const nextQ = resolved?.nextQ || extractNextQuestion(data);
                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep((prev) => prev + 1);
                            armSpeechPhaseTimer({
                                time_limit_seconds: data.time_limit_seconds,
                                deadline_at: data.deadline_at,
                            });
                        }
                    }
                } catch (e) {
                    console.error('Speech submit error:', e);
                    alert('Could not submit speech answer. Please try again.');
                    return { audioSaved: false, audioError: e.message || 'submit_failed' };
                } finally {
                    setIsLoading(false);
                }
                return { audioSaved, audioError };
            };

            useEffect(() => {
                if (view !== 'assessment' || isLoading) return;

                const tick = () => {
                    const deadline = deadlineAtRef.current || sessionStorage.getItem('deadline_at');
                    let remaining;
                    if (deadline) {
                        remaining = Math.max(0, Math.floor((new Date(deadline).getTime() - Date.now()) / 1000));
                    } else {
                        const stored = sessionStorage.getItem('time_left');
                        const parsed = stored != null ? parseInt(stored, 10) : NaN;
                        remaining = Number.isFinite(parsed) ? Math.max(0, parsed) : null;
                    }
                    setTimeLeft(remaining);
                    if (remaining != null) sessionStorage.setItem('time_left', String(remaining));
                };

                tick();
                const interval = setInterval(tick, 1000);
                return () => clearInterval(interval);
            }, [view, isLoading]);

            useEffect(() => {
                if (view === 'assessment' && timeLeft === 0 && !isLoading && deadlineAtRef.current) {
                    if (assessmentMode === 'speech') {
                        handleSpeechSubmit({
                            transcript: '[Timeout - No response provided]',
                            blob: null,
                            durationSeconds: 0,
                        });
                    } else {
                    handleAssessmentSubmit(true);
                }
                }
            }, [timeLeft, view, isLoading, assessmentMode]);

            const resolveSessionIdForReview = () => {
                const params = new URLSearchParams(window.location.search);
                const fromUrl = cleanUrlParam(params.get('session'));
                const fromStorage = cleanUrlParam(sessionStorage.getItem('current_session_id'));
                const fromState = cleanUrlParam(sessionId);
                return fromUrl || fromStorage || fromState;
            };

            const handleExitPortalAfterScheduling = useCallback(() => {
                stopProctorMedia();
                sessionStorage.removeItem('current_session_id');
                sessionStorage.removeItem('candidate_email');
                sessionStorage.removeItem('time_left');
                sessionStorage.removeItem('deadline_at');
                sessionStorage.removeItem('assessment_started');
                deadlineAtRef.current = null;
                setSessionId('');
                setCandidateEmail('');
                setView('login');
                try {
                    const url = new URL(window.location.href);
                    url.searchParams.delete('session');
                    url.searchParams.delete('email');
                    url.searchParams.delete('job');
                    window.history.replaceState({}, '', url.pathname + url.search);
                } catch (_) { /* ignore */ }
            }, [stopProctorMedia]);

            useEffect(() => {
                if (view === 'finished' || view === 'review' || view === 'login') {
                    stopProctorMedia();
                }
            }, [view, stopProctorMedia]);

            const fetchAndShowReview = async () => {
                const sid = resolveSessionIdForReview();
                if (!sid) {
                    alert('Session ID missing. Open the assessment link from your email again.');
                    return;
                }
                setIsLoading(true);
                try {
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid);
                    let query = supabase
                        .from('assessment_sessions')
                        .select('id, interview_history, result, status, score, config');
                    if (isUuid) {
                        query = query.eq('id', sid);
                    } else {
                        query = query.eq('gmail_thread_id', sid);
                    }
                    const { data, error } = await query.maybeSingle();

                    if (error) throw error;
                    if (!data) {
                        alert('Session not found. Check the link or contact support.');
                        return;
                    }

                    const rows = normalizeInterviewHistory(data.interview_history);
                    if (rows.length === 0) {
                        alert('No interview history saved yet for this session.');
                        return;
                    }

                    setSessionId(data.id || sid);
                    sessionStorage.setItem('current_session_id', data.id || sid);
                    setSessionConfig(parseSessionConfig(data.config));
                    setAssessmentHistory(rows);
                    setFeedback(pickLatestFeedback(rows, feedback));
                    if (data.score != null) setOverallScore(Number(data.score));
                    if (data.result) setResult(data.result);
                    setView('review');
                } catch (e) {
                    console.error('Supabase Fetch Error:', e);
                    alert(`Could not load interview history: ${e.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const renderView = () => {
                switch (view) {
                    case 'login':
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} linkSessionReady={linkSessionReady} />;
                    case 'instructions':
                        return <InstructionsView onStart={handleBeginFromInstructions} sessionId={sessionId} supabase={supabase} />;
                    case 'proctoring-setup':
                        return (
                            <ProctoringSetupView
                                onComplete={handleProctoringComplete}
                                onBack={() => setView('instructions')}
                                isLoading={isLoading}
                            />
                        );
                    case 'speech-intro':
                        return (
                            <SpeechIntroView
                                onBegin={handleBeginSpeechFromIntro}
                                techSteps={techMaxSteps}
                                speechSteps={speechTotalSteps}
                                isLoading={isLoading}
                            />
                        );
                    case 'live-speech':
                        if (!liveSpeechContext) {
                            return (
                                <Shell subtitle="Live speech">
                                    <div className="p-8 text-center text-slate-400">Loading live session…</div>
                                </Shell>
                            );
                        }
                        return (
                            <LiveSpeechView
                                context={liveSpeechContext}
                                relayFallback={LIVE_SPEECH_RELAY_FALLBACK}
                                tabSwitches={integrityViolationCount}
                                candidateEmail={candidateEmail}
                                integrityViolationCount={integrityViolationCount}
                                isLoading={isLoading}
                                onFinished={handleLiveSpeechFinished}
                                onError={(msg) => alert(msg || 'Live speech error')}
                            />
                        );
                    case 'assessment':
                        if (assessmentMode === 'speech') {
                            const speechIndex = currentStep - techMaxSteps;
                            return (
                                <SpeechAssessmentView
                                    speechIndex={speechIndex}
                                    speechTotal={speechTotalSteps}
                                    absolutePhase={currentStep}
                                    timeLeft={timeLeft}
                                    phaseTimeLimit={phaseTimeLimit}
                                    question={question}
                                    isLoading={isLoading}
                                    candidateEmail={candidateEmail}
                                    integrityViolationCount={integrityViolationCount}
                                    contentMasked={devToolsDetected || fullscreenRequired}
                                    onSubmitSpeech={handleSpeechSubmit}
                                    onQuestionPlaybackComplete={startSpeechPhaseTimer}
                                    timerReady={speechTimerReady}
                                />
                            );
                        }
                        return (
                            <AssessmentView
                                currentStep={currentStep}
                                totalSteps={totalSteps}
                                timeLeft={timeLeft}
                                phaseTimeLimit={phaseTimeLimit}
                                question={question}
                                answer={answer}
                                setAnswer={setAnswer}
                                handleAssessmentSubmit={handleAssessmentSubmit}
                                isLoading={isLoading}
                                candidateEmail={candidateEmail}
                                integrityViolationCount={integrityViolationCount}
                                contentMasked={devToolsDetected || fullscreenRequired}
                            />
                        );
                    case 'finished':
                        return <FinishedView result={result} overallScore={overallScore} feedback={feedback} onReview={fetchAndShowReview} isLoading={isLoading} sessionId={sessionId} supabase={supabase} onExitPortal={handleExitPortalAfterScheduling} />;
                    case 'review':
                        return (
                            <ReviewView
                                history={assessmentHistory}
                                overallFeedback={pickLatestFeedback(assessmentHistory, feedback)}
                                sessionConfig={sessionConfig}
                                onBack={() => setView('finished')}
                            />
                        );
                    case 'admin':
                        return <AdminView setView={setView} />;
                    default:
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} linkSessionReady={linkSessionReady} />;
                }
            };

            const hasUrlBootstrap = /[?&](session|email)=/i.test(window.location.search);

            return (
                <div className="min-h-screen w-full max-w-full app-bg text-slate-800 antialiased">
                    {urlEntryError && view === 'login' && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[60] max-w-md w-[calc(100%-2rem)] p-4 rounded-xl border border-red-500/40 bg-red-950/90 text-red-100 text-sm shadow-lg">
                            {urlEntryError}
                        </div>
                    )}
                    {isLoading && view === 'login' && hasUrlBootstrap && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm px-6">
                            <div className="w-10 h-10 rounded-full border-2 border-accent/30 border-t-accent animate-spin mb-4" aria-hidden="true" />
                            <p className="text-sm text-slate-300" data-bootstrap-wait>Loading your assessment portal…</p>
                        </div>
                    )}
                    {renderView()}
                    {!PROCTORING_DISABLED && proctorStreams && (view === 'assessment' || view === 'live-speech') ? (
                        <ProctoringMonitorStrip streams={proctorStreams} />
                    ) : null}
                    {!PROCTORING_DISABLED && cameraGraceSecondsLeft != null ? (
                        <CameraGraceOverlay
                            secondsLeft={cameraGraceSecondsLeft}
                            onEnableCamera={handleRestoreWebcam}
                            busy={cameraGraceBusy}
                        />
                    ) : null}
                    {fullscreenRequired && isFullscreenRequiredView(view) && (
                        <FullscreenRequiredOverlay
                            onRestore={restorePortalFullscreen}
                            onRestoreStart={beginFullscreenRestore}
                            onSecurityKeyDown={handleSecurityKeyDown}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
