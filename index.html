    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: { DEFAULT: '#0f172a', elevated: '#1e293b', border: '#334155' },
                        accent: { DEFAULT: '#1e40af', hover: '#1e3a8a', muted: 'rgba(30, 64, 175, 0.18)' },
                    },
                    boxShadow: {
                        card: '0 4px 24px -4px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04)',
                        glow: '0 0 40px -8px rgba(30, 64, 175, 0.25)',

        };
    </script>
    <style>
        :root {
            --bg: #080b10;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; }

            scroll-behavior: smooth;
            width: 100%;
            margin: 0;
            padding: 0;

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

        #root {
            width: 100%;
            max-width: 100%;

        }

        ::selection {

        ::-webkit-scrollbar { width: 8px; height: 8px; }

        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

            background-color: var(--bg);
        }

        .panel {
            background: linear-gradient(180deg, rgba(26, 36, 51, 0.95) 0%, rgba(18, 26, 39, 0.98) 100%);

        }

        .panel-elevated {
            background: #1a2433;
            border: 1px solid #2a3a4f;
        }

        .input-field {
            background: #0f1620;
            border: 1px solid #2a3a4f;
            color: #f1f5f9;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-user-select: text;
            user-select: text;
        }

        .input-field::placeholder { color: #64748b; }

        .input-field:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.22);
        }

        .btn-primary {
            background: #1e40af;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: background 0.15s ease;

        .btn-primary:hover:not(:disabled) {

        .btn-primary:active:not(:disabled) { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(15, 22, 32, 0.6);
            border: 1px solid #2a3a4f;
            color: #cbd5e1;
            font-weight: 500;
            transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: #475569;
            background: rgba(26, 36, 51, 0.8);
            color: #f8fafc;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 9999px;
            border: 1px solid transparent;
        }

        .badge-accent {
            background: rgba(30, 64, 175, 0.12);
            border-color: rgba(30, 64, 175, 0.35);
            color: #93c5fd;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.35);
            color: #6ee7b7;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.35);
            color: #fcd34d;
        }

        .onboarding-hero {
            background: #141c28;
            border: 1px solid #2a3a4f;
            border-radius: 1rem;
            box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.35);
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .assessment-lock, .portal-lock {
            -webkit-user-select: none;
            user-select: none;
        }

        .question-protected {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* TEMP testing mode: allow text selection / copy when proctoring is disabled */
        html.proctor-off .assessment-lock,
        html.proctor-off .portal-lock,
        html.proctor-off .question-protected {
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-touch-callout: default !important;
        }

        .question-masked {
            filter: blur(14px);
            pointer-events: none;
            user-select: none;
        }

        .timer-ring-track { stroke: #1e293b; }
        .timer-ring-progress { stroke: #1e40af; transition: stroke-dashoffset 1s linear; }
        .timer-ring-progress.low { stroke: #f59e0b; }
        .timer-ring-progress.critical { stroke: #ef4444; }

        .assessment-workspace {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100dvh - 4rem);
            min-height: calc(100dvh - 4rem);
        }

        @media (min-width: 1024px) {
            .assessment-workspace { flex-direction: row; }
        }

        .assessment-sidebar {
            flex-shrink: 0;
            width: 100%;
            border-bottom: 1px solid #2a3a4f;
            background: linear-gradient(180deg, #0c121a 0%, #0a0f16 100%);
            padding: 1rem 1.25rem;
            overflow-y: auto;
            max-height: 32vh;
        }

        @media (min-width: 640px) {
            .assessment-sidebar { max-height: 36vh; }
        }

        @media (min-width: 1024px) {
            .assessment-sidebar {
                width: 18.5rem;
                min-width: 18.5rem;
                max-height: none;
                height: 100%;
                border-bottom: none;
                border-right: 1px solid #2a3a4f;
                padding: 1.25rem 1rem 1.5rem;
            }
        }

        @media (min-width: 1280px) {
            .assessment-sidebar { width: 20rem; min-width: 20rem; }
        }

        .sidebar-section {
            padding-bottom: 1.125rem;
            margin-bottom: 1.125rem;
            border-bottom: 1px solid rgba(42, 58, 79, 0.65);
        }

        .sidebar-section:last-child {
            padding-bottom: 0;
            margin-bottom: 0;
            border-bottom: none;
        }

        .sidebar-label {
            font-size: 0.625rem;
            font-weight: 700;

        .phase-list-item {
            display: flex;

        .phase-list-item.active {
            border-color: rgba(99, 102, 241, 0.45);
            background: rgba(99, 102, 241, 0.1);
        }

        .phase-list-item.done { opacity: 0.7; }

        .phase-list-item.pending { opacity: 0.5; }

        .phase-list-num {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .assessment-main {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .speech-phase-header {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .speech-phase-header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .speech-answer-panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .speech-transcript-box {
            flex: 1;
            min-height: 8rem;
            max-height: 42vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 1024px) {
            .speech-transcript-box {
                min-height: 11rem;
                max-height: none;
            }
        }

        .speech-action-row {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .speech-action-row {
                flex-direction: row;

        @media print {

    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MAX_INTEGRITY_VIOLATIONS = 3;
        const VIOLATION_DEBOUNCE_MS = 1200;
        const DEVTOOLS_SIZE_THRESHOLD = 140;
        const DEVTOOLS_POLL_MS = 350;
        const DEBUGGER_PAUSE_MS = 90;

        const VIOLATION_LABELS = {
            tab_switch: 'leaving the assessment tab',
            window_blur: 'switching to another window or app',
            devtools: 'opening developer tools (Inspect Element)',
            fullscreen_exit: 'exiting fullscreen mode',
            blocked_shortcut: 'using blocked keyboard shortcuts (F12, Inspect, View Source)',
            screenshot: 'attempting to take a screenshot (Print Screen)',
            snipping_tool: 'attempting to open Snipping Tool or screen capture (Win+Shift+S)',
            print_attempt: 'attempting to print or save the page',
        };

        const hasWinModifier = (e) => (
            e.metaKey ||
            (typeof e.getModifierState === 'function' && (
                e.getModifierState('Meta') ||
                e.getModifierState('OS') ||
                e.getModifierState('Super')
            ))
        );

        const clearClipboardBestEffort = async () => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText('');
                }
            } catch (err) { /* permission or unsupported */ }
        };

        const isInFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);

        const enterAssessmentFullscreen = async () => {
            if (typeof PROCTORING_DISABLED !== 'undefined' && PROCTORING_DISABLED) return true;
            const el = document.documentElement;
            try {
                if (document.fullscreenElement) return true;
                if (el.requestFullscreen) {
                    await el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    await el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    await el.msRequestFullscreen();
                }
                return !!document.fullscreenElement;
            } catch (e) {
                return false;
            }
        };

        const exitAssessmentFullscreen = () => {
            try {
                if (document.fullscreenElement && document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } catch (e) {}
        };

        const isDevToolsLikelyOpenBySize = () => (
            window.outerWidth - window.innerWidth > DEVTOOLS_SIZE_THRESHOLD ||
            window.outerHeight - window.innerHeight > DEVTOOLS_SIZE_THRESHOLD
        );

        const isDevToolsLikelyOpenByConsole = () => {
            let detected = false;
            const bait = new Image();
            try {
                Object.defineProperty(bait, 'id', {
                    get() {
                        detected = true;
                        return 'devtools-probe';
                    },
                    configurable: true,
                });
                console.debug(bait);
                console.clear?.();
            } catch (err) { /* ignore */ }
            return detected;
        };

        const isDevToolsLikelyOpenByDebugger = () => {
            try {
                const start = performance.now();
                // eslint-disable-next-line no-debugger
                debugger;
                return performance.now() - start > DEBUGGER_PAUSE_MS;
            } catch (err) {
                return false;
            }
        };

        const isDevToolsLikelyOpen = () => (
            isDevToolsLikelyOpenBySize() ||
            isDevToolsLikelyOpenByConsole()
        );

        const isBlockedDevToolsShortcut = (e) => {
            if (e.key === 'F12') return true;
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c', 'k', 'u'].includes(key)) return true;
            if (e.ctrlKey && !e.shiftKey && (key === 'u' || key === 's')) return true;
            if (e.metaKey && e.altKey && ['i', 'j', 'c', 'u'].includes(key)) return true;
            if (e.metaKey && e.shiftKey && ['i', 'j', 'c', 'k'].includes(key)) return true;
            if (hasWinModifier(e) && e.altKey && key === 'i') return true;
            return false;
        };

        const isBlockedFullscreenEscapeShortcut = (e) => {
            if (e.key === 'F11') return true;
            const key = (e.key || '').toLowerCase();
            if (hasWinModifier(e) && key === 'enter') return true;
            return false;
        };

        const isBlockedTabSwitchShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.altKey && (key === 'tab' || e.keyCode === 9)) return true;
            if (e.ctrlKey && (key === 'tab' || key === 'pageup' || key === 'pagedown')) return true;
            if (e.ctrlKey && e.shiftKey && key === 'tab') return true;
            return false;
        };

        const isBlockedScreenshotShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            const code = e.code || '';
            if (e.key === 'PrintScreen' || e.keyCode === 44) return true;
            if (e.altKey && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (hasWinModifier(e) && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (e.metaKey && e.shiftKey && ['3', '4', '5', 's'].includes(key)) return true;
            if (hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS')) return true;
            if (hasWinModifier(e) && e.shiftKey && code === 'KeyS') return true;
            if (hasWinModifier(e) && key === 'g') return true;
            if (hasWinModifier(e) && e.altKey && key === 'r') return true;
            return false;
        };

        const isBlockedPrintShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && key === 'p') return true;
            if (e.metaKey && key === 'p') return true;
            return false;
        };

        const handleBlockedSecurityKey = (e, recordViolation) => {
            if (isBlockedTabSwitchShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedDevToolsShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('devtools');
                return true;
            }
            if (isBlockedFullscreenEscapeShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedPrintShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('print_attempt');
                return true;
            }
            if (isBlockedScreenshotShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                clearClipboardBestEffort();
                const key = (e.key || '').toLowerCase();
                const code = e.code || '';
                const isSnip = hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS');
                recordViolation?.(isSnip ? 'snipping_tool' : 'screenshot');
                return true;
            }
            return false;
        };

        const PORTAL_LOCKED_VIEWS = ['login', 'instructions', 'assessment', 'live-speech'];
        const isPortalLockedView = (v) => PORTAL_LOCKED_VIEWS.includes(v);

        // ===== TEMP TESTING MODE =====
        // true => all proctoring OFF (copy-paste, tab-switch, window-blur, fullscreen, devtools allowed).
        // Set back to false before production. Can also force OFF via URL: ?test=1 / ?noproctor / ?proctor=off
        const FORCE_DISABLE_PROCTORING = true;
        const PROCTORING_DISABLED = FORCE_DISABLE_PROCTORING ||
            /[?&](test=1|noproctor|proctor=off)/i.test(location.search);
        if (PROCTORING_DISABLED) {
            document.documentElement.classList.add('proctor-off');
            console.warn('[Assessment] Proctoring DISABLED (testing mode). Set FORCE_DISABLE_PROCTORING=false for production.');
        }

        const FullscreenRequiredOverlay = ({ onRestore, onSecurityKeyDown }) => (
            <div
                className="fixed inset-0 z-[2147483646] flex items-center justify-center bg-[#080b10]/95 backdrop-blur-2xl px-4 portal-lock"
                onContextMenu={(e) => e.preventDefault()}
                onCopy={(e) => e.preventDefault()}
                onCut={(e) => e.preventDefault()}
                onPaste={(e) => e.preventDefault()}
                onKeyDown={onSecurityKeyDown}
                tabIndex={-1}
                role="dialog"
                aria-modal="true"
                aria-label="Fullscreen required"
                style={{ top: 0, left: 0, width: '100vw', height: '100vh' }}
            >
                <div className="panel max-w-md w-full rounded-2xl p-8 sm:p-10 text-center shadow-card border border-accent/30">
                    <div className="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-amber-500/15 border border-amber-500/30">
                        <svg className="h-7 w-7 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <span className="badge badge-warning mb-4">Session paused</span>
                    <h2 className="text-xl font-bold text-white mb-3 tracking-tight">Fullscreen required</h2>
                    <p className="text-sm text-slate-400 leading-relaxed mb-2">
                        You cannot exit or go back during this session. Developer Tools, Snipping Tool, screenshots, and browser menus are blocked until you return.
                    </p>
                    <p className="text-sm text-slate-500 leading-relaxed mb-8">
                        Close Developer Tools if open, then click below to re-enter fullscreen and continue.
                    </p>
                    <button
                        type="button"
                        autoFocus
                        onClick={onRestore}
                        className="btn-primary w-full py-3.5 rounded-xl text-sm"
                    >
                        Return to fullscreen
                    </button>
                </div>
            </div>
        );

        // Update when ngrok restarts (free tier gets a new subdomain each time).
        // Must match: ngrok URL + n8n path on TRG - Assessment Answer (assessment-answer).
        const WEBHOOK_BASE = 'https://randy-gaunt-bradley.ngrok-free.dev/webhook';
        // Live speech relay — production: set live_relay_url in n8n CFG (wss://your-relay.app/live)
        // Local dev: cd relay && npm start → ws://localhost:8080/live
        const LIVE_SPEECH_RELAY_FALLBACK = 'ws://localhost:8080/live';

        const Shell = ({ children, subtitle, footerNote, fullWidth = false, headerExtra = null }) => (
            <div className="min-h-screen flex flex-col w-full">
                <header className="sticky top-0 z-40 border-b border-surface-border/80 bg-[#080b10]/90 backdrop-blur-md w-full">
                    <div className={`w-full h-16 flex items-center justify-between gap-3 ${fullWidth ? 'px-4 lg:px-5' : 'max-w-[1600px] xl:max-w-[1760px] mx-auto px-4 sm:px-6 lg:px-8'}`}>
                        <div className="flex items-center gap-3 min-w-0 flex-1">
                            <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-accent/30 to-accent/5 border border-accent/40 flex items-center justify-center shrink-0 shadow-glow">
                                <svg className="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                            </div>
                            <div className="min-w-0">
                                <p className="text-lg font-extrabold text-white tracking-tight leading-tight">CONVO</p>
                                {subtitle && <p className="text-xs text-slate-500 truncate leading-tight mt-0.5">{subtitle}</p>}
                            </div>
                        </div>
                        {headerExtra ? (
                            <div className="shrink-0 flex items-center" aria-label="Time remaining">
                                {headerExtra}
                            </div>
                        ) : (
                            <span className="badge badge-accent shrink-0 hidden sm:inline-flex">
                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" aria-hidden="true" />
                                Secure session
                            </span>
                        )}
                    </div>
                </header>
                <main className={`flex-1 w-full ${fullWidth ? 'min-h-0 flex flex-col' : ''}`}>{children}</main>
                {footerNote && (
                    <footer className="border-t border-surface-border/60 py-4">
                        <p className="text-center text-xs text-slate-600 max-w-xl mx-auto px-4 leading-relaxed">{footerNote}</p>
                    </footer>
                )}
            </div>
        );

        const TimerRing = ({ seconds, totalSeconds, compact = false, prominent = false }) => {
            const size = prominent ? 64 : compact ? 52 : 88;
            const stroke = prominent ? 5 : compact ? 4 : 6;
            const r = (size - stroke) / 2;
            const c = 2 * Math.PI * r;
            const total = totalSeconds && totalSeconds > 0 ? totalSeconds : seconds || 1;
            const pct = seconds != null ? Math.max(0, Math.min(1, seconds / total)) : 0;
            const offset = c * (1 - pct);
            const low = seconds != null && seconds < 30;
            const critical = seconds != null && seconds < 10;
            const progClass = critical ? 'timer-ring-progress critical' : low ? 'timer-ring-progress low' : 'timer-ring-progress';
            const mm = seconds != null ? `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2, '0')}` : '—';
            const wrapClass = prominent
                ? 'flex items-center gap-3 shrink-0 rounded-xl border border-accent/30 bg-[#0f1620]/95 px-3.5 py-2.5 shadow-glow'
                : compact
                ? 'flex items-center gap-2.5 shrink-0 rounded-lg border border-surface-border bg-[#0f1620]/80 px-3 py-2'
                : 'flex items-center gap-4 panel rounded-xl px-5 py-3 shrink-0';
            const timeClass = prominent
                ? `font-mono text-xl font-bold tabular-nums ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`
                : compact
                ? `font-mono text-lg font-bold tabular-nums ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`
                : `font-mono text-2xl font-bold tabular-nums tracking-tight ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`;
            return (
                <div className={wrapClass}>
                    <svg width={size} height={size} className="-rotate-90 shrink-0" aria-hidden="true">
                        <circle className="timer-ring-track" cx={size / 2} cy={size / 2} r={r} fill="none" strokeWidth={stroke} />
                        <circle
                            className={progClass}
                            cx={size / 2}
                            cy={size / 2}
                            r={r}
                            fill="none"
                            strokeWidth={stroke}
                            strokeLinecap="round"
                            strokeDasharray={c}
                            strokeDashoffset={offset}
                        />

                        <p className={timeClass}>{mm}</p>

            let history = raw || [];

            return Array.isArray(history) ? history : [];

            let cfg = session.config || {};
            if (typeof cfg === 'string') {

            const cfgRid = normalizeJobIdPortal(cfg.requisition_id);

                String(cfg.requisition_title || '')

            if (status.includes('completed') || status.includes('terminated')) {

        const SpeechIntroView = ({ onBegin, techSteps, speechSteps, isLoading }) => (
            <Shell subtitle="Phase 2 · Voice communication interview" footerNote="Microphone access will be requested when you begin">
                <div className="min-h-[calc(100vh-4rem)] flex items-center justify-center p-6 sm:p-10 fade-in portal-lock">
                    <div className="onboarding-hero max-w-2xl w-full rounded-2xl overflow-hidden">
                        <div className="p-8 sm:p-10 border-b border-surface-border bg-surface-elevated/40">

                        </div>
                        <div className="p-8 sm:p-10 space-y-4 bg-surface/30">
                            <div className="rounded-xl border border-indigo-500/25 bg-indigo-500/5 px-5 py-5">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mb-3">How this phase works</p>
                                <ul className="space-y-3 text-sm text-slate-300 leading-relaxed list-none p-0 m-0">
                                    <li className="flex gap-3">
                                        <span className="text-indigo-400 font-bold shrink-0">1.</span>
                                        <span>Each question is read aloud — listen carefully before you respond.</span>
                                    </li>
                                    <li className="flex gap-3">
                                        <span className="text-indigo-400 font-bold shrink-0">2.</span>
                                        <span>You will have a live voice conversation with the AI interviewer — listen and respond naturally.</span>
                                    </li>
                                    <li className="flex gap-3">
                                        <span className="text-indigo-400 font-bold shrink-0">3.</span>
                                        <span>Live captions show what you and the interviewer say. Click End when the conversation is finished.</span>
                                    </li>
                                    <li className="flex gap-3">
                                        <span className="text-indigo-400 font-bold shrink-0">4.</span>
                                        <span>Use a quiet space and allow microphone access when prompted.</span>
                                    </li>
                                </ul>
                            </div>
                            <div className="grid sm:grid-cols-2 gap-3">
                                <div className="rounded-lg border border-surface-border bg-surface-elevated/50 px-4 py-3">
                                    <p className="text-xs font-medium text-slate-500 uppercase tracking-wide">Phase 2 questions</p>
                                    <p className="text-sm text-slate-200 mt-0.5">{speechSteps} voice questions · individually timed</p>
                                </div>
                                <div className="rounded-lg border border-surface-border bg-surface-elevated/50 px-4 py-3">
                                    <p className="text-xs font-medium text-slate-500 uppercase tracking-wide">Evaluated on</p>
                                    <p className="text-sm text-slate-200 mt-0.5">Clarity, confidence, professionalism &amp; relevance</p>
                                </div>
                            </div>
                            <button
                                type="button"
                                onClick={onBegin}
                                disabled={isLoading}
                                className="btn-primary w-full py-3.5 rounded-xl text-sm disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >
                                {isLoading ? (
                                    <>
                                        <svg className="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                                        </svg>
                                        Loading…
                                    </>
                                ) : (
                                    'Begin voice interview'
                                )}

                                Phase 2 begins when you click above. Your Phase 1 responses are already saved.

                        </div>
                    </div>

        );

        function normalizeLiveCompleteResult(result) {
            const save = result?.save || result?.n8n || {};
            return {
                result: save.result || result?.result || '',
                score: save.score ?? result?.score ?? result?.combined_speech_score ?? null,
                feedback: save.feedback || result?.final_feedback || result?.feedback || 'Live speech assessment completed.',
                saved: save.ok !== false && result?.saved_to_db !== false,
            };
        }

        const LiveSpeechView = ({
            context,
            relayFallback,
            tabSwitches,
            candidateEmail,
            integrityViolationCount,
            isLoading,
            onFinished,
            onError,
        }) => {
            const sessionRef = React.useRef(null);
            const finishedRef = React.useRef(false);
            const cardsEndRef = React.useRef(null);
            const [status, setStatus] = React.useState('Preparing live session…');
            const [micLevel, setMicLevel] = React.useState(0);
            const [turn, setTurn] = React.useState(0);
            const [maxTurns, setMaxTurns] = React.useState(context?.speech_phases || 5);
            const [cards, setCards] = React.useState([]);
            const [canAnswer, setCanAnswer] = React.useState(false);
            const [isAnswering, setIsAnswering] = React.useState(false);
            const [savingAnswer, setSavingAnswer] = React.useState(false);
            const [ending, setEnding] = React.useState(false);
            const [interviewComplete, setInterviewComplete] = React.useState(false);
            const [liveCaption, setLiveCaption] = React.useState('');
            const [liveQuestionCaption, setLiveQuestionCaption] = React.useState('');
            const [isInterviewerSpeaking, setIsInterviewerSpeaking] = React.useState(false);
            const [answerTimerActive, setAnswerTimerActive] = React.useState(false);
            const [saveNotice, setSaveNotice] = React.useState('');
            const answerTimeLimit = Number(context?.speech_answer_seconds || context?.config?.speech_answer_seconds || 120);
            const [timeLeft, setTimeLeft] = React.useState(null);
            const timerRef = React.useRef(null);
            const isAnsweringRef = React.useRef(false);
            const canAnswerRef = React.useRef(false);

            React.useEffect(() => { isAnsweringRef.current = isAnswering; }, [isAnswering]);
            React.useEffect(() => { canAnswerRef.current = canAnswer; }, [canAnswer]);

            const currentQuestionNum = cards.length ? cards[cards.length - 1].number : 0;
            const completedAnswers = cards.filter((c) => c && c.answer).length;

            const cleanText = React.useCallback((text, speaker) => (
                window.TA_LIVE?.sanitizeDisplayTranscript
                    ? window.TA_LIVE.sanitizeDisplayTranscript(text, speaker)
                    : String(text || '').trim()
            ), []);

            const addQuestion = React.useCallback((number, text) => {
                const clean = cleanText(text, 'model');
                setCards((prev) => {
                    const next = [...prev];
                    const idx = number - 1;
                    next[idx] = { ...(next[idx] || {}), number, question: clean || `Question ${number}`, answer: next[idx]?.answer || '' };
                    return next;
                });
            }, [cleanText]);

            const setAnswerForQuestion = React.useCallback((number, text) => {
                const clean = cleanText(text, 'user');
                setCards((prev) => {
                    const next = [...prev];
                    const idx = number - 1;
                    if (next[idx]) next[idx] = { ...next[idx], answer: clean || '(no response captured)' };
                    return next;
                });
            }, [cleanText]);

            React.useEffect(() => {
                let cancelled = false;
                (async () => {
                    if (!window.TA_LIVE) {
                        onError?.('Live speech module not loaded.');
                        return;
                    }
                    try {
                        const relayUrl = window.TA_LIVE.resolveRelayUrl(context, relayFallback);
                        const session = new window.TA_LIVE.LiveSpeechSession({
                            relayUrl,
                            context,
                            tabSwitches,
                            onStatus: setStatus,
                            onTranscript: ({ speaker, text, partial }) => {
                                if (speaker === 'model') {
                                    const clean = cleanText(text, 'model');
                                    if (!clean) return;
                                    if (partial) {
                                        setIsInterviewerSpeaking(true);
                                        setLiveQuestionCaption(clean);
                                        setAnswerTimerActive(false);
                                        setTimeLeft(null);
                                    } else {
                                        setLiveQuestionCaption('');
                                        setIsInterviewerSpeaking(false);
                                    }
                                    return;
                                }
                                const clean = cleanText(text, 'user');
                                if (partial) {
                                    setLiveCaption(clean || '');
                                } else if (clean) {
                                    setLiveCaption('');
                                }
                            },
                            onLevel: setMicLevel,
                            onTurn: (payload) => {
                                if (payload?.savedStatus) {
                                    const { number, saved, error } = payload.savedStatus;
                                    setSavingAnswer(false);
                                    setSaveNotice(
                                        saved
                                            ? `Answer ${number} saved.`
                                            : `Answer ${number} recorded — will retry on interview end.${error ? ` (${error})` : ''}`
                                    );
                                    return;
                                }
                                const { turn: t, maxTurns: m } = payload || {};
                                const capped = Math.min(Number(t) || 0, Number(m) || maxTurns);
                                setTurn(capped);
                                if (m) setMaxTurns(m);
                            },
                            onQuestion: ({ number, text, partial }) => {
                                const clean = cleanText(text, 'model');
                                if (partial) {
                                    setIsInterviewerSpeaking(true);
                                    setLiveQuestionCaption(clean || '');
                                    if (clean) addQuestion(number, clean);
                                    return;
                                }
                                addQuestion(number, text);
                                setLiveQuestionCaption('');
                                setIsInterviewerSpeaking(false);
                                setSavingAnswer(false);
                                setLiveCaption('');
                            },
                            onAnswer: ({ number, text }) => {
                                setAnswerForQuestion(number, text);
                                setIsAnswering(false);
                                setSavingAnswer(true);
                                setCanAnswer(false);
                                setLiveCaption('');
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                            },
                            onAwaitingAnswer: () => {
                                setCanAnswer(true);
                                setIsAnswering(false);
                                setSavingAnswer(false);
                                setLiveCaption('');
                                setLiveQuestionCaption('');
                                setIsInterviewerSpeaking(false);
                                setAnswerTimerActive(true);
                                setTimeLeft(answerTimeLimit);
                            },
                            onInterviewComplete: () => {
                                setInterviewComplete(true);
                                setCanAnswer(false);
                                setIsAnswering(false);
                                setSavingAnswer(false);
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                            },
                            onComplete: (result) => {
                                if (finishedRef.current) return;
                                finishedRef.current = true;
                                setEnding(true);
                                const done = normalizeLiveCompleteResult(result);
                                onFinished?.({
                                    result: done.result,
                                    score: done.score,
                                    feedback: done.feedback,
                                    isFinal: true,
                                });
                            },
                            onError: (err) => onError?.(err?.message || 'Live speech error'),
                        });
                        sessionRef.current = session;
                        await session.start();
                        if (!cancelled) setStatus('Listen to the interviewer — the first question is coming');
                    } catch (e) {
                        if (!cancelled) onError?.(e?.message || 'Could not start live speech');
                    }
                })();
                return () => {
                    cancelled = true;
                    sessionRef.current?.cancel?.();
                    sessionRef.current = null;
                };
            }, [context, relayFallback, tabSwitches, onError, addQuestion, setAnswerForQuestion]);

            React.useEffect(() => {
                cardsEndRef.current?.scrollIntoView?.({ behavior: 'smooth', block: 'end' });
            }, [cards, isAnswering, savingAnswer]);

            React.useEffect(() => {
                if (!answerTimerActive) {
                    if (timerRef.current) {
                        clearInterval(timerRef.current);
                        timerRef.current = null;
                    }
                    if (!isAnswering) setTimeLeft(null);
                    return undefined;
                }
                if (timeLeft == null) setTimeLeft(answerTimeLimit);
                timerRef.current = setInterval(() => {
                    setTimeLeft((prev) => {
                        if (prev == null || prev <= 1) {
                            clearInterval(timerRef.current);
                            timerRef.current = null;
                            if (sessionRef.current && !savingAnswer && !ending && !interviewComplete) {
                                if (isAnsweringRef.current) {
                                    sessionRef.current.submitAnswer?.();
                                    setIsAnswering(false);
                                    setCanAnswer(false);
                                    setSavingAnswer(true);
                                } else if (canAnswerRef.current) {
                                    sessionRef.current.beginAnswer?.();
                                    sessionRef.current.submitAnswer?.();
                                    setIsAnswering(false);
                                    setCanAnswer(false);
                                    setSavingAnswer(true);
                                }
                            }
                            setAnswerTimerActive(false);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    timerRef.current = null;
                };
            }, [answerTimerActive, answerTimeLimit, savingAnswer, ending, interviewComplete]);

            const handleAnswerToggle = () => {
                if (interviewComplete || ending || isLoading || savingAnswer) return;
                if (isAnswering) {
                    sessionRef.current?.submitAnswer?.();
                    setIsAnswering(false);
                    setCanAnswer(false);
                    setSavingAnswer(true);
                } else if (canAnswer) {
                    sessionRef.current?.beginAnswer?.();
                    setIsAnswering(true);
                }
            };

            const handleEnd = async () => {
                if (ending || isLoading || finishedRef.current) return;
                setEnding(true);
                setStatus('Saving your voice assessment…');
                try {
                    const result = await sessionRef.current?.end?.();
                    if (!result || finishedRef.current) return;
                    finishedRef.current = true;
                    const done = normalizeLiveCompleteResult(result);
                    onFinished?.({
                        result: done.result,
                        score: done.score,
                        feedback: done.feedback,
                        isFinal: true,
                    });
                } catch (e) {
                    onError?.(e?.message || 'Could not complete live speech');
                    setEnding(false);
                }
            };

            const voicePhases = Array.from({ length: maxTurns }, (_, i) => i + 1);
            const voiceStep = Math.min(maxTurns, Math.max(1, turn || currentQuestionNum || 1));
            const pct = maxTurns > 0 ? Math.min(100, (completedAnswers / maxTurns) * 100) : 0;
            const phaseDone = (p) => Boolean(cards[p - 1]?.answer);

            const sidebarExtras = (
                <>
                    {answerTimerActive && timeLeft != null ? (
                        <div className="flex justify-center py-1">
                            <TimerRing seconds={timeLeft} totalSeconds={answerTimeLimit} compact />
                        </div>
                    ) : null}
                    <div>
                        <p className="text-xs text-slate-500 mb-2">Mic level</p>
                        <div className="h-2 rounded-full bg-slate-800 overflow-hidden">
                            <div className="h-full bg-emerald-500 transition-all duration-75" style={{ width: `${Math.round(micLevel * 100)}%` }} />
                        </div>
                    </div>
                    <div>
                        <p className="text-xs text-slate-500 mb-1">Status</p>
                        <p className="text-xs text-slate-300 leading-relaxed">{status}</p>
                        {saveNotice ? (
                            <p className={`text-xs mt-2 leading-relaxed ${saveNotice.includes('saved') ? 'text-emerald-400/90' : 'text-amber-400/90'}`}>
                                {saveNotice}
                            </p>
                        ) : null}
                    </div>
                    {interviewComplete ? (
                        <p className="text-xs text-emerald-400/90 leading-relaxed">
                            All {maxTurns} questions complete — submitting results…
                        </p>
                    ) : null}
                    <button
                        type="button"
                        onClick={handleEnd}
                        disabled={ending || isLoading}
                        className={`w-full py-2.5 rounded-xl text-sm disabled:opacity-40 ${interviewComplete ? 'btn-primary' : 'btn-secondary border border-surface-border'}`}
                    >
                        {ending ? 'Finishing…' : interviewComplete ? 'Submitting results…' : 'End voice interview'}
                    </button>
                </>
            );

            return (
                <Shell subtitle={`Phase 2 · Live voice interview · Question ${voiceStep} of ${maxTurns}`} fullWidth footerNote="Use headphones to avoid echo. Allow microphone access.">
                    <div className="assessment-workspace fade-in portal-lock">
                        <AssessmentSidebar
                            phases={voicePhases}
                            currentStep={voiceStep}
                            totalSteps={maxTurns}
                            candidateEmail={candidateEmail || context?.candidate_email}
                            integrityViolationCount={integrityViolationCount}
                            pct={pct}
                            sessionLabel="Phase 2 — live voice communication"
                            instructions={LIVE_SPEECH_INSTRUCTIONS}
                            questionLabel="Voice Q"
                            phaseDone={phaseDone}
                            extraContent={sidebarExtras}
                        />
                        <div className="assessment-main">
                            {cards.length > 0 ? (
                                <div className="shrink-0 flex items-center gap-1.5 px-4 sm:px-5 lg:px-6 pt-4">
                                    {Array.from({ length: maxTurns }).map((_, i) => {
                                        const c = cards[i];
                                        const done = c && c.answer;
                                        const active = i === cards.length - 1 && !interviewComplete;
                                        return (
                                            <div key={i} className={`h-1.5 flex-1 rounded-full transition-all ${done ? 'bg-emerald-500' : active ? 'bg-indigo-400' : 'bg-surface-border'}`} />
                                        );
                                    })}
                                </div>
                            ) : null}
                            <div className="shrink-0 px-4 sm:px-5 lg:px-6 py-4 border-b border-surface-border/60">
                                <div className="flex items-center justify-between gap-4">
                                    <div className="min-w-0 flex-1">
                                        <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mb-1">Phase 2 · Live voice</p>
                                        <h1 className="text-xl sm:text-2xl font-bold text-white tracking-tight leading-tight">
                                            Question {voiceStep}
                                        </h1>
                                        <p className="text-sm text-slate-500 mt-1">
                                            {isAnswering
                                                ? 'Mic open — speak clearly in English, then submit'
                                                : savingAnswer
                                                ? 'Saving your answer — please wait…'
                                                : canAnswer
                                                ? 'Press Answer below to open your mic'
                                                : 'Listen to the interviewer'}
                                        </p>
                                    </div>
                                    {answerTimerActive && timeLeft != null ? (
                                        <TimerRing seconds={timeLeft} totalSeconds={answerTimeLimit} prominent />
                                    ) : null}
                                </div>
                            </div>
                            <div className="flex-1 min-h-0 overflow-y-auto px-4 sm:px-5 lg:px-6 py-4 flex flex-col">
                                {(() => {
                                    const card = cards.length ? cards[cards.length - 1] : null;
                                    const questionDisplay = liveQuestionCaption || card?.question || '';
                                    if (!card && !questionDisplay) {
                                        return (
                                            <div className="flex-1 min-h-[40vh] flex flex-col items-center justify-center text-center gap-3 text-slate-500">
                                                <div className="w-14 h-14 rounded-full border border-surface-border flex items-center justify-center text-indigo-300 text-2xl">🎧</div>
                                                <p className="text-sm max-w-sm">The interviewer will ask the first question out loud. Listen carefully, then press <span className="text-slate-300 font-medium">Answer</span> to reply.</p>
                                            </div>
                                        );
                                    }
                                    const recording = isAnswering;
                                    const saving = savingAnswer;
                                    const answered = Boolean(card?.answer);
                                    const waitingNext = answered && !interviewComplete;
                                    const qNum = card?.number || currentQuestionNum || 1;
                                    return (
                                        <div key={qNum} className="fade-in rounded-2xl border border-indigo-500/30 bg-surface-elevated/40 overflow-hidden shadow-lg shadow-indigo-500/5">
                                            <div className="px-6 py-5 border-b border-surface-border/70 bg-indigo-500/[0.06]">
                                                <div className="flex flex-wrap items-start justify-between gap-4">
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300/90">Interviewer · Question {qNum} of {maxTurns}</p>
                                                        <p className="text-lg text-indigo-50 mt-2 leading-relaxed">
                                                            {questionDisplay || '…'}
                                                            {isInterviewerSpeaking ? (
                                                                <span className="inline-block w-1.5 h-4 bg-indigo-400/70 ml-0.5 align-middle animate-pulse" />
                                                            ) : null}
