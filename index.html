                                if (phase === 'intro') {
                                    setWarmupQuestion('');
                                    setWarmupAnswer('');
                                    setWarmupCaption('');
                                    setIsAnswering(false);
                                    setCanAnswer(false);
                                    setLiveCaption('');
                                    setSilenceHint('');
                                    setIsInterviewerSpeaking(true);
                                }
                            },
                            onTurn: (payload) => {
                                if (payload?.savedStatus) {
                                    const { number, saved, error } = payload.savedStatus;
                                    setSavingAnswer(false);
                                    setSaveNotice(
                                        saved
                                            ? 'Answer saved.'
                                            : `Answer recorded — will retry on interview end.${error ? ` (${error})` : ''}`
                                    );
                                    return;
                                }
                                const { turn: t, maxTurns: m } = payload || {};
                                const capped = Math.min(Number(t) || 0, Number(m) || maxTurns);
                                // Never move progress backwards (turn_complete can arrive after next_question_ready).
                                setTurn((prev) => Math.max(Number(prev) || 0, capped));
                                if (m) setMaxTurns(m);
                            },
                            onQuestion: ({ number, text, partial, follow_up, warmup }) => {
                                const clean = cleanText(text, 'model');
                                const isWarmup = warmup != null || number <= 0;
                                if (partial) {
                                    if (!isWarmup && questionLockedRef.current) return;
                                    setIsInterviewerSpeaking(true);
                                    if (isWarmup) {
                                        setWarmupCaption(clean || '');
                                    } else {
                                        setLiveQuestionCaption(clean || '');
                                    }
                                    return;
                                }
                                if (isWarmup) {
                                    setWarmupQuestion(clean || warmupCaptionRef.current || 'Introduction');
                                    setWarmupCaption('');
                                    setWarmupAnswer('');
                                    setIsInterviewerSpeaking(false);
                                    setSavingAnswer(false);
                                    setLiveCaption('');
                                    return;
                                }
                                const heard = liveQuestionCaptionRef.current;
                                const committed = window.TA_LIVE?.chooseQuestionText
                                    ? window.TA_LIVE.chooseQuestionText(heard, clean)
                                    : clean;
                                setWarmupPhase(null);
                                questionLockedRef.current = true;
                                addQuestion(number, committed || clean);
                                setLiveQuestionCaption(committed || clean || '');
                                setIsInterviewerSpeaking(true);
                                setSavingAnswer(false);
                                setLiveCaption('');
                                setFollowUpActive(!!follow_up);
                                // Mic + timer are driven solely by awaiting_answer (same as warmup).
                            },
                            onFollowUpProbe: () => {
                                questionLockedRef.current = false;
                                setFollowUpActive(true);
                                setSavingAnswer(false);
                                setCanAnswer(false);
                                setIsAnswering(false);
                                setSilenceHint('');
                            },
                            onSilenceNudge: ({ stage, text }) => {
                                if (stage === 'auto_submit') {
                                    setSilenceHint('No response detected — submitting your answer…');
                                    return;
                                }
                                setSilenceHint(text || 'The interviewer is encouraging you to speak…');
                            },
                            onSavingTurn: () => {
                                awaitingAnswerRef.current = false;
                                canAnswerRef.current = false;
                                setIsAnswering(false);
                                setCanAnswer(false);
                                setSavingAnswer(true);
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                            },
                            onAnswer: ({ number, text, warmup }) => {
                                if (warmup != null || number <= 0) {
                                    awaitingAnswerRef.current = false;
                                    canAnswerRef.current = false;
                                    setWarmupAnswer(cleanText(text, 'user') || 'Answer captured');
                                    setIsAnswering(false);
                                    setCanAnswer(false);
                                    setLiveCaption('');
                                    setAnswerTimerActive(false);
                                    setTimeLeft(null);
                                    setSilenceHint('');
                                    return;
                                }
                                awaitingAnswerRef.current = false;
                                canAnswerRef.current = false;
                                setAnswerForQuestion(number, text);
                                setIsAnswering(false);
                                setSavingAnswer(true);
                                setCanAnswer(false);
                                setLiveCaption('');
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                                setSilenceHint('');
                            },
                            onAwaitingAnswer: ({ time_limit_seconds, warmup }) => {
                                const limit = Number(time_limit_seconds);
                                const nextLimit = Number.isFinite(limit) && limit > 0
                                    ? limit
                                    : defaultAnswerSeconds;
                                setQuestionTimeLimit(nextLimit);
                                canAnswerRef.current = true;
                                awaitingAnswerRef.current = true;
                                setCanAnswer(true);
                                setIsAnswering(false);
                                setSavingAnswer(false);
                                setLiveCaption('');
                                setLiveQuestionCaption('');
                                setWarmupCaption('');
                                setIsInterviewerSpeaking(false);
                                setAnswerTimerActive(true);
                                setTimeLeft(nextLimit);
                                setSilenceHint('');
                            },
                            onTimeLimitUpdate: ({ time_limit_seconds }) => {
                                const limit = Number(time_limit_seconds);
                                if (!Number.isFinite(limit) || limit <= 0) return;
                                setQuestionTimeLimit(limit);
                                setTimeLeft((prev) => {
                                    if (prev == null) return limit;
                                    const elapsed = Math.max(0, questionTimeLimitRef.current - prev);
                                    return Math.max(10, limit - elapsed);
                                });
                            },
                            onMicOpen: () => {
                                awaitingAnswerRef.current = false;
                                canAnswerRef.current = true;
                                setIsAnswering(true);
                                setCanAnswer(true);
                                setSilenceHint('');
                            },
                            onNextQuestionReady: ({ number }) => {
                                awaitingAnswerRef.current = false;
                                canAnswerRef.current = false;
                                setSavingAnswer(false);
                                setCanAnswer(false);
                                setIsAnswering(false);
                                setSilenceHint('');
                                // Clear any stale timer from the previous turn so it doesn't
                                // bleed into the loading phase of the next question.
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                                questionLockedRef.current = false;
                                if (number >= 1) {
                                    setWarmupPhase(null);
                                    setTurn(number);
                                    addQuestion(number, '…');
                                    window.TA_PROCTOR_ACTIVITY?.logQuestionOpened?.(
                                        number,
                                        `Opened voice question ${number}.`
                                    );
                                }
                                setIsInterviewerSpeaking(true);
                                setLiveQuestionCaption('');
                                setStatus('The interviewer is speaking…');
                            },
                            onPrematureClosing: () => {
                                setSavingAnswer(false);
                                setIsInterviewerSpeaking(true);
                                setStatus('Preparing the next step — please wait…');
                            },
                            onTurnScored: ({ number, score, feedback, soft_skills }) => {
                                setScoreForQuestion(number, score, feedback, soft_skills);
                            },
                            onInterviewComplete: (msg) => {
                                if (msg?.type === 'interview_closing') {
                                    setIsInterviewerSpeaking(true);
                                    setSavingAnswer(false);
                                    return;
                                }
                                setInterviewComplete(true);
                                setCanAnswer(false);
                                setIsAnswering(false);
                                setSavingAnswer(false);
                                setAnswerTimerActive(false);
                                setTimeLeft(null);
                                setLiveCaption('');
                                setLiveQuestionCaption('');
                            },
                            onComplete: (result) => {
                                if (finishedRef.current) return;
                                finishedRef.current = true;
                                setEnding(true);
                                const done = normalizeLiveCompleteResult(result);
                                onFinishedRef.current?.({
                                    result: done.result,
                                    score: done.score,
                                    feedback: done.feedback,
                                    isFinal: true,
                                });
                            },
                            onError: (err) => onErrorRef.current?.(err?.message || 'Live speech error'),
                        });
                        sessionRef.current = session;
                        await session.start();
                        if (!cancelled) {
                            setConnecting(false);
                            setStatus('Listen to the interviewer — setup is starting');
                        }
                    } catch (e) {
                        if (!cancelled) {
                            setConnecting(false);
                            setSessionLive(false);
                            onErrorRef.current?.(e?.message || 'Could not start live speech');
                        }
                    }
                })();
                return () => {
                    cancelled = true;
                    sessionRef.current?.cancel?.();
                    sessionRef.current = null;
                };
            }, [sessionLive, context?.session_id]);

            React.useEffect(() => {
                cardsEndRef.current?.scrollIntoView?.({ behavior: 'smooth', block: 'end' });
            }, [cards, isAnswering, savingAnswer]);

            React.useEffect(() => {
                if (!answerTimerActive || savingAnswer) {
                    if (timerRef.current) {
                        clearInterval(timerRef.current);
                        timerRef.current = null;
                    }
                    if (!answerTimerActive && !isAnswering && !savingAnswer) setTimeLeft(null);
                    return undefined;
                }
                if (timeLeft == null) setTimeLeft(questionTimeLimit);
                timerRef.current = setInterval(() => {
                    setTimeLeft((prev) => {
                        if (prev == null || prev <= 1) {
                            clearInterval(timerRef.current);
                            timerRef.current = null;
                            if (sessionRef.current && !savingAnswer && !ending && !interviewComplete) {
                                if (isAnsweringRef.current) {
                                    sessionRef.current.submitAnswer?.();
                                    setIsAnswering(false);
                                    setCanAnswer(false);
                                    setSavingAnswer(true);
                                }
                                // Never auto-submit an empty answer — if the mic never opened,
                                // keep waiting; the relay safety timer will re-open it.
                            }
                            setAnswerTimerActive(false);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    timerRef.current = null;
                };
            }, [answerTimerActive, questionTimeLimit, savingAnswer, ending, interviewComplete]);

            // Safety: never leave the UI stuck on "Saving…" if the next question is delayed.
            React.useEffect(() => {
                if (!savingAnswer) return undefined;
                const timer = setTimeout(() => {
                    setSavingAnswer(false);
                    setStatus((prev) => (
                        /saving/i.test(prev)
                            ? 'Preparing the next step — please wait…'
                            : prev
                    ));
                }, 6000);
                return () => clearTimeout(timer);
            }, [savingAnswer]);

            const handleAnswerToggle = () => {
                if (interviewComplete || ending || isLoading || savingAnswer) return;
                if (isAnswering) {
                    sessionRef.current?.submitAnswer?.();
                    setIsAnswering(false);
                    setCanAnswer(false);
                    setSavingAnswer(true);
                    setAnswerTimerActive(false);
                    setTimeLeft(null);
                } else if (canAnswer) {
                    // Don't optimistically flip to "recording" — onMicOpen will, once the
                    // mic is genuinely streaming, so the audio indicator stays truthful.
                    sessionRef.current?.beginAnswer?.();
                }
            };

            const handleStartInterview = async () => {
                if (sessionLive || connecting || ending || isLoading) return;
                setConnecting(true);
                setStatus('Enabling sound…');
                try {
                    if (window.TA_LIVE?.unlockAudioBeforeSession) {
                        await window.TA_LIVE.unlockAudioBeforeSession();
                    }
                } catch (_) {}
                setSessionLive(true);
                setStatus('Connecting to voice interviewer…');
            };

            const handleEnd = async () => {
                if (ending || isLoading || finishedRef.current) return;
                setEnding(true);
                setStatus('Saving your voice assessment…');
                try {
                    const result = await sessionRef.current?.end?.();
                    if (!result || finishedRef.current) return;
                    finishedRef.current = true;
                    const done = normalizeLiveCompleteResult(result);
                    onFinished?.({
                        result: done.result,
                        score: done.score,
                        feedback: done.feedback,
                        isFinal: true,
                    });
                } catch (e) {
                    onErrorRef.current?.(e?.message || 'Could not complete live speech');
                    setEnding(false);
                }
            };

            const inWarmup = Boolean(warmupPhase);

            const endBtnLabel = ending ? 'Finishing…' : interviewComplete ? 'Submitting…' : 'End interview';

            const micHeard = micLevel > 0.02;

            const statusHint = silenceHint
                ? silenceHint
                : warmupPhase === 'mic_check' && isAnswering
                ? 'Say a few words to test your microphone'
                : warmupPhase === 'mic_check'
                ? 'Listen — mic check starting soon'
                : warmupPhase === 'intro' && isAnswering
                ? 'Introduce yourself, then submit'
                : warmupPhase === 'intro'
                ? 'Listen — introduction prompt coming'
                : isAnswering
                ? 'Speak clearly in English, then submit'
                : savingAnswer && followUpActive
                ? 'Follow-up saved — next step…'
                : savingAnswer && cards[cards.length - 1]?.answer
                ? 'Answer saved — next step…'
                : savingAnswer
                ? 'Saving your answer…'
                : canAnswer
                ? 'Mic opens when the interviewer finishes'
                : followUpActive
                ? 'Listen to the follow-up'
                : 'Listen to the interviewer';

            // Card-free live stage — only shows who is speaking (AI vs candidate).
            const renderSpeechLiveStage = (opts = {}) => {
                const { warmup = false, answered = false, saving = false } = opts;
                const aiSpeaking = isInterviewerSpeaking && !isAnswering;
                const candidateSpeaking = isAnswering && !interviewComplete;
                const micReady = (canAnswer || candidateSpeaking) && !savingAnswer && !answered;
                const heard = micHeard;

                let orbClass = 'idle';
                let label = 'Getting ready…';
                let hint = statusHint;

                if (aiSpeaking) {
                    orbClass = 'ai-active';
                    label = 'Interviewer is speaking';
                    hint = warmup
                        ? (warmupPhase === 'mic_check' ? 'Mic check in progress — listen first' : 'Introduction prompt — listen first')
                        : (followUpActive ? 'Follow-up question — listen carefully' : 'Listen to the question');
                } else if (candidateSpeaking) {
                    orbClass = 'candidate-active';
                    label = "You're speaking";
                    hint = heard ? 'Keep going — tap the button when finished' : 'Start speaking — the mic is open';
                } else if (micReady && canAnswer && !isAnswering) {
                    orbClass = 'ready';
                    label = 'Your turn';
                    hint = warmup
                        ? (warmupPhase === 'mic_check' ? 'Tap the mic and say a few words' : 'Tap the mic and introduce yourself')
                        : 'Tap the mic when you are ready to answer';
                } else if (saving) {
                    orbClass = 'idle';
                    label = 'Saving your answer';
                    hint = 'Please wait while we save your response…';
                } else if (answered && !interviewComplete) {
                    orbClass = 'idle';
                    label = 'Answer captured';
                    hint = 'Preparing the next step…';
                } else if (warmup && !warmupPhase) {
                    orbClass = 'idle';
                    label = 'Connecting…';
                    hint = 'The interviewer will begin shortly';
                } else {
                    orbClass = 'idle';
                    label = 'Listen to the interviewer';
                    hint = answerTimerActive ? 'Mic opens shortly after they finish' : 'Use headphones for the best experience';
                }

                return (
                    <div className="speech-live-shell fade-in animate-slide-up">
                        <div className={`speech-live-orb ${orbClass}`}>
                            {aiSpeaking || candidateSpeaking ? (
                                <div className={`speech-live-bars ${aiSpeaking ? 'ai' : 'candidate'}`}>
                                    <span /><span /><span /><span />
                                </div>
                            ) : micReady ? (
                                <svg className="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4zm0 2a2 2 0 00-2 2v6a2 2 0 004 0V5a2 2 0 00-2-2zm-1 15.93V21h2v-2.07A8.001 8.001 0 0020 11h-2a6 6 0 01-12 0H4a8.001 8.001 0 007 7.93z" /></svg>
                            ) : (
                                <svg className="w-9 h-9" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.75" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M5 9v6h4l5 5V4L9 9H5z" />
                                </svg>
                            )}
                        </div>
                        <p className="speech-live-label">{label}</p>
                        <p className="speech-live-hint">{hint}</p>
                        {!warmup && !interviewComplete && cards.length > 0 && cards[cards.length - 1]?.question && cards[cards.length - 1].question !== '…' ? (
                            <p className="mt-4 max-w-lg mx-auto text-sm text-slate-700 leading-relaxed text-center px-4">
                                {cards[cards.length - 1].question}
                            </p>
                        ) : null}
                        {candidateSpeaking ? (
                            <div className="flex items-center justify-center gap-2 mt-3">
                                <span className={`w-2 h-2 rounded-full ${heard ? 'bg-emerald-500 animate-pulse' : 'bg-slate-300'}`} />
                                <span className={`text-xs font-medium ${heard ? 'text-emerald-600' : 'text-slate-400'}`}>
                                    {heard ? 'Audio detected' : 'Waiting for audio…'}
                                </span>
                            </div>
                        ) : null}
                        {silenceHint ? (
                            <p className="text-xs text-amber-700 mt-3 max-w-xs">{silenceHint}</p>
                        ) : null}
                    </div>
                );
            };

            const renderMicControls = (warmup = false, answered = false) => {
                const isMicCheck = warmup && warmupPhase === 'mic_check';
                const heard = micHeard;
                const showMic = (isAnswering || (canAnswer && !answered)) && !savingAnswer;
                if (!showMic && !answered) return null;
                return (
                    <div className="speech-live-mic-area">
                        {showMic ? (
                            <div className="flex flex-col items-center">
                                <div className={`mic-btn-wrap mb-3 ${isAnswering ? 'mic-btn-active' : ''}`}>
                                    {isAnswering && (
                                        <>
                                            <div className="mic-ring mic-ring-1" style={{ background: heard ? (warmup ? 'rgba(245,158,11,0.18)' : 'rgba(16,185,129,0.18)') : (warmup ? 'rgba(245,158,11,0.12)' : 'rgba(79,70,229,0.15)') }} />
                                            <div className="mic-ring mic-ring-2" style={{ background: heard ? (warmup ? 'rgba(245,158,11,0.14)' : 'rgba(16,185,129,0.14)') : (warmup ? 'rgba(245,158,11,0.08)' : 'rgba(79,70,229,0.12)') }} />
                                            <div className="mic-ring mic-ring-3" style={{ background: heard ? (warmup ? 'rgba(245,158,11,0.1)' : 'rgba(16,185,129,0.1)') : (warmup ? 'rgba(245,158,11,0.05)' : 'rgba(79,70,229,0.08)') }} />
                                        </>
                                    )}
                                    <button
                                        type="button"
                                        onClick={handleAnswerToggle}
                                        disabled={(!canAnswer && !isAnswering) || savingAnswer}
                                        className={`relative z-10 w-20 h-20 rounded-full flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-4 shadow-lg disabled:opacity-50 ${
                                            isAnswering
                                                ? 'bg-red-500 hover:bg-red-600 focus:ring-red-200 shadow-red-200'
                                                : warmup
                                                ? 'bg-gradient-to-br from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 focus:ring-amber-200 shadow-amber-200'
                                                : 'bg-gradient-to-br from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 focus:ring-indigo-200 shadow-indigo-200'
                                        }`}
                                    >
                                        {isAnswering ? (
                                            <svg className="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                                        ) : (
                                            <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4zm0 2a2 2 0 00-2 2v6a2 2 0 004 0V5a2 2 0 00-2-2zm-1 15.93V21h2v-2.07A8.001 8.001 0 0020 11h-2a6 6 0 01-12 0H4a8.001 8.001 0 007 7.93z" /></svg>
                                        )}
                                    </button>
                                </div>
                                <p className={`text-sm font-semibold ${isAnswering ? 'text-red-600' : warmup ? 'text-amber-600' : 'text-indigo-600'}`}>
                                    {isAnswering
                                        ? (isMicCheck ? 'Mic on — tap to submit' : 'Recording — tap to submit')
                                        : (isMicCheck ? 'Tap to start mic check' : 'Tap to start speaking')}
                                </p>
                                {isAnswering ? (
                                    <div className="flex flex-col items-center gap-1.5 mt-2">
                                        <div className="flex items-center gap-1.5">
                                            <span className={`w-2 h-2 rounded-full animate-pulse ${heard ? 'bg-emerald-500' : 'bg-slate-400'}`} />
                                            <span className={`text-xs ${heard ? 'text-emerald-600' : 'text-slate-400'}`}>
                                                {heard ? 'Audio detected' : 'Waiting for audio…'}
                                            </span>
                                        </div>
                                        {silenceHint ? <p className="text-xs text-amber-700 text-center max-w-xs">{silenceHint}</p> : null}
                                    </div>
                                ) : null}
                            </div>
                        ) : null}
                    </div>
                );
            };

            if (!sessionLive) {
                return (
                    <Shell subtitle="Phase 2 · Voice interview" fullWidth footerNote="Use headphones to avoid echo. Allow microphone access when prompted.">
                        <PortalPage size="narrow">
                            <div className="p-5 sm:p-8 text-center">
                                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-indigo-600 text-white flex items-center justify-center text-2xl mx-auto mb-5 shadow-lg">🎙</div>
                                <p className="text-[10px] font-bold uppercase tracking-widest text-violet-600 mb-2">Before the interview</p>
                                <h1 className="text-xl sm:text-2xl font-bold text-slate-900 tracking-tight mb-2.5">Voice interview setup</h1>
                                <p className="text-sm text-slate-600 leading-relaxed mb-5">
                                    The AI interviewer will check your mic, ask for a brief intro, then continue with the voice interview.
                                </p>
                                <ol className="text-left text-sm text-slate-600 space-y-2 mb-6 max-w-xs mx-auto">
                                    <li className="flex gap-2"><span className="text-violet-600 font-bold">1.</span> Microphone check — say a few words</li>
                                    <li className="flex gap-2"><span className="text-violet-600 font-bold">2.</span> Short introduction about yourself</li>
                                    <li className="flex gap-2"><span className="text-violet-600 font-bold">3.</span> Voice interview conversation</li>
                                </ol>
                                <button
                                    type="button"
                                    onClick={handleStartInterview}
                                    disabled={connecting || isLoading}
                                    className="btn-primary w-full py-3.5 text-base font-semibold rounded-xl disabled:opacity-50"
                                >
                                    {connecting ? 'Connecting…' : 'Start voice interview'}
                                </button>
                                <p className="text-xs text-slate-400 mt-3 leading-relaxed">
                                    Tap Start to enable sound and connect. Use headphones to avoid echo.
                                </p>
                            </div>
                        </PortalPage>
                    </Shell>
                );
            }

            return (
                <Shell subtitle="Phase 2 · Voice interview" fullWidth immersive footerNote="Use headphones to avoid echo. Allow microphone access.">
                    <div className="assessment-workspace speech-workspace-full fade-in portal-lock h-full">
                        <div className="assessment-main speech-main-full">
                            <div className="speech-progress-bar shrink-0">
                                {inWarmup ? (
                                    <>
                                        <div className={`h-1 flex-1 rounded-full transition-all duration-500 ${warmupPhase === 'mic_check' ? 'bg-indigo-500' : 'bg-emerald-500'}`} />
                                        <div className={`h-1 flex-1 rounded-full transition-all duration-500 ${warmupPhase === 'intro' ? 'bg-indigo-500' : warmupPhase === 'mic_check' ? 'bg-slate-200' : 'bg-emerald-500'}`} />
                                    </>
                                ) : (
                                    Array.from({ length: maxTurns }).map((_, i) => {
                                        const c = cards[i];
                                        const done = c && c.answer;
                                        const active = i === cards.length - 1 && !interviewComplete;
                                        return (
                                            <div key={i} className={`h-1 flex-1 rounded-full transition-all duration-500 ${done ? 'bg-emerald-500' : active ? 'bg-indigo-500' : 'bg-slate-200'}`} />
                                        );
                                    })
                                )}
                            </div>
                            <div className="speech-top-bar shrink-0">
                                <p className="text-xs sm:text-sm text-slate-500 leading-snug min-w-0 flex-1 truncate">{statusHint}</p>
                                <div className="flex items-center gap-2 shrink-0">
                                    {answerTimerActive && timeLeft != null && !warmupPhase ? (
                                        <TimerRing seconds={timeLeft} totalSeconds={questionTimeLimit} compact />
                                    ) : null}
                                    <button
                                        type="button"
                                        onClick={handleEnd}
                                        disabled={ending || isLoading}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap disabled:opacity-40 transition-all ${interviewComplete ? 'btn-primary' : 'btn-secondary'}`}
                                    >
                                        {endBtnLabel}
                                    </button>
                                </div>
                            </div>
                            {saveNotice ? (

        /** Question reveal — brief loading beat, then show full text (no word-by-word typing). */
        function useQuestionReveal(question, step) {
            const initialFull = String(question || '').trim();
            const [displayed, setDisplayed] = React.useState('');
            const [phase, setPhase] = React.useState(initialFull ? 'pending' : 'idle'); // idle | pending | done

            React.useEffect(() => {
                const full = String(question || '').trim();
                if (!full) {
                    setDisplayed('');
                    setPhase('idle');
                    return undefined;
                }

                setDisplayed('');
                setPhase('pending');
                let cancelled = false;

                const startTimer = setTimeout(() => {
                    if (cancelled) return;
                    setDisplayed(full);
                    setPhase('done');
                }, step === 1 ? 920 : 420);

                return () => {
                    cancelled = true;
                    clearTimeout(startTimer);
                };
            }, [question, step]);

            return {
                displayed,
                isPending: phase === 'pending',
                isTyping: false,
                isDone: phase === 'done',
            };
        }

        const SpeechAssessmentView = ({
            speechIndex,
            speechTotal,
            absolutePhase,
            timeLeft,
            phaseTimeLimit,
            question,
            isLoading,
            candidateEmail,
            integrityViolationCount,
            contentMasked,
            onSubmitSpeech,
            onQuestionPlaybackComplete,
            timerReady,
        }) => {
            const transcriberRef = React.useRef(null);
            const speakRef = React.useRef(null);
            const transcriptRef = React.useRef('');
            const recordingPayloadRef = React.useRef(null);
            const timerStartedRef = React.useRef(false);
            const stoppingRef = React.useRef(false);
            const [isRecording, setIsRecording] = React.useState(false);
            const [isSpeaking, setIsSpeaking] = React.useState(false);
            const [isStopping, setIsStopping] = React.useState(false);
            const [isRefiningTranscript, setIsRefiningTranscript] = React.useState(false);
            const [typedQuestion, setTypedQuestion] = React.useState('');
            const [transcript, setTranscript] = React.useState('');
            const [recordError, setRecordError] = React.useState('');
            const [audioHint, setAudioHint] = React.useState('');
            const [micLevel, setMicLevel] = React.useState(0);
            const [recordingReady, setRecordingReady] = React.useState(false);
            const phases = Array.from({ length: speechTotal }, (_, i) => i + 1);
            const pct = speechTotal > 0 ? Math.min(100, (speechIndex / speechTotal) * 100) : 0;
            const wordCount = transcript.trim() ? transcript.trim().split(/\s+/).length : 0;
            const canSubmit = !contentMasked && !isLoading && !isRecording && !isStopping
                && wordCount >= 4 && recordingReady;

            const updateTranscript = React.useCallback((text) => {
                const clean = window.TA_SPEECH?.liveSanitize
                    ? window.TA_SPEECH.liveSanitize(text)
                    : String(text || '').replace(/\s+/g, ' ').trim();
                transcriptRef.current = clean;
                setTranscript(clean);
            }, []);

            const notifyPlaybackComplete = React.useCallback(() => {
                if (timerStartedRef.current) return;
                timerStartedRef.current = true;
                onQuestionPlaybackComplete?.();
            }, [onQuestionPlaybackComplete]);

            const startQuestionPlayback = React.useCallback(() => {
                if (!question || !window.TA_SPEECH) return;
                speakRef.current?.cancel?.();
                setTypedQuestion('');
                setIsSpeaking(true);
                if (window.TA_SPEECH.speakQuestionWithTypewriter) {
                    speakRef.current = window.TA_SPEECH.speakQuestionWithTypewriter(question, {
                        onUpdate: setTypedQuestion,
                        onEnd: () => {
                            setIsSpeaking(false);
                            notifyPlaybackComplete();
                        },
                    });
                } else {
                    window.TA_SPEECH.speakQuestion(question);
                    setTypedQuestion(question);
                    setIsSpeaking(false);
                    notifyPlaybackComplete();
                }
            }, [question, notifyPlaybackComplete]);

            React.useEffect(() => {
                transcriptRef.current = '';
                setTranscript('');
                setRecordError('');
                setAudioHint('');
                setMicLevel(0);
                setIsRecording(false);
                setIsStopping(false);
                setIsRefiningTranscript(false);
                recordingPayloadRef.current = null;
                setRecordingReady(false);
                timerStartedRef.current = false;
                if (transcriberRef.current) {
                    transcriberRef.current.cancel();
                    transcriberRef.current = null;
                }
            }, [absolutePhase, question]);

            React.useEffect(() => {
                if (!question || contentMasked || isLoading) return undefined;
                const t = setTimeout(() => startQuestionPlayback(), 400);
                return () => {
                    clearTimeout(t);
                    speakRef.current?.cancel?.();
                };
            }, [question, speechIndex, contentMasked, isLoading, startQuestionPlayback]);

            const startRecording = async () => {
                setRecordError('');
                setAudioHint('');
                if (!window.TA_SPEECH?.createLiveTranscriber) {
                    setRecordError('Speech module not loaded. Refresh the page.');
                    return;
                }
                try {
                    speakRef.current?.cancel?.();
                    setIsSpeaking(false);
                    setTypedQuestion(question);
                    await new Promise((resolve) => setTimeout(resolve, 350));
                    transcriptRef.current = '';
                    setTranscript('');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    transcriberRef.current?.cancel?.();
                    transcriberRef.current = window.TA_SPEECH.createLiveTranscriber({
                        onTranscript: updateTranscript,
                        onMicLevel: (level) => setMicLevel(Math.max(0, Math.min(1, Number(level) || 0))),
                        onFinalTranscript: (refined) => {
                            if (!refined) return;
                            updateTranscript(refined);
                            if (recordingPayloadRef.current?.blob) {
                                recordingPayloadRef.current = {
                                    ...recordingPayloadRef.current,
                                    text: refined,
                                };
                            }
                            setIsRefiningTranscript(false);
                        },
                        onStatus: (status) => {
                            if (status === 'recording') setRecordError('');
                        },
                    });
                    await transcriberRef.current.start();
                    setIsRecording(true);
                } catch (e) {
                    transcriberRef.current?.cancel?.();
                    transcriberRef.current = null;
                    setRecordError('Microphone access required for communication assessment.');
                }
            };

            const stopRecording = async () => {
                if (!isRecording || stoppingRef.current) return;
                stoppingRef.current = true;
                setIsRecording(false);
                setMicLevel(0);
                setIsStopping(true);
                try {
                    const session = transcriberRef.current;
                    let text = transcriptRef.current || transcript;
                    let blob = null;
                    let durationSeconds = 0;
                    let delivery = null;
                    if (session) {
                        const stopped = await session.stop();
                        text = stopped.text || text;
                        blob = stopped.blob;
                        durationSeconds = stopped.durationSeconds;
                        delivery = stopped.delivery;
                    }
                    transcriberRef.current = null;
                    if (window.TA_SPEECH?.sanitizeTranscript) {
                        text = window.TA_SPEECH.sanitizeTranscript(text);
                    }
                    updateTranscript(text);

                    const minBytes = Math.max(800, Math.floor((durationSeconds || 0) * 350));
                    if (!blob || blob.size < minBytes) {
                        setRecordError(
                            `Audio too short (${blob ? Math.round(blob.size / 1024) + ' KB' : '0 KB'} for ${Math.round(durationSeconds || 0)}s). Record a longer answer and try again.`
                        );
                        recordingPayloadRef.current = null;
                        setRecordingReady(false);
                        setIsRefiningTranscript(false);
                        return;
                    }
                    recordingPayloadRef.current = { text, blob, durationSeconds, delivery };
                    setRecordingReady(true);
                    setRecordError('');
                    setIsRefiningTranscript(true);
                } catch (e) {
                    console.error(e);
                    setRecordError('Could not process recording. Check microphone permissions.');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    setIsRefiningTranscript(false);
                } finally {
                    setIsStopping(false);
                    stoppingRef.current = false;
                }
            };

            const handleSubmit = async () => {
                const payload = recordingPayloadRef.current;
                if (!payload?.blob) {
                    setRecordError('Record your answer first, then submit.');
                    return;
                }
                try {
                    const submitResult = await onSubmitSpeech({
                        transcript: payload.text || transcript,
                        blob: payload.blob,
                        durationSeconds: payload.durationSeconds,
                        delivery: payload.delivery,
                    });
                    transcriptRef.current = '';
                    setTranscript('');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    if (submitResult?.audioSaved) {
                        setAudioHint('Voice recording saved.');
                    } else if (submitResult?.audioError) {
                        setAudioHint('Answer submitted. Audio not saved: ' + submitResult.audioError);
                    }
                } catch (e) {
                    console.error(e);
                    setRecordError('Could not submit your answer. Please try again.');
                }
            };

            const showTimer = timerReady && phaseTimeLimit != null && timeLeft != null;

            return (
                <Shell subtitle="Phase 2 · Voice interview" fullWidth immersive>
                    <div className="assessment-workspace speech-workspace-full fade-in assessment-lock h-full">
                        <div className="assessment-main speech-main-full">
                            <div className="speech-progress-bar shrink-0">
                                {phases.map((p) => (
                                    <div key={p} className={`h-1 flex-1 rounded-full transition-all duration-500 ${p < speechIndex ? 'bg-emerald-500' : p === speechIndex ? 'bg-indigo-500' : 'bg-slate-200'}`} />
                                ))}
                            </div>
                            <div className="speech-top-bar shrink-0">
                                <p className="text-xs sm:text-sm text-slate-500 leading-snug min-w-0 flex-1">
                                    {isSpeaking ? 'Listen to the question — timer starts when playback finishes' : 'Record your spoken answer, then submit'}
                                </p>
                                {showTimer ? (
                                    <TimerRing seconds={timeLeft} totalSeconds={phaseTimeLimit} compact />
                                ) : isSpeaking ? (
                                    <div className="shrink-0 flex items-center gap-1 px-2 py-1 rounded-lg bg-indigo-50 border border-indigo-100">
                                        <span className="w-1 h-3 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                                        <span className="w-1 h-4 bg-indigo-500 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                                        <span className="w-1 h-3 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                                    </div>
                                ) : null}
                            </div>

                            <div className="flex-1 min-h-0 overflow-y-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col">
                                {speechIndex === 1 ? (
                                    <div className="mb-4 rounded-2xl border border-indigo-100 bg-gradient-to-r from-indigo-50/80 to-violet-50/40 px-5 py-4 shrink-0 animate-fade-up flex items-start gap-3">
                                        <div className="w-8 h-8 rounded-xl bg-indigo-100 border border-indigo-200 flex items-center justify-center shrink-0">
                                            <svg className="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                                        </div>
                                        <div>
                                            <p className="text-sm font-semibold text-slate-800">Phase 2 — Voice communication interview</p>
                                            <p className="text-xs text-slate-500 mt-0.5 leading-relaxed">
                                                This is a speech-to-speech round. Take a moment to settle in a quiet space before recording.
                                            </p>
                                        </div>
                                    </div>
                                ) : null}

                                <div className="speech-answer-panel flex-1 min-h-0 flex flex-col speech-question-card relative animate-fade-up">
                                    {isLoading && (
                                        <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-10 rounded-2xl flex flex-col items-center justify-center gap-4">
                                            <div className="w-10 h-10 border-2 border-violet-100 border-t-violet-600 rounded-full animate-spin" />
                                            <p className="text-sm text-slate-500">Processing your response…</p>
                                        </div>
                                    )}

                                    <div className="shrink-0 px-5 sm:px-6 pt-5 pb-4 border-b border-slate-100">
                                        <div className="flex items-center justify-between gap-3 mb-3">
                                            <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">Interviewer</p>
                                            <button
                                                type="button"
                                                onClick={startQuestionPlayback}
                                                disabled={contentMasked || isLoading || isRecording}
                                                className="btn-secondary px-3 py-1.5 rounded-xl text-xs shrink-0 flex items-center gap-1.5"
                                            >
                                                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd" /></svg>
                                                {isSpeaking ? 'Playing…' : 'Replay'}
                                            </button>
                                        </div>
                                        {contentMasked ? (
                                            <div className="rounded-xl border border-amber-200 bg-amber-50 px-5 py-8 text-center">
                                                <p className="text-base font-semibold text-amber-800 mb-2">Content protected</p>
                                                <p className="text-sm text-slate-400 leading-relaxed">
                                                    Return to fullscreen and close developer tools to continue.
                                                </p>
                                            </div>
                                        ) : (
                                            <div className="question-protected question-text min-h-[3rem] text-sm sm:text-base leading-relaxed">
                                                {typedQuestion || (isSpeaking ? '' : question)}
                                                {isSpeaking ? (
                                                    <span className="inline-block w-1.5 h-5 bg-indigo-400/80 ml-0.5 align-middle animate-pulse rounded-sm" aria-hidden="true" />
                                                ) : null}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex-1 flex flex-col min-h-0 px-4 sm:px-5 py-4">
                                        <div className={`speech-response-box ${isRecording ? '' : 'opacity-80'}`}>
                                            <p className="text-[10px] font-bold uppercase tracking-widest mb-1.5 text-emerald-800">Your response</p>
                                            <p className="text-sm sm:text-base text-slate-800 whitespace-pre-wrap break-words leading-relaxed min-h-[2.5rem]">
                                                {transcript || (isRecording
                                                    ? 'Listening… speak now — words appear here live.'
                                                    : isStopping
                                                        ? 'Saving recording…'
                                                        : 'Press Record, speak, then submit.')}
                                                {isRecording ? (
                                                    <span className="inline-block w-0.5 h-[1em] bg-emerald-400 ml-0.5 align-middle animate-pulse" aria-hidden="true" />
                                                ) : null}
                                            </p>
                                        </div>

                                        {/* Mic animation + record button */}
                                        <div className="mt-5 flex flex-col items-center gap-3 shrink-0">
                                            <div className={`mic-btn-wrap ${isRecording ? 'mic-btn-active' : ''}`}>
                                                {isRecording && (
                                                    <>
                                                        <div className="mic-ring mic-ring-1" style={{ background: micLevel > 0.05 ? 'rgba(16,185,129,0.18)' : 'rgba(79,70,229,0.15)' }} />
                                                        <div className="mic-ring mic-ring-2" style={{ background: micLevel > 0.05 ? 'rgba(16,185,129,0.14)' : 'rgba(79,70,229,0.12)' }} />
                                                        <div className="mic-ring mic-ring-3" style={{ background: micLevel > 0.05 ? 'rgba(16,185,129,0.1)' : 'rgba(79,70,229,0.08)' }} />
                                                    </>
                                                )}
                                                <button
                                                    type="button"
                                                    onClick={isRecording ? stopRecording : startRecording}
                                                    disabled={contentMasked || isLoading || isStopping || (!isRecording && isSpeaking)}
                                                    className={`relative z-10 w-20 h-20 rounded-full flex items-center justify-center transition-all duration-200 focus:outline-none focus:ring-4 shadow-lg disabled:opacity-40 ${
                                                        isRecording
                                                            ? 'bg-red-500 hover:bg-red-600 focus:ring-red-200 shadow-red-200'
                                                            : 'bg-gradient-to-br from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 focus:ring-indigo-200 shadow-indigo-200'
                                                    }`}
                                                >
                                                    {isStopping ? (
                                                        <span className="w-5 h-5 border-2 border-white/40 border-t-white rounded-full animate-spin" />
                                                    ) : isRecording ? (
                                                        <svg className="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                                                    ) : (
                                                        <svg className="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1a4 4 0 014 4v6a4 4 0 01-8 0V5a4 4 0 014-4zm0 2a2 2 0 00-2 2v6a2 2 0 004 0V5a2 2 0 00-2-2zm-1 15.93V21h2v-2.07A8.001 8.001 0 0020 11h-2a6 6 0 01-12 0H4a8.001 8.001 0 007 7.93z" /></svg>
                                                    )}
                                                </button>
                                            </div>
                                            <div className="flex flex-col items-center gap-1">
                                                <p className={`text-sm font-semibold ${isRecording ? 'text-red-600' : isStopping ? 'text-amber-600' : 'text-indigo-600'}`}>
                                                    {isStopping ? 'Saving recording…' : isRecording ? 'Recording — tap to stop' : 'Tap to start recording'}
                                                </p>
                                                {isRecording && (
                                                    <div className="flex items-center gap-1.5">
                                                        <span className={`w-2 h-2 rounded-full animate-pulse ${micLevel > 0.05 ? 'bg-emerald-500' : 'bg-slate-400'}`} />
                                                        <span className={`text-xs ${micLevel > 0.05 ? 'text-emerald-600' : 'text-slate-400'}`}>
                                                            {micLevel > 0.05 ? 'Receiving audio' : 'Waiting for voice…'}
                                                        </span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {recordError ? <p className="text-sm text-red-600 mt-3">{recordError}</p> : null}
                                        {!recordError && isRecording ? (
                                            <p className="text-xs text-slate-500 mt-2">Tip: use headphones so the mic does not pick up the question audio.</p>
                                        ) : null}
                                        {audioHint ? <p className="text-xs text-slate-500 mt-2">{audioHint}</p> : null}
                                    </div>

                                    <div className="shrink-0 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 px-5 sm:px-6 py-4 border-t border-slate-100 bg-slate-50/50 rounded-b-2xl">
                                        <div>
                                            <p className={`text-xs font-medium ${canSubmit ? 'text-emerald-600' : 'text-slate-400'}`}>
                                                {canSubmit
                                                    ? '✓ Ready to submit'
                                                    : isRecording
                                                        ? 'Stop recording when you finish speaking'
                                                        : isStopping
                                                            ? 'Saving your recording…'
                                                            : isRefiningTranscript
                                                                ? 'You can submit — transcript is being refined'
                                                                : 'Record at least a few words before submitting'}
                                            </p>
                                            <p className="text-xs text-slate-400 mt-0.5 tabular-nums">{wordCount} words</p>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={handleSubmit}
                                            disabled={!canSubmit}
                                            className="btn-primary px-10 py-3.5 rounded-xl text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed w-full sm:w-auto flex items-center justify-center gap-2"
                                        >
                                            Submit answer
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                    </div>
                </div>
            </Shell>
        );
        };

        const cleanUrlParam = (value) => {
            if (!value) return '';
            return decodeURIComponent(String(value)).trim().split(/\n/)[0].split(/\s+regards/i)[0].trim();
        };

        const parseSessionConfig = (raw) => {
            if (!raw) return {};
            if (typeof raw === 'object') return raw;
            try { return JSON.parse(raw); } catch (e) { return {}; }
        };

        const isVoiceHistoryMode = (mode) => {
            const m = String(mode || '').toLowerCase();
            return m === 'speech' || m === 'live_speech' || m === 'live speech';
        };

        const resolveAssessmentMode = (data, phaseNum, phaseRow) => {
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            const speechPhases = Number(cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const stage = String(data?.assessment_stage || 'technical').toLowerCase();
            const isSpeech =
                stage === 'speech' ||
                Number(phaseNum) > maxQ ||
                isVoiceHistoryMode(phaseRow?.mode);
            return {
                mode: isSpeech ? 'speech' : 'text',
                techMaxSteps: maxQ,
                speechTotalSteps: speechPhases,
                totalSteps: isSpeech ? maxQ + speechPhases : maxQ,
            };
        };

        const speechPhasesFromResponse = (data) => {
            const cfg = parseSessionConfig(data?.config);
            return Number(data?.speech_phases || cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
        };

        const buildClientSpeechFallback = (cfg, speechIndex) => {
            const role = String(cfg?.requisition_title || 'this role').trim();
            const lanes = [
                'Describe a situation where you had to explain a complex technical topic to a non-technical stakeholder. How did you ensure they understood?',
                'Tell me about a time you faced pressure, a tight deadline, or conflict at work. How did you communicate and stay composed?',
                `Why are you interested in the ${role} role, and what would you focus on in your first 90 days?`,
                'Describe a time you had to collaborate with another team or stakeholder who disagreed with your approach. How did you handle it?',
                'Tell me about a mistake or setback you learned from. What did you change in how you communicate or work afterward?',
            ];
            const idx = Math.max(0, Math.min(lanes.length - 1, Number(speechIndex || 1) - 1));
            return lanes[idx];
        };

        const resolveQuestionForPhase = (row, phaseNum, data) => {
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            let q = String(row?.question_text || row?.question || '').trim();
            if (!q && Number(phaseNum) > maxQ) {
                q = buildClientSpeechFallback(cfg, Number(phaseNum) - maxQ);
            }
            if (!q && Number(phaseNum) === 1) {
                let screening = data?.screening;
                if (typeof screening === 'string') {
                    try { screening = JSON.parse(screening); } catch (e) { screening = {}; }
                }
                q = String(screening?.phase_1_question || cfg?.phase_1_question || '').trim();
            }
            return q;
        };

        const resolveResumeTarget = (history, data) => {
            if (!history?.length) return null;
            const idx = history.findIndex(isPhaseUnanswered);
            if (idx < 0) return null;
            const row = history[idx];
            const phaseNum = Number(row?.phase) || idx + 1;
            const questionText = resolveQuestionForPhase(row, phaseNum, data);
            return { phaseIndex: idx, phaseNum, row, questionText };
        };

        const inspectSessionProgress = (data) => {
            const history = buildHistoryFromSession(data);
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            const speechPhases = Number(cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const stage = String(data?.assessment_stage || 'technical').toLowerCase();
            const techAnswered = history.filter((h) => {
                const p = Number(h.phase);
                return p >= 1 && p <= maxQ && !isPhaseUnanswered(h);
            }).length;
            const resume = resolveResumeTarget(history, data);
            if (!resume) {
                return {
                    kind: 'completed',
                    techTotal: maxQ,
                    speechTotal: speechPhases,
                    techAnswered: Math.min(techAnswered, maxQ),
                };
            }
            const { phaseNum } = resume;
            if (phaseNum > maxQ || stage === 'speech' || stage === 'live_speech') {
                if (stage === 'live_speech') {
                    return {
                        kind: 'live_speech',
                        techTotal: maxQ,
                        speechTotal: speechPhases,
                        techAnswered: maxQ,
                        nextPhaseNum: phaseNum,
                        speechIndex: phaseNum - maxQ,
                    };
                }
                return {
                    kind: phaseNum === maxQ + 1 ? 'speech_intro' : 'speech',
                    techTotal: maxQ,
                    speechTotal: speechPhases,
                    techAnswered: maxQ,
                    nextPhaseNum: phaseNum,
                    speechIndex: phaseNum - maxQ,
                };
            }
            return {
                kind: 'technical',
                techTotal: maxQ,
                speechTotal: speechPhases,
                techAnswered,
                nextPhaseNum: phaseNum,
            };
        };

        const normalizeJobId = (value) => String(value || '').trim().toLowerCase();

        const sessionStatusBlocked = (status) => sessionStatusIsClosed(status);

        const pickSessionForJob = (rows, jobId) => pickActiveSessionForJob(rows, jobId);

        const isPhaseUnanswered = (h) => {
            if (!h) return false;
            const a = h.answer_text;
            return a === null || a === undefined || String(a).trim() === '';
        };

        const buildHistoryFromSession = (data) => {
            let history = parseInterviewHistory(data?.interview_history);
            if (history.length) return history;

            let screening = data?.screening;
            if (typeof screening === 'string') {
                try { screening = JSON.parse(screening); } catch (e) { screening = {}; }
            }
            const cfg = parseSessionConfig(data?.config);
            const q = String(
                screening?.phase_1_question ||
                cfg?.phase_1_question ||
                ''
            ).trim();
            if (!q) return [];

            const sec = Number(
                screening?.time_limit_seconds ||
                screening?.phase_1_time_limit_seconds ||
                cfg?.phase_1_time_limit_seconds ||
                240
            ) || 240;

            return [{
                phase: 1,
                question_text: q,
                answer_text: null,
                time_limit_seconds: sec,
                deadline_at: null,
            }];
        };

        const parseInterviewHistory = (raw) => {
            let history = raw || [];
            if (typeof history === 'string') {
                try { history = JSON.parse(history); } catch (e) { history = []; }
            }
            return Array.isArray(history) ? history : [];
        };

        const getAiTimeLimitSeconds = (phaseRow) => {
            const limit = Number(phaseRow?.time_limit_seconds);
            return Number.isFinite(limit) && limit > 0 ? limit : null;
        };

        const computeRemainingFromPhase = (phaseRow) => {
            if (!phaseRow) return null;
            if (phaseRow.deadline_at) {
                return Math.max(0, Math.floor((new Date(phaseRow.deadline_at).getTime() - Date.now()) / 1000));
            }
            return getAiTimeLimitSeconds(phaseRow);
        };

        const normalizeInterviewHistory = (raw) => {
            let history = raw || [];
            if (typeof history === 'string') {
                try { history = JSON.parse(history); } catch (e) { history = []; }
            }
            if (!Array.isArray(history)) return [];
            return history
                .map((item, index) => ({
                    phase: item.phase ?? index + 1,
                    mode: item.mode || '',
                    question_text: item.question_text || item.question || '—',
                    answer_text: item.answer_text ?? item.answer ?? '',
                    score: item.score != null ? item.score : '—',
                    feedback: (item.feedback && String(item.feedback).trim())
                        ? String(item.feedback).trim()
                        : '—',
                    suggested_answer: (item.suggested_answer && String(item.suggested_answer).trim())
                        ? String(item.suggested_answer).trim()
                        : (item.suggestedAnswer && String(item.suggestedAnswer).trim())
                            ? String(item.suggestedAnswer).trim()
                            : '—',
                    soft_skills: item.soft_skills && typeof item.soft_skills === 'object' ? item.soft_skills : null,
                    speech_metrics: item.speech_metrics && typeof item.speech_metrics === 'object' ? item.speech_metrics : null,
                    answer_audio_url: item.answer_audio_url || null,
                    scoring_source: item.scoring_source || '',
                    stt_source: item.stt_source || '',
                    complexity_tier: item.complexity_tier || null,
                }))
                .sort((a, b) => Number(a.phase) - Number(b.phase));
        };

        const isSpeechHistoryItem = (item, techMax = ASSESSMENT_PHASE_DEFAULTS.tech) => {
            if (!item) return false;
            if (isVoiceHistoryMode(item.mode)) return true;
            return Number(item.phase) > techMax;
        };

        const inferTechPhaseCount = (history) => {
            const voice = (history || []).filter(
                (h) => isVoiceHistoryMode(h.mode) || Number(h.phase) > ASSESSMENT_PHASE_DEFAULTS.tech
            );
            if (voice.length) return Math.min(...voice.map((h) => Number(h.phase))) - 1;
            return ASSESSMENT_PHASE_DEFAULTS.tech;
        };

        const inferTotalPhaseCount = (history, cfg) => {
            const techMax = inferTechPhaseCount(history);
            const speechMax = Number(cfg?.speech_phases ?? ASSESSMENT_PHASE_DEFAULTS.speech);
            return techMax + (speechMax > 0 ? speechMax : 0);
        };

        const avgSpeechSkill = (rows, key) => {
            const vals = (rows || [])
                .map((r) => Number(r.soft_skills?.[key]))
                .filter((n) => Number.isFinite(n));
            if (!vals.length) return null;
            return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
        };

        const SPEECH_SKILL_DIMS = [
            ['Communication clarity', 'communication_clarity', 'clarity'],
            ['Fluency', 'fluency', null],
            ['Confidence', 'confidence', null],
            ['Professionalism', 'professionalism', null],
            ['English proficiency', 'english_proficiency', null],
            ['Answer relevance', 'answer_relevance', 'relevance'],
        ];

        const getSpeechSkillValue = (skills, primary, legacy) => {
            if (!skills || typeof skills !== 'object') return null;
            const primaryVal = skills[primary];
            if (primaryVal != null && Number.isFinite(Number(primaryVal))) return Number(primaryVal);
            if (legacy && skills[legacy] != null && Number.isFinite(Number(skills[legacy]))) {
                return Number(skills[legacy]);
            }
            return null;
        };

        const SkillBar = ({ label, value }) => {
            const v = Number(value);
            const pct = Number.isFinite(v) ? Math.max(0, Math.min(100, v)) : 0;
            const barTone = pct >= 70 ? 'bg-emerald-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500';
            return (
                        <div>
                    <div className="flex justify-between text-xs mb-1.5">
                        <span className="text-slate-600 font-medium">{label}</span>
                        <span className={`font-semibold tabular-nums ${scoreTone(v)}`}>
                            {Number.isFinite(v) ? v : '—'}
                        </span>
                        </div>
                    <div className="h-2 rounded-full bg-slate-100 overflow-hidden">
                        <div className={`h-full ${barTone} rounded-full transition-all duration-700 ease-out`} style={{ width: `${pct}%` }} />
                    </div>
                </div>
            );
        };

        const SpeechMetricsGrid = ({ metrics }) => {
            if (!metrics || typeof metrics !== 'object') return null;
            const items = [
                ['Speaking pace', metrics.words_per_minute != null ? `${metrics.words_per_minute} WPM` : null],
                ['Duration', metrics.duration_seconds != null ? `${metrics.duration_seconds}s` : null],
                ['Words spoken', metrics.word_count != null ? String(metrics.word_count) : null],
                ['Filler words', metrics.filler_word_count != null ? String(metrics.filler_word_count) : null],
                ['Long pauses', metrics.long_pause_count != null ? String(metrics.long_pause_count) : null],
                ['Avg pause', metrics.avg_pause_ms != null ? `${metrics.avg_pause_ms} ms` : null],
                ['Time to start', metrics.time_to_first_word_ms != null ? `${metrics.time_to_first_word_ms} ms` : null],
            ].filter(([, v]) => v != null && v !== '');
            if (!items.length) return null;
            return (
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    {items.map(([label, val]) => (
                        <div key={label} className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">{label}</p>
                            <p className="text-sm font-semibold text-slate-800 tabular-nums mt-0.5">{val}</p>
                                </div>
                    ))}
                </div>
            );
        };

        const SpeechPhaseInsights = ({ item }) => {
            const skills = item.soft_skills;
            const skillRows = SPEECH_SKILL_DIMS
                .map(([label, key, legacy]) => [label, getSpeechSkillValue(skills, key, legacy)])
                .filter(([, v]) => v != null);
            const hasSkills = skillRows.length > 0;
            const audioUrl = item.answer_audio_url;
            const meta = [item.scoring_source && `Scoring: ${item.scoring_source}`, item.stt_source && `Transcript: ${item.stt_source}`]
                .filter(Boolean)
                .join(' · ');
            if (!hasSkills && !item.speech_metrics && !audioUrl) return null;
            return (
                <div className="space-y-4">
                    {hasSkills ? (

        const SpeechSummaryCard = ({ speechRows }) => {
            if (!speechRows?.length) return null;
            const avgScore = (() => {
                const vals = speechRows.map((r) => Number(r.score)).filter((n) => Number.isFinite(n));
                return vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
            })();
            const dims = SPEECH_SKILL_DIMS
                .map(([label, key, legacy]) => [label, avgSpeechSkill(speechRows, key) ?? avgSpeechSkill(speechRows, legacy)])
                .filter(([, v]) => v != null);
            return (
                <div className="panel rounded-2xl p-6 mb-8 border border-indigo-100 bg-gradient-to-br from-indigo-50/80 to-white animate-fade-up">

                                    <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-700 mb-1">Overall voice communication</p>
                            <p className="text-sm text-slate-600">Single overall voice score — no per-question breakdown.</p>
                                        </div>
                        {avgScore != null ? (
                            <p className={`text-2xl font-bold tabular-nums ${scoreTone(avgScore)}`}>{avgScore}<span className="text-sm text-slate-500 font-medium">/100</span></p>
