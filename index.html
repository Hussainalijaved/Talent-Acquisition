<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convo · Technical Assessment</title>
    <meta name="description" content="Secure multi-phase technical assessment portal for candidates." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: { DEFAULT: '#121a27', elevated: '#1a2433', border: '#2a3a4f' },
                        accent: { DEFAULT: '#6366f1', hover: '#4f46e5', muted: 'rgba(99, 102, 241, 0.14)' },
                    },
                    boxShadow: {
                        card: '0 4px 24px -4px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.04)',
                        glow: '0 0 40px -8px rgba(99, 102, 241, 0.35)',
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --bg: #080b10;
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
        }

        ::selection {
            background: rgba(99, 102, 241, 0.35);
            color: #fff;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f1419; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .app-bg {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 0%, rgba(59, 130, 246, 0.06), transparent);
        }

        .panel {
            background: linear-gradient(180deg, rgba(26, 36, 51, 0.95) 0%, rgba(18, 26, 39, 0.98) 100%);
            border: 1px solid #2a3a4f;
            box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.03);
        }

        .panel-elevated {
            background: #1a2433;
            border: 1px solid #2a3a4f;
        }

        .input-field {
            background: #0f1620;
            border: 1px solid #2a3a4f;
            color: #f1f5f9;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-user-select: text;
            user-select: text;
        }

        .input-field::placeholder { color: #64748b; }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.22);
        }

        .btn-primary {
            background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2), 0 4px 14px -2px rgba(99, 102, 241, 0.45);
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.08);
            box-shadow: 0 4px 20px -2px rgba(99, 102, 241, 0.55);
        }

        .btn-primary:active:not(:disabled) { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(15, 22, 32, 0.6);
            border: 1px solid #2a3a4f;
            color: #cbd5e1;
            font-weight: 500;
            transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: #475569;
            background: rgba(26, 36, 51, 0.8);
            color: #f8fafc;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 9999px;
            border: 1px solid transparent;
        }

        .badge-accent {
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.35);
            color: #a5b4fc;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.35);
            color: #6ee7b7;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.35);
            color: #fcd34d;
        }

        .onboarding-hero {
            background: linear-gradient(165deg, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #141c28 0%, #0f1419 100%);
            border: 1px solid #2a3a4f;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .assessment-lock, .portal-lock {
            -webkit-user-select: none;
            user-select: none;
        }

        .question-protected {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .question-masked {
            filter: blur(14px);
            pointer-events: none;
            user-select: none;
        }

        .timer-ring-track { stroke: #1e293b; }
        .timer-ring-progress { stroke: #6366f1; transition: stroke-dashoffset 1s linear; }
        .timer-ring-progress.low { stroke: #f59e0b; }
        .timer-ring-progress.critical { stroke: #ef4444; }

        .assessment-workspace {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100vh - 4rem);
            min-height: calc(100vh - 4rem);
        }

        @media (min-width: 1024px) {
            .assessment-workspace { flex-direction: row; }
        }

        .assessment-sidebar {
            flex-shrink: 0;
            width: 100%;
            border-bottom: 1px solid #2a3a4f;
            background: linear-gradient(180deg, #0c121a 0%, #0a0f16 100%);
            padding: 1rem 1.25rem;
            overflow-y: auto;
            max-height: 42vh;
        }

        @media (min-width: 1024px) {
            .assessment-sidebar {
                width: 18.5rem;
                min-width: 18.5rem;
                max-height: none;
                height: 100%;
                border-bottom: none;
                border-right: 1px solid #2a3a4f;
                padding: 1.25rem 1rem 1.5rem;
            }
        }

        @media (min-width: 1280px) {
            .assessment-sidebar { width: 20rem; min-width: 20rem; }
        }

        .sidebar-section {
            padding-bottom: 1.125rem;
            margin-bottom: 1.125rem;
            border-bottom: 1px solid rgba(42, 58, 79, 0.65);
        }

        .sidebar-section:last-child {
            padding-bottom: 0;
            margin-bottom: 0;
            border-bottom: none;
        }

        .sidebar-label {
            font-size: 0.625rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 0.75rem;
        }

        .phase-list-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            margin-bottom: 0.375rem;
        }

        .phase-list-item:last-child { margin-bottom: 0; }

        .phase-list-item.active {
            border-color: rgba(99, 102, 241, 0.45);
            background: rgba(99, 102, 241, 0.1);
        }

        .phase-list-item.done { opacity: 0.7; }

        .phase-list-item.pending { opacity: 0.5; }

        .phase-list-num {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .assessment-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media print {
            html, body, #root { display: none !important; }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MAX_INTEGRITY_VIOLATIONS = 3;
        const VIOLATION_DEBOUNCE_MS = 1200;
        const DEVTOOLS_SIZE_THRESHOLD = 140;
        const DEVTOOLS_POLL_MS = 350;
        const DEBUGGER_PAUSE_MS = 90;

        const VIOLATION_LABELS = {
            tab_switch: 'leaving the assessment tab',
            window_blur: 'switching to another window or app',
            devtools: 'opening developer tools (Inspect Element)',
            fullscreen_exit: 'exiting fullscreen mode',
            blocked_shortcut: 'using blocked keyboard shortcuts (F12, Inspect, View Source)',
            screenshot: 'attempting to take a screenshot (Print Screen)',
            snipping_tool: 'attempting to open Snipping Tool or screen capture (Win+Shift+S)',
            print_attempt: 'attempting to print or save the page',
        };

        const hasWinModifier = (e) => (
            e.metaKey ||
            (typeof e.getModifierState === 'function' && (
                e.getModifierState('Meta') ||
                e.getModifierState('OS') ||
                e.getModifierState('Super')
            ))
        );

        const clearClipboardBestEffort = async () => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText('');
                }
            } catch (err) { /* permission or unsupported */ }
        };

        const isInFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);

        const enterAssessmentFullscreen = async () => {
            const el = document.documentElement;
            try {
                if (document.fullscreenElement) return true;
                if (el.requestFullscreen) {
                    await el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    await el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    await el.msRequestFullscreen();
                }
                return !!document.fullscreenElement;
            } catch (e) {
                return false;
            }
        };

        const exitAssessmentFullscreen = () => {
            try {
                if (document.fullscreenElement && document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } catch (e) {}
        };

        const isDevToolsLikelyOpenBySize = () => (
            window.outerWidth - window.innerWidth > DEVTOOLS_SIZE_THRESHOLD ||
            window.outerHeight - window.innerHeight > DEVTOOLS_SIZE_THRESHOLD
        );

        const isDevToolsLikelyOpenByConsole = () => {
            let detected = false;
            const bait = new Image();
            try {
                Object.defineProperty(bait, 'id', {
                    get() {
                        detected = true;
                        return 'devtools-probe';
                    },
                    configurable: true,
                });
                console.debug(bait);
                console.clear?.();
            } catch (err) { /* ignore */ }
            return detected;
        };

        const isDevToolsLikelyOpenByDebugger = () => {
            try {
                const start = performance.now();
                // eslint-disable-next-line no-debugger
                debugger;
                return performance.now() - start > DEBUGGER_PAUSE_MS;
            } catch (err) {
                return false;
            }
        };

        const isDevToolsLikelyOpen = () => (
            isDevToolsLikelyOpenBySize() ||
            isDevToolsLikelyOpenByConsole()
        );

        const isBlockedDevToolsShortcut = (e) => {
            if (e.key === 'F12') return true;
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c', 'k', 'u'].includes(key)) return true;
            if (e.ctrlKey && !e.shiftKey && (key === 'u' || key === 's')) return true;
            if (e.metaKey && e.altKey && ['i', 'j', 'c', 'u'].includes(key)) return true;
            if (e.metaKey && e.shiftKey && ['i', 'j', 'c', 'k'].includes(key)) return true;
            if (hasWinModifier(e) && e.altKey && key === 'i') return true;
            return false;
        };

        const isBlockedFullscreenEscapeShortcut = (e) => {
            if (e.key === 'F11') return true;
            const key = (e.key || '').toLowerCase();
            if (hasWinModifier(e) && key === 'enter') return true;
            return false;
        };

        const isBlockedTabSwitchShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.altKey && (key === 'tab' || e.keyCode === 9)) return true;
            if (e.ctrlKey && (key === 'tab' || key === 'pageup' || key === 'pagedown')) return true;
            if (e.ctrlKey && e.shiftKey && key === 'tab') return true;
            return false;
        };

        const isBlockedScreenshotShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            const code = e.code || '';
            if (e.key === 'PrintScreen' || e.keyCode === 44) return true;
            if (e.altKey && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (hasWinModifier(e) && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (e.metaKey && e.shiftKey && ['3', '4', '5', 's'].includes(key)) return true;
            if (hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS')) return true;
            if (hasWinModifier(e) && e.shiftKey && code === 'KeyS') return true;
            if (hasWinModifier(e) && key === 'g') return true;
            if (hasWinModifier(e) && e.altKey && key === 'r') return true;
            return false;
        };

        const isBlockedPrintShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && key === 'p') return true;
            if (e.metaKey && key === 'p') return true;
            return false;
        };

        const handleBlockedSecurityKey = (e, recordViolation) => {
            if (isBlockedTabSwitchShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedDevToolsShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('devtools');
                return true;
            }
            if (isBlockedFullscreenEscapeShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedPrintShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('print_attempt');
                return true;
            }
            if (isBlockedScreenshotShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                clearClipboardBestEffort();
                const key = (e.key || '').toLowerCase();
                const code = e.code || '';
                const isSnip = hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS');
                recordViolation?.(isSnip ? 'snipping_tool' : 'screenshot');
                return true;
            }
            return false;
        };

        const PORTAL_LOCKED_VIEWS = ['login', 'instructions', 'assessment'];
        const isPortalLockedView = (v) => PORTAL_LOCKED_VIEWS.includes(v);

        const FullscreenRequiredOverlay = ({ onRestore, onSecurityKeyDown }) => (
            <div
                className="fixed inset-0 z-[2147483646] flex items-center justify-center bg-[#080b10]/95 backdrop-blur-2xl px-4 portal-lock"
                onContextMenu={(e) => e.preventDefault()}
                onCopy={(e) => e.preventDefault()}
                onCut={(e) => e.preventDefault()}
                onPaste={(e) => e.preventDefault()}
                onKeyDown={onSecurityKeyDown}
                tabIndex={-1}
                role="dialog"
                aria-modal="true"
                aria-label="Fullscreen required"
                style={{ top: 0, left: 0, width: '100vw', height: '100vh' }}
            >
                <div className="panel max-w-md w-full rounded-2xl p-8 sm:p-10 text-center shadow-card border border-accent/30">
                    <div className="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-amber-500/15 border border-amber-500/30">
                        <svg className="h-7 w-7 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <span className="badge badge-warning mb-4">Session paused</span>
                    <h2 className="text-xl font-bold text-white mb-3 tracking-tight">Fullscreen required</h2>
                    <p className="text-sm text-slate-400 leading-relaxed mb-2">
                        You cannot exit or go back during this session. Developer Tools, Snipping Tool, screenshots, and browser menus are blocked until you return.
                    </p>
                    <p className="text-sm text-slate-500 leading-relaxed mb-8">
                        Close Developer Tools if open, then click below to re-enter fullscreen and continue.
                    </p>
                    <button
                        type="button"
                        autoFocus
                        onClick={onRestore}
                        className="btn-primary w-full py-3.5 rounded-xl text-sm"
                    >
                        Return to fullscreen
                    </button>
                </div>
            </div>
        );

        // Update when ngrok restarts (free tier gets a new subdomain each time).
        // Must match: ngrok URL + n8n path on TRG - Assessment Answer (assessment-answer).
        const WEBHOOK_BASE = 'https://randy-gaunt-bradley.ngrok-free.dev/webhook';

        const Shell = ({ children, subtitle, footerNote, fullWidth = false, headerExtra = null }) => (
            <div className="min-h-screen flex flex-col w-full">
                <header className="sticky top-0 z-40 border-b border-surface-border/80 bg-[#080b10]/90 backdrop-blur-md w-full">
                    <div className={`w-full h-16 flex items-center justify-between gap-3 ${fullWidth ? 'px-4 lg:px-5' : 'max-w-[1600px] xl:max-w-[1760px] mx-auto px-4 sm:px-6 lg:px-8'}`}>
                        <div className="flex items-center gap-3 min-w-0 flex-1">
                            <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-accent/30 to-accent/5 border border-accent/40 flex items-center justify-center shrink-0 shadow-glow">
                                <svg className="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                            </div>
                            <div className="min-w-0">
                                <p className="text-sm font-bold text-white tracking-tight leading-tight">Convo Assessment</p>
                                {subtitle && <p className="text-xs text-slate-500 truncate leading-tight mt-0.5">{subtitle}</p>}
                            </div>
                        </div>
                        {headerExtra ? (
                            <div className="shrink-0 flex items-center" aria-label="Time remaining">
                                {headerExtra}
                            </div>
                        ) : (
                            <span className="badge badge-accent shrink-0 hidden sm:inline-flex">
                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" aria-hidden="true" />
                                Secure session
                            </span>
                        )}
                    </div>
                </header>
                <main className={`flex-1 w-full ${fullWidth ? 'min-h-0 flex flex-col' : ''}`}>{children}</main>
                {footerNote && (
                    <footer className="border-t border-surface-border/60 py-4">
                        <p className="text-center text-xs text-slate-600 max-w-xl mx-auto px-4 leading-relaxed">{footerNote}</p>
                    </footer>
                )}
            </div>
        );

        const TimerRing = ({ seconds, totalSeconds, compact = false, prominent = false }) => {
            const size = prominent ? 64 : compact ? 52 : 88;
            const stroke = prominent ? 5 : compact ? 4 : 6;
            const r = (size - stroke) / 2;
            const c = 2 * Math.PI * r;
            const total = totalSeconds && totalSeconds > 0 ? totalSeconds : seconds || 1;
            const pct = seconds != null ? Math.max(0, Math.min(1, seconds / total)) : 0;
            const offset = c * (1 - pct);
            const low = seconds != null && seconds < 30;
            const critical = seconds != null && seconds < 10;
            const progClass = critical ? 'timer-ring-progress critical' : low ? 'timer-ring-progress low' : 'timer-ring-progress';
            const mm = seconds != null ? `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2, '0')}` : '—';
            const wrapClass = prominent
                ? 'flex items-center gap-3 shrink-0 rounded-xl border border-accent/30 bg-[#0f1620]/95 px-3.5 py-2.5 shadow-glow'
                : compact
                ? 'flex items-center gap-2.5 shrink-0 rounded-lg border border-surface-border bg-[#0f1620]/80 px-3 py-2'
                : 'flex items-center gap-4 panel rounded-xl px-5 py-3 shrink-0';
            const timeClass = prominent
                ? `font-mono text-xl font-bold tabular-nums ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`
                : compact
                ? `font-mono text-lg font-bold tabular-nums ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`
                : `font-mono text-2xl font-bold tabular-nums tracking-tight ${critical ? 'text-red-400' : low ? 'text-amber-400' : 'text-white'}`;
            return (
                <div className={wrapClass}>
                    <svg width={size} height={size} className="-rotate-90 shrink-0" aria-hidden="true">
                        <circle className="timer-ring-track" cx={size / 2} cy={size / 2} r={r} fill="none" strokeWidth={stroke} />
                        <circle
                            className={progClass}
                            cx={size / 2}
                            cy={size / 2}
                            r={r}
                            fill="none"
                            strokeWidth={stroke}
                            strokeLinecap="round"
                            strokeDasharray={c}
                            strokeDashoffset={offset}
                        />
                    </svg>
                    <div>
                        <p className="text-[10px] font-semibold uppercase tracking-widest text-slate-500">Time left</p>
                        <p className={timeClass}>{mm}</p>

                    let query = supabase.from('assessment_sessions').select('id, status');

                    if (!isPortalLockedView(viewRef.current) || terminatingRef.current) return;
                    if (!isInFullscreen()) {
                        escExitRef.current = true;
                        fullscreenRequiredRef.current = true;
                        setFullscreenRequired(true);
                        setTimeout(() => { escExitRef.current = false; }, 2000);
                    } else {
                        escExitRef.current = false;
                        fullscreenRequiredRef.current = false;
                        setFullscreenRequired(false);
                        devToolsWarnedRef.current = false;
                    }
                };

                window.addEventListener('blur', handleWindowBlur);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                syncFullscreenState();
                return () => {
                    window.removeEventListener('blur', handleWindowBlur);
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
                };
            }, [view, recordIntegrityViolation, syncFullscreenState, isSecurityActive]);

            useEffect(() => {
                const handleContextMenu = (e) => {
                    if (!isSecurityActive()) return;
                    e.preventDefault();
                };

                const handleBeforePrint = (e) => {
                    if (!isSecurityActive()) return;
                    e.preventDefault();
                    if (viewRef.current === 'assessment') {
                        recordIntegrityViolation('print_attempt');
                    }
                };

                const handleClipboardClear = (e) => {
                    if (!isSecurityActive() || viewRef.current !== 'assessment') return;
                    if (e.key === 'PrintScreen' || e.keyCode === 44) {
                        clearClipboardBestEffort();
                    }
                };

                document.addEventListener('contextmenu', handleContextMenu);
                document.addEventListener('keydown', handleSecurityKeyDown, true);
                window.addEventListener('keydown', handleSecurityKeyDown, true);
                document.addEventListener('keyup', handleClipboardClear, true);
                window.addEventListener('beforeprint', handleBeforePrint);

                return () => {
                    document.removeEventListener('contextmenu', handleContextMenu);
                    document.removeEventListener('keydown', handleSecurityKeyDown, true);
                    window.removeEventListener('keydown', handleSecurityKeyDown, true);
                    document.removeEventListener('keyup', handleClipboardClear, true);
                    window.removeEventListener('beforeprint', handleBeforePrint);
                };
            }, [view, fullscreenRequired, handleSecurityKeyDown, isSecurityActive, recordIntegrityViolation]);

            useEffect(() => {
                const checkDevTools = () => {
                    if (!isSecurityActive() || terminatingRef.current) return;
                    const open = runDevToolsProbe();
                    devToolsOpenRef.current = open;
                    setDevToolsDetected(open);

                    if (!open) {
                        devToolsWarnedRef.current = false;
                        return;
                    }

                    if (viewRef.current === 'assessment') {
                        if (!devToolsWarnedRef.current) {
                            devToolsWarnedRef.current = true;
                            recordIntegrityViolation('devtools');
                        }
                        return;
                    }

                    if (fullscreenRequiredRef.current && !devToolsWarnedRef.current) {
                        devToolsWarnedRef.current = true;
                        alert('Developer Tools are not allowed. Close them to continue.');
                    }
                };

                checkDevTools();
                const interval = setInterval(checkDevTools, DEVTOOLS_POLL_MS);
                return () => clearInterval(interval);
            }, [view, fullscreenRequired, recordIntegrityViolation, isSecurityActive, runDevToolsProbe]);

            useEffect(() => {
                if (!isPortalLockedView(view)) {
                    exitAssessmentFullscreen();
                    setFullscreenRequired(false);
                    return;
                }

                enterAssessmentFullscreen().then(() => syncFullscreenState());
            }, [view, syncFullscreenState]);

            useEffect(() => {
                const requestOnGesture = () => {
                    if (isPortalLockedView(viewRef.current) && !isInFullscreen()) {
                        enterAssessmentFullscreen().then(() => syncFullscreenState());
                    }
                };
                document.addEventListener('click', requestOnGesture, { once: true });
                enterAssessmentFullscreen().then(() => syncFullscreenState());
                return () => document.removeEventListener('click', requestOnGesture);
            }, [syncFullscreenState]);

            const restoreSession = async (sId, email, { resumeOnly = false } = {}) => {
                if (!sId) return;
                setIsLoading(true);
                try {
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sId);
                    let query = supabase.from('assessment_sessions').select('id, interview_history, max_phases, status, result, score');
                    if (isUuid) {
                        query = query.eq('id', sId);
                    } else {
                        query = query.eq('gmail_thread_id', sId);
                    }
                    const { data, error } = await query.single();
                    if (error || !data) return;

                    const statusStr = (data.status || '').toLowerCase();
                    if (statusStr.includes('completed') || statusStr.includes('terminated')) {
                        sessionStorage.removeItem('assessment_started');
                        if (!resumeOnly) return;
                        const resolvedId = data.id || sId;
                        setSessionId(resolvedId);
                        sessionStorage.setItem('current_session_id', resolvedId);
                        setResult(data.result || (Number(data.score) > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback('Assessment completed.');
                        const restoredHistory = normalizeInterviewHistory(data.interview_history);
                        setAssessmentHistory(restoredHistory);
                        setFeedback(pickLatestFeedback(restoredHistory, ''));
                        setView('finished');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                        return;
                    }

                    if (!resumeOnly) return;

                    sessionStorage.setItem('current_session_id', data.id);
                    sessionStorage.setItem('candidate_email', email || '');

                    const history = parseInterviewHistory(data.interview_history);
                    if (history.length === 0) return;

                    let currentStepIndex = history.findIndex(h => h.answer_text === null || h.answer_text === undefined);
                    if (currentStepIndex === -1) {
                        return;
                    }

                    const currentPhaseData = history[currentStepIndex];
                    if (currentPhaseData) {
                        setQuestion(currentPhaseData.question_text || currentPhaseData.question);
                        setTotalSteps(data.max_phases || 5);
                        setCurrentStep(currentStepIndex + 1);
                        applyTimerFromPhase(currentPhaseData);
                        setView('assessment');
                    }
                } catch (e) {
                    console.error('Session Restoration Error:', e);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let sId = cleanUrlParam(params.get('session'));
                let email = cleanUrlParam(params.get('email'));
                if (sId) {
                    setSessionId(sId);
                    setCandidateEmail(email || '');
                    if (email) sessionStorage.setItem('candidate_email', email);
                } else {
                    sId = cleanUrlParam(sessionStorage.getItem('current_session_id'));
                    email = cleanUrlParam(sessionStorage.getItem('candidate_email'));
                    if (sId) setSessionId(sId);
                    if (email) setCandidateEmail(email);
                }

                const started = sessionStorage.getItem('assessment_started') === 'true';
                if (started && sId) {
                    restoreSession(sId, email, { resumeOnly: true });
                }
            }, []);

            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (view === 'assessment') {
                        e.preventDefault();
                        e.returnValue = 'Assessment is in progress. Are you sure you want to leave? Your progress will be saved but time will continue to run.';
                        return e.returnValue;
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [view]);

            const handleStartAssessment = async () => {
                setIsLoading(true);
                try {
                    await enterAssessmentFullscreen();
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sessionId);
                    let query = supabase.from('assessment_sessions').select('id, interview_history, max_phases');
                    if (isUuid) {
                        query = query.eq('id', sessionId);
                    } else {
                        query = query.eq('gmail_thread_id', sessionId);
                    }
                    const { data, error } = await query.single();

                    if (error) throw error;

                    const history = parseInterviewHistory(data.interview_history);

                    const firstUnanswered = history.findIndex(
                        (h) => h.answer_text === null || h.answer_text === undefined
                    );
                    const phaseIndex = firstUnanswered >= 0 ? firstUnanswered : 0;
                    const currentPhaseData = history[phaseIndex];

                    if (currentPhaseData) {
                        setQuestion(currentPhaseData.question_text || currentPhaseData.question);
                        setTotalSteps(data.max_phases || 5);
                        setCurrentStep(phaseIndex + 1);
                        setIntegrityViolationCount(0);
                        integrityViolationCountRef.current = 0;
                        terminatingRef.current = false;
                        lastViolationAtRef.current = 0;
                        devToolsOpenRef.current = false;

                        const resolvedId = data.id || sessionId;
                        setSessionId(resolvedId);
                        sessionStorage.setItem('current_session_id', resolvedId);
                        sessionStorage.setItem('candidate_email', candidateEmail || '');
                        sessionStorage.setItem('assessment_started', 'true');

                        await startPhaseTimerInDatabase(resolvedId, history, phaseIndex);
                        setView('assessment');
                    } else {
                        throw new Error("No initial question found in session history.");
                    }
                } catch (e) {
                    console.error('Start Assessment Error:', e);
                    alert('Failed to load the first question. Please refresh.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleAssessmentSubmit = async (isTimeout = false) => {
                if (isLoading) return;
                const finalAnswer = answer.trim() || (isTimeout ? "[Timeout - No response provided]" : "");
                if (!finalAnswer) return;

                setIsLoading(true);
                try {
                    const response = await fetch(`${WEBHOOK_BASE}/assessment-answer`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify({
                            sessionId,
                            answer: finalAnswer,
                            phase: currentStep,
                            email: candidateEmail,
                            tabSwitches: integrityViolationCount,
                            integrityViolations: integrityViolationCount,
                        }),
                    });

                    let textData = await response.text();
                    let sanitizedText = textData.trim();
                    if (sanitizedText.startsWith('=')) sanitizedText = sanitizedText.substring(1).trim();

                    let data;
                    try {
                        data = JSON.parse(sanitizedText);
                    } catch (e) {
                        data = { output: sanitizedText };
                    }

                    if (data.isFinal === true || currentStep >= totalSteps) {
                        setView('finished');
                        sessionStorage.removeItem('assessment_started');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback(data.feedback || 'Assessment completed.');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                        if (sessionId) sessionStorage.setItem('current_session_id', sessionId);
                        if (candidateEmail) sessionStorage.setItem('candidate_email', candidateEmail);
                    } else {
                        let nextQ = data.nextQuestion || data.question || data.output || data.text || '';

                        if (typeof nextQ === 'string' && nextQ.trim().startsWith('{')) {
                            try {
                                const parsed = JSON.parse(nextQ);
                                nextQ = parsed.nextQuestion || parsed.question || parsed.text || nextQ;
                            } catch (e) { }
                        }

                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep((prev) => prev + 1);
                            setAnswer('');
                            applyTimerFromPhase({
                                time_limit_seconds: data.time_limit_seconds,
                                deadline_at: data.deadline_at,
                            });
                        }
                    }
                } catch (e) {
                    console.error('Submit Error:', e);
                    alert('Connection error. Please try submitting again.');
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if (view !== 'assessment' || isLoading) return;

                const tick = () => {
                    const deadline = deadlineAtRef.current || sessionStorage.getItem('deadline_at');
                    let remaining;
                    if (deadline) {
                        remaining = Math.max(0, Math.floor((new Date(deadline).getTime() - Date.now()) / 1000));
                    } else {
                        const stored = sessionStorage.getItem('time_left');
                        const parsed = stored != null ? parseInt(stored, 10) : NaN;
                        remaining = Number.isFinite(parsed) ? Math.max(0, parsed) : null;
                    }
                    setTimeLeft(remaining);
                    if (remaining != null) sessionStorage.setItem('time_left', String(remaining));
                };

                tick();
                const interval = setInterval(tick, 1000);
                return () => clearInterval(interval);
            }, [view, isLoading]);

            useEffect(() => {
                if (view === 'assessment' && timeLeft === 0 && !isLoading && deadlineAtRef.current) {
                    handleAssessmentSubmit(true);
                }
            }, [timeLeft, view, isLoading]);

            const resolveSessionIdForReview = () => {
                const params = new URLSearchParams(window.location.search);
                const fromUrl = cleanUrlParam(params.get('session'));
                const fromStorage = cleanUrlParam(sessionStorage.getItem('current_session_id'));
                const fromState = cleanUrlParam(sessionId);
                return fromUrl || fromStorage || fromState;
            };

            const fetchAndShowReview = async () => {
                const sid = resolveSessionIdForReview();
                if (!sid) {
                    alert('Session ID missing. Open the assessment link from your email again.');
                    return;
                }
                setIsLoading(true);
                try {
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid);
                    let query = supabase
                        .from('assessment_sessions')
                        .select('id, interview_history, result, status, score');
                    if (isUuid) {
                        query = query.eq('id', sid);
                    } else {
                        query = query.eq('gmail_thread_id', sid);
                    }
                    const { data, error } = await query.maybeSingle();

                    if (error) throw error;
                    if (!data) {
                        alert('Session not found. Check the link or contact support.');
                        return;
                    }

                    const rows = normalizeInterviewHistory(data.interview_history);
                    if (rows.length === 0) {
                        alert('No interview history saved yet for this session.');
                        return;
                    }

                    setSessionId(data.id || sid);
                    sessionStorage.setItem('current_session_id', data.id || sid);
                    setAssessmentHistory(rows);
                    setFeedback(pickLatestFeedback(rows, feedback));
                    if (data.score != null) setOverallScore(Number(data.score));
                    if (data.result) setResult(data.result);
                    setView('review');
                } catch (e) {
                    console.error('Supabase Fetch Error:', e);
                    alert(`Could not load interview history: ${e.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const renderView = () => {
                switch (view) {
                    case 'login':
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} />;
                    case 'instructions':
                        return <InstructionsView onStart={handleStartAssessment} />;
                    case 'assessment':
                        return (
                            <AssessmentView
                                currentStep={currentStep}
                                totalSteps={totalSteps}
                                timeLeft={timeLeft}
                                phaseTimeLimit={phaseTimeLimit}
                                question={question}
                                answer={answer}
                                setAnswer={setAnswer}
                                handleAssessmentSubmit={handleAssessmentSubmit}
                                isLoading={isLoading}
                                candidateEmail={candidateEmail}
                                integrityViolationCount={integrityViolationCount}
                                contentMasked={devToolsDetected || fullscreenRequired}
                            />
                        );
                    case 'finished':
                        return <FinishedView result={result} overallScore={overallScore} feedback={feedback} onReview={fetchAndShowReview} isLoading={isLoading} />;
                    case 'review':
                        return (
                            <ReviewView
                                history={assessmentHistory}
                                overallFeedback={pickLatestFeedback(assessmentHistory, feedback)}
                                onBack={() => setView('finished')}
                            />
                        );
                    case 'admin':
                        return <AdminView setView={setView} />;
                    default:
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} />;
                }
            };

            return (
                <div className="min-h-screen w-full max-w-full app-bg text-slate-200 antialiased">
                    {renderView()}
                    {fullscreenRequired && isPortalLockedView(view) && (
                        <FullscreenRequiredOverlay
                            onRestore={restorePortalFullscreen}
                            onSecurityKeyDown={handleSecurityKeyDown}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
