<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convo · Technical Assessment</title>
    <meta name="description" content="Secure multi-phase technical assessment portal for candidates." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="final-score.js"></script>
    <script src="speech-assessment.js"></script>
    <script src="live-speech.js?v=20260624h"></script>
    <script src="proctor-media.js?v=20260626"></script>
    <script src="proctor-activity.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '"DM Sans"', 'system-ui', 'sans-serif'],
                        display: ['Inter', '"DM Sans"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: { DEFAULT: '#ffffff', elevated: '#f8fafc', border: '#e2e8f0', muted: '#f1f5f9' },
                        accent: { DEFAULT: '#4f46e5', hover: '#4338ca', muted: 'rgba(79, 70, 229, 0.08)' },
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                    },
                    boxShadow: {
                        card: '0 4px 24px -4px rgba(15, 23, 42, 0.1), 0 0 0 1px rgba(15, 23, 42, 0.04)',
                        glow: '0 8px 32px -8px rgba(79, 70, 229, 0.3)',
                        soft: '0 2px 12px rgba(15, 23, 42, 0.06)',
                        hero: '0 20px 60px -12px rgba(79, 70, 229, 0.18)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'scale-in': 'scaleIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'float': 'float 4s ease-in-out infinite',
                        'mic-ring': 'micRing 2s ease-out infinite',
                        'mic-ring-2': 'micRing 2s ease-out 0.66s infinite',
                        'mic-ring-3': 'micRing 2s ease-out 1.33s infinite',
                    },
                    keyframes: {
                        fadeUp: { from: { opacity: '0', transform: 'translateY(16px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
                        scaleIn: { from: { opacity: '0', transform: 'scale(0.94)' }, to: { opacity: '1', transform: 'scale(1)' } },
                        slideUp: { from: { opacity: '0', transform: 'translateY(24px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                        micRing: { '0%': { transform: 'scale(1)', opacity: '0.7' }, '100%': { transform: 'scale(2.8)', opacity: '0' } },
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --bg: #f1f5fb;
            --text: #0f172a;
            --muted: #64748b;
            --surface: #ffffff;
            --border: #e2e8f0;
            --accent: #4f46e5;
            --accent-blue: #2563eb;
            --font-main: 'Inter', 'DM Sans', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'cv11', 'ss01';
        }

        #root {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
        }

        ::selection {
            background: rgba(37, 99, 235, 0.18);
            color: #0f172a;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #eef2f7; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .app-bg {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 90% 60% at 100% -10%, rgba(79, 70, 229, 0.07), transparent 55%),
                radial-gradient(ellipse 70% 50% at 0% 100%, rgba(37, 99, 235, 0.05), transparent 50%);
            background-attachment: fixed;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px -6px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.02);
        }

        .panel-elevated {
            background: #f8fafc;
            border: 1px solid var(--border);
        }

        .input-field {
            background: #ffffff;
            border: 1.5px solid var(--border);
            color: #0f172a;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-user-select: text;
            user-select: text;
            font-family: var(--font-main);
        }

        .input-field::placeholder { color: #94a3b8; }

        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #4338ca 100%);
            color: #fff;
            font-weight: 800;
            font-family: var(--font-main);
            letter-spacing: 0.02em;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 4px 18px rgba(79, 70, 229, 0.32);
            transition: all 0.15s ease;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            box-shadow: 0 6px 22px rgba(79, 70, 229, 0.38);
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) { transform: scale(0.98); }

        .btn-secondary {
            background: #ffffff;
            border: 1.5px solid var(--border);
            color: #475569;
            font-weight: 700;
            font-family: var(--font-main);
            transition: all 0.15s ease;
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: #c7d2fe;
            background: #f5f3ff;
            color: #4338ca;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.75rem;
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-radius: 9999px;
            border: 1px solid transparent;
        }

        .badge-accent {
            background: rgba(79, 70, 229, 0.08);
            border-color: rgba(79, 70, 229, 0.2);
            color: #4338ca;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.22);
            color: #047857;
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.22);
            color: #b45309;
        }

        .onboarding-hero {
            background: #ffffff;
            border: 1px solid rgba(199, 210, 254, 0.75);
            border-radius: 1.75rem;
            box-shadow: 0 16px 56px -16px rgba(79, 70, 229, 0.18), 0 0 0 1px rgba(79, 70, 229, 0.05);
            overflow: hidden;
        }

        .portal-page .onboarding-hero {
            overflow: clip;
        }

        /* ─── Unified portal page layout (login, guidelines, results) ─ */
        .portal-page {
            min-height: 100%;
            width: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(0.75rem, 2.5vw, 2rem);
            box-sizing: border-box;
        }

        @media (min-width: 640px) {
            .portal-page { align-items: center; }
        }

        .portal-shell {
            width: min(100%, 48rem);
            margin: 0 auto;
        }

        .portal-shell-narrow { width: min(100%, 42rem); }
        .portal-shell-wide { width: min(100%, 56rem); }
        .portal-shell-guidelines { width: min(100%, 52rem); }

        .portal-split {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        @media (min-width: 1280px) {
            .portal-split { flex-direction: row; align-items: stretch; }
        }

        .portal-split-hero {
            width: 100%;
            flex-shrink: 0;
        }

        @media (min-width: 1280px) {
            .portal-split-hero {
                width: 40%;
                min-width: 18rem;
                max-width: 24rem;
            }
        }

        /* On very small screens, hide the hero marketing panel — just show the form */
        @media (max-width: 639px) {
            .portal-split-hero { display: none !important; }
            .portal-split-body { border-radius: 1.5rem !important; }
        }

        @media (min-width: 640px) and (max-width: 1279px) {
            .portal-split-hero.login-hero-panel {
                border-radius: 1.5rem 1.5rem 0 0;
                padding: 1rem 1.25rem !important;
                min-height: 0;
            }
            .portal-split-body {
                border-radius: 0 0 1.5rem 1.5rem;
            }
        }

        .portal-split-body {
            flex: 1;
            min-width: 0;
            width: 100%;
        }

        @media (min-width: 640px) and (max-width: 1279px) {
            .portal-hero-features { display: none !important; }
            .portal-hero-compact { display: block !important; }
        }

        @media (max-width: 639px), (min-width: 1280px) {
            .portal-hero-compact { display: none !important; }
        }

        .fade-in { animation: fadeIn 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
        .stagger-1 { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both; }
        .stagger-2 { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.12s both; }
        .stagger-3 { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both; }
        .stagger-4 { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.28s both; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Login hero left panel ─────────────────────────────────── */
        .login-hero-panel {
            background: linear-gradient(145deg, #4f46e5 0%, #6366f1 40%, #818cf8 100%);
            position: relative;
            overflow: hidden;
        }

        .login-hero-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99,102,241,0.4), transparent 50%);
            pointer-events: none;
        }

        .login-hero-panel::after {
            content: '';
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }

        /* ─── Mic pulse rings ───────────────────────────────────────── */
        .mic-btn-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-ring {
            position: absolute;
            border-radius: 50%;
            background: rgba(79, 70, 229, 0.18);
            pointer-events: none;
        }

        .mic-ring-1 { width: 80px; height: 80px; animation: micRipple 2s ease-out infinite; }
        .mic-ring-2 { width: 80px; height: 80px; animation: micRipple 2s ease-out 0.65s infinite; }
        .mic-ring-3 { width: 80px; height: 80px; animation: micRipple 2s ease-out 1.3s infinite; }

        @keyframes micRipple {
            0%   { transform: scale(1);   opacity: 0.7; }
            100% { transform: scale(3.0); opacity: 0; }
        }

        .mic-btn-active .mic-ring {
            background: rgba(16, 185, 129, 0.2);
        }

        /* ─── Assessment question prominence ────────────────────────── */
        .question-text {
            font-size: 1.0625rem;
            line-height: 1.7;
            color: #0f172a;
            font-weight: 450;
            letter-spacing: -0.01em;
        }

        @media (min-width: 640px) {
            .question-text { font-size: 1.125rem; }
        }

        .question-reveal-shell {
            min-height: 3.5rem;
        }

        .question-reveal-pending {
            animation: questionPending 1.2s ease-in-out infinite;
        }

        @keyframes questionPending {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        .question-typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            margin-left: 2px;
            vertical-align: text-bottom;
            background: #7c3aed;
            animation: questionCursorBlink 0.85s step-end infinite;
        }

        @keyframes questionCursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ─── Live transcript streaming ─────────────────────────────── */
        .transcript-stream {
            font-size: 1rem;
            line-height: 1.75;
            color: #1e293b;
            font-weight: 400;
        }

        .transcript-stream .word-new {
            animation: wordAppear 0.2s ease-out both;
        }

        @keyframes wordAppear {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── result + review ───────────────────────────────────────── */
        .result-hero-gradient {
            background: linear-gradient(145deg, #eef2ff 0%, #f0fdf4 42%, #ffffff 72%, #faf5ff 100%);
        }

        .review-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .review-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px -8px rgba(79, 70, 229, 0.12);
        }

        /* ─── Instructions step cards ───────────────────────────────── */
        .rule-card {
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .rule-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px -4px rgba(79, 70, 229, 0.12);
        }

        .guidelines-layout {
            display: flex;
            flex-direction: column;
        }

        .guidelines-header,
        .guidelines-phases,
        .guidelines-rules,
        .guidelines-footer {
            width: 100%;
        }

        .assessment-lock, .portal-lock {
            -webkit-user-select: none;
            user-select: none;
        }

        .question-protected {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* TEMP testing mode: allow text selection / copy when proctoring is disabled */
        html.proctor-off .assessment-lock,
        html.proctor-off .portal-lock,
        html.proctor-off .question-protected {
            -webkit-user-select: text !important;
            user-select: text !important;
            -webkit-touch-callout: default !important;
        }

        .question-masked {
            filter: blur(14px);
            pointer-events: none;
            user-select: none;
        }

        .timer-ring-track { stroke: #e0e7ff; }
        .timer-ring-progress { stroke: #4f46e5; transition: stroke-dashoffset 1s linear; }
        .timer-ring-progress.low { stroke: #f59e0b; }
        .timer-ring-progress.critical { stroke: #ef4444; }

        .assessment-workspace {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100dvh - 4rem);
            min-height: calc(100dvh - 4rem);
        }

        .shell-immersive .assessment-workspace,
        .shell-immersive .speech-workspace-full {
            height: 100%;
            min-height: 0;
            flex: 1;
        }

        @media (min-width: 1280px) {
            .assessment-workspace { flex-direction: row; }
        }

        .assessment-sidebar {
            flex-shrink: 0;
            width: 100%;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 1280px) {
            .assessment-sidebar {
                width: 20rem;
                min-width: 20rem;
                height: 100%;
                border-bottom: none;
                border-right: 1px solid var(--border);
                overflow-y: auto;
            }
        }

        /* ── Mobile compact sidebar strip (<1280px) ── */
        .sidebar-compact {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.625rem 1rem;
        }
        @media (min-width: 1280px) {
            .sidebar-compact { display: none; }
        }

        .sidebar-compact-count {
            flex-shrink: 0;
            display: flex;
            align-items: baseline;
            gap: 0.125rem;
            white-space: nowrap;
        }

        .sidebar-compact-progress {
            flex: 1;
            min-width: 0;
        }

        .sidebar-compact-action { flex-shrink: 0; }

        /* ── Desktop full sidebar (≥1280px) ── */
        .sidebar-full {
            display: none;
        }
        @media (min-width: 1280px) {
            .sidebar-full {
                display: flex;
                flex-direction: column;
                height: 100%;
                padding: 1.25rem 1rem 1.5rem;
            }
        }

        .sidebar-section {
            padding-bottom: 1.125rem;
            margin-bottom: 1.125rem;
            border-bottom: 1px solid rgba(226, 232, 240, 0.95);
        }

        .sidebar-section:last-child {
            padding-bottom: 0;
            margin-bottom: 0;
            border-bottom: none;
        }

        .sidebar-label {
            font-size: 0.625rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 0.75rem;
        }

        .phase-list-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
            margin-bottom: 0.375rem;
        }

        .phase-list-item:last-child { margin-bottom: 0; }

        .phase-list-item.active {
            border-color: rgba(37, 99, 235, 0.25);
            background: rgba(37, 99, 235, 0.06);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.08);
        }

        .phase-list-item.done { opacity: 0.7; }

        .phase-list-item.pending { opacity: 0.5; }

        .phase-list-num {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .assessment-main {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 35%, #f1f5f9 100%);
        }

        /* ── Structured assessment layout ── */
        .assessment-stage-bar {
            flex-shrink: 0;
            border-bottom: 1px solid rgba(226, 232, 240, 0.95);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        }

        .assessment-stage-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.875rem 1rem;
            max-width: 56rem;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 640px) {
            .assessment-stage-bar-inner { padding: 1rem 1.5rem; }
        }

        @media (min-width: 1280px) {
            .assessment-stage-bar-inner { max-width: none; padding: 1rem 1.75rem; }
        }

        .assessment-breadcrumb {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.35rem 0.5rem;
            min-width: 0;
        }

        .assessment-breadcrumb-phase {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(99, 102, 241, 0.08));
            border: 1px solid rgba(79, 70, 229, 0.18);
            font-size: 0.6875rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #4338ca;
        }

        .assessment-breadcrumb-divider {
            color: #cbd5e1;
            font-weight: 600;
            user-select: none;
        }

        .assessment-breadcrumb-current {
            font-size: 1.125rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        @media (min-width: 640px) {
            .assessment-breadcrumb-current { font-size: 1.25rem; }
        }

        .assessment-breadcrumb-sub {
            width: 100%;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #64748b;
            margin-top: 0.125rem;
        }

        .assessment-segment-progress {
            display: flex;
            gap: 0.25rem;
            padding: 0 1rem 0.75rem;
            max-width: 56rem;
            margin: 0 auto;
            width: 100%;
        }

        @media (min-width: 640px) {
            .assessment-segment-progress { padding: 0 1.5rem 0.875rem; }
        }

        @media (min-width: 1280px) {
            .assessment-segment-progress { max-width: none; padding: 0 1.75rem 0.875rem; }
        }

        .assessment-segment {
            flex: 1;
            height: 4px;
            border-radius: 9999px;
            background: #e2e8f0;
            transition: background 0.35s ease, box-shadow 0.35s ease;
        }

        .assessment-segment.done {
            background: linear-gradient(90deg, #10b981, #059669);
        }

        .assessment-segment.active {
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        .assessment-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 1rem;
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MAX_INTEGRITY_VIOLATIONS = 3;
        const CAMERA_GRACE_SECONDS = 45;
        const VIOLATION_DEBOUNCE_MS = 1200;
        const DEVTOOLS_SIZE_THRESHOLD = 140;
        const DEVTOOLS_POLL_MS = 350;
        const DEBUGGER_PAUSE_MS = 90;

        const VIOLATION_LABELS = {
            tab_switch: 'leaving the assessment tab',
            window_blur: 'switching to another window or app',
            devtools: 'opening developer tools (Inspect Element)',
            fullscreen_exit: 'exiting fullscreen mode',
            blocked_shortcut: 'using blocked keyboard shortcuts (F12, Inspect, View Source)',
            screenshot: 'attempting to take a screenshot (Print Screen)',
            snipping_tool: 'attempting to open Snipping Tool or screen capture (Win+Shift+S)',
            print_attempt: 'attempting to print or save the page',
            webcam_stopped: 'turning off or blocking the webcam',
            camera_not_restored: 'not turning the webcam back on within the time limit',
            screen_share_stopped: 'stopping screen sharing',
        };

        const hasWinModifier = (e) => (
            e.metaKey ||
            (typeof e.getModifierState === 'function' && (
                e.getModifierState('Meta') ||
                e.getModifierState('OS') ||
                e.getModifierState('Super')
            ))
        );

        const clearClipboardBestEffort = async () => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText('');
                }
            } catch (err) { /* permission or unsupported */ }
        };

        const isInFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);

        const enterAssessmentFullscreen = async () => {
            if (typeof PROCTORING_DISABLED !== 'undefined' && PROCTORING_DISABLED) return true;
            const el = document.documentElement;
            try {
                if (isInFullscreen()) return true;
                if (el.requestFullscreen) {
                    await el.requestFullscreen({ navigationUI: 'hide' });
                } else if (el.webkitRequestFullscreen) {
                    await el.webkitRequestFullscreen();
                } else if (el.msRequestFullscreen) {
                    await el.msRequestFullscreen();
                }
                return isInFullscreen();
            } catch (e) {
                return false;
            }
        };

        const exitAssessmentFullscreen = () => {
            try {
                if (document.fullscreenElement && document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            } catch (e) {}
        };

        const isDevToolsLikelyOpenBySize = () => (
            window.outerWidth - window.innerWidth > DEVTOOLS_SIZE_THRESHOLD ||
            window.outerHeight - window.innerHeight > DEVTOOLS_SIZE_THRESHOLD
        );

        const isDevToolsLikelyOpenByConsole = () => {
            let detected = false;
            const bait = new Image();
            try {
                Object.defineProperty(bait, 'id', {
                    get() {
                        detected = true;
                        return 'devtools-probe';
                    },
                    configurable: true,
                });
                console.debug(bait);
                console.clear?.();
            } catch (err) { /* ignore */ }
            return detected;
        };

        const isDevToolsLikelyOpenByDebugger = () => {
            try {
                const start = performance.now();
                // eslint-disable-next-line no-debugger
                debugger;
                return performance.now() - start > DEBUGGER_PAUSE_MS;
            } catch (err) {
                return false;
            }
        };

        const isDevToolsLikelyOpen = () => (
            isDevToolsLikelyOpenBySize() ||
            isDevToolsLikelyOpenByConsole()
        );

        const isBlockedDevToolsShortcut = (e) => {
            if (e.key === 'F12') return true;
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && e.shiftKey && ['i', 'j', 'c', 'k', 'u'].includes(key)) return true;
            if (e.ctrlKey && !e.shiftKey && (key === 'u' || key === 's')) return true;
            if (e.metaKey && e.altKey && ['i', 'j', 'c', 'u'].includes(key)) return true;
            if (e.metaKey && e.shiftKey && ['i', 'j', 'c', 'k'].includes(key)) return true;
            if (hasWinModifier(e) && e.altKey && key === 'i') return true;
            return false;
        };

        const isBlockedFullscreenEscapeShortcut = (e) => {
            if (e.key === 'F11') return true;
            const key = (e.key || '').toLowerCase();
            if (hasWinModifier(e) && key === 'enter') return true;
            return false;
        };

        const isBlockedTabSwitchShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.altKey && (key === 'tab' || e.keyCode === 9)) return true;
            if (e.ctrlKey && (key === 'tab' || key === 'pageup' || key === 'pagedown')) return true;
            if (e.ctrlKey && e.shiftKey && key === 'tab') return true;
            return false;
        };

        const isBlockedScreenshotShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            const code = e.code || '';
            if (e.key === 'PrintScreen' || e.keyCode === 44) return true;
            if (e.altKey && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (hasWinModifier(e) && (e.key === 'PrintScreen' || e.keyCode === 44)) return true;
            if (e.metaKey && e.shiftKey && ['3', '4', '5', 's'].includes(key)) return true;
            if (hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS')) return true;
            if (hasWinModifier(e) && e.shiftKey && code === 'KeyS') return true;
            if (hasWinModifier(e) && key === 'g') return true;
            if (hasWinModifier(e) && e.altKey && key === 'r') return true;
            return false;
        };

        const isBlockedPrintShortcut = (e) => {
            const key = (e.key || '').toLowerCase();
            if (e.ctrlKey && key === 'p') return true;
            if (e.metaKey && key === 'p') return true;
            return false;
        };

        const handleBlockedSecurityKey = (e, recordViolation) => {
            if (isBlockedTabSwitchShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedDevToolsShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('devtools');
                return true;
            }
            if (isBlockedFullscreenEscapeShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('blocked_shortcut');
                return true;
            }
            if (isBlockedPrintShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                recordViolation?.('print_attempt');
                return true;
            }
            if (isBlockedScreenshotShortcut(e)) {
                e.preventDefault();
                e.stopPropagation();
                clearClipboardBestEffort();
                const key = (e.key || '').toLowerCase();
                const code = e.code || '';
                const isSnip = hasWinModifier(e) && e.shiftKey && (key === 's' || code === 'KeyS');
                recordViolation?.(isSnip ? 'snipping_tool' : 'screenshot');
                return true;
            }
            return false;
        };

        const PORTAL_LOCKED_VIEWS = ['login', 'instructions', 'proctoring-setup', 'assessment', 'live-speech'];

            const size = prominent ? 64 : compact ? 52 : 88;

            const r = (size - stroke) / 2;
            const c = 2 * Math.PI * r;
            const total = totalSeconds && totalSeconds > 0 ? totalSeconds : seconds || 1;
            const pct = seconds != null ? Math.max(0, Math.min(1, seconds / total)) : 0;
            const offset = c * (1 - pct);
            const low = seconds != null && seconds < 30;
            const critical = seconds != null && seconds < 10;
            const progClass = critical ? 'timer-ring-progress critical' : low ? 'timer-ring-progress low' : 'timer-ring-progress';
            const mm = seconds != null ? `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2, '0')}` : '—';
            const wrapClass = prominent
                ? 'flex items-center gap-3 shrink-0 rounded-xl border border-violet-100 bg-white px-3.5 py-2.5 shadow-soft animate-scale-in'
                : compact
                ? 'flex items-center gap-2.5 shrink-0 rounded-lg border border-slate-200 bg-white px-3 py-2 shadow-sm'
                : 'flex items-center gap-4 panel rounded-xl px-5 py-3 shrink-0';
            const timeClass = prominent
                ? `font-mono text-xl font-bold tabular-nums ${critical ? 'text-red-600' : low ? 'text-amber-600' : 'text-slate-900'}`

                : `font-mono text-2xl font-bold tabular-nums tracking-tight ${critical ? 'text-red-600' : low ? 'text-amber-600' : 'text-slate-900'}`;
            return (
                <div className={wrapClass}>
                    <svg width={size} height={size} className="-rotate-90 shrink-0" aria-hidden="true">
                        <circle className="timer-ring-track" cx={size / 2} cy={size / 2} r={r} fill="none" strokeWidth={stroke} />
                        <circle
                            className={progClass}
                            cx={size / 2}
                            cy={size / 2}
                            r={r}
                            fill="none"
                            strokeWidth={stroke}
                            strokeLinecap="round"
                            strokeDasharray={c}
                            strokeDashoffset={offset}
                        />
                    </svg>
                    <div>
                        <p className="text-[10px] font-semibold uppercase tracking-widest text-slate-500">Time left</p>
                        <p className={timeClass}>{mm}</p>

        const ASSESSMENT_PHASE_DEFAULTS = { tech: 5, speech: 5 };

        const normalizeJobIdPortal = (value) => String(value || '').trim().toLowerCase();

        const parseInterviewHistoryLite = (raw) => {
            let history = raw || [];
            if (typeof history === 'string') {

            return Array.isArray(history) ? history : [];

        const isPhaseAnsweredPortal = (h) => {
            if (!h) return false;
            const a = h.answer_text;
            return a != null && String(a).trim() !== '';

        const isSessionStartedPortal = (history) =>
            parseInterviewHistoryLite(history).some(isPhaseAnsweredPortal);

        const isSessionFullyComplete = (session) => {
            if (!session) return false;
            const history = parseInterviewHistoryLite(session.interview_history);
            if (!history.some(isPhaseAnsweredPortal)) return false;
            let cfg = session.config || {};
            if (typeof cfg === 'string') {
                try { cfg = JSON.parse(cfg); } catch (_) { cfg = {}; }
            }
            const maxQ = Number(session.max_phases) || Number(cfg.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            const speechPhases = Number(cfg.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const totalPh = maxQ + speechPhases;
            const answered = history.filter(isPhaseAnsweredPortal).length;
            return answered >= totalPh;

            let cfg = session.config || {};

            if (status.includes('completed') || status.includes('terminated')) {

        const LoginView = ({ sessionId, setSessionId, setView, supabase, linkSessionReady }) => {

                setErrorMsg('');
                const sId = sessionId.trim();
                if (!sId) {

                    return;

                if (sId.length < 10) {

                    return;

                setLocalLoading(true);
                try {

                    let query = supabase.from('assessment_sessions').select('id, status, interview_history');

                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                                            </svg>
                                        </div>

        const InstructionsView = ({ onStart, sessionId, supabase }) => {

                if (!sessionId || !supabase) {

                (async () => {
                    try {
                        const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sessionId);
                        let query = supabase
                            .from('assessment_sessions')
                            .select('interview_history, max_phases, screening, config, assessment_stage, current_phase, status');
                        query = isUuid ? query.eq('id', sessionId) : query.eq('gmail_thread_id', sessionId);
                        const { data, error } = await query.maybeSingle();
                        if (!cancelled && !error && data) {
                            const block = getPortalSessionBlockReason(data);
                            if (block.blocked) {
                                if (isSessionStartedPortal(data.interview_history) && !isSessionFullyComplete(data)) {
                                    await markSessionAbandoned(supabase, data.id || sessionId);
                                }
                                setSessionBlockMsg(block.message);
                                return;
                            }
                            setSessionBlockMsg('');
                            setProgress(inspectSessionProgress(data));
                        }
                    } catch (e) {
                        console.warn('Could not load session progress for instructions:', e);

                        if (!cancelled) setProgressLoading(false);
                    }
                })();
                return () => { cancelled = true; };
            }, [sessionId, supabase]);

            const startButtonLabel = progressLoading
                ? 'Checking your progress…'

                    title: 'Timed & auto-saved',

                },
                {
                    title: 'No copy-paste',
                    body: 'Right-click, copy, paste, drag, and print are disabled. Type answers manually.',
                    icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />,
                },
                {
                    title: 'DevTools blocked',
                    body: 'F12, Inspect, and View Source are detected. Question content is hidden if DevTools opens.',
                    icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,

                                    </div>
                                    <div className="rounded-xl border-2 border-indigo-200 bg-gradient-to-br from-indigo-50 to-white p-4">
                                        <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-700 mb-1">Phase 2</p>
                                        <p className="text-base font-bold text-slate-900 leading-snug">Voice interview</p>
                                        <p className="text-xs text-slate-500 mt-1.5">{speechCount} questions · mic required · speak clearly</p>
                                    </div>

                                        <svg className="w-4 h-4 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 9l3 3m0 0l-3 3m3-3H8m13 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">You {isSpeechResume || isTechResume ? 'resume with' : 'start with'}</p>

                                            <div className="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-violet-50 border border-violet-100 text-violet-600">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">

                                                    {rule.title}

                                                <p className="text-[11px] text-slate-500 mt-1 leading-relaxed">{rule.body}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* Confirm + start */}
                            <footer className="guidelines-footer px-4 sm:px-6 xl:px-8 pb-5 sm:pb-6 xl:pb-8 pt-4 space-y-3">
                                {sessionBlockMsg ? (
                                    <div className="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 leading-relaxed flex items-start gap-2">
                                        <svg className="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" /></svg>

                                    {sessionBlockMsg
                                        ? 'Each assessment must be completed in one sitting. Contact your recruiter for assistance.'
                                        : 'Complete the assessment in one sitting — resuming later is not supported.'}
                                </p>

        const PROCTOR_STEPS = [
            { id: 'detect', label: 'Detect Screens' },
            { id: 'share', label: 'Share Screen' },
            { id: 'webcam', label: 'Share Webcam' },
            { id: 'start', label: 'Start Test' },
        ];

        const ProctorStepNav = ({ activeStep, detectDone, shareDone, shareTotal, webcamDone, startReady }) => {
            const statusFor = (id) => {
                if (id === 'detect') {
                    if (activeStep === 'detect') return 'active';
                    return detectDone ? 'done' : 'pending';
                }
                if (id === 'share') {
                    if (activeStep === 'share') return 'active';
                    return shareDone >= shareTotal && shareTotal > 0 ? 'done' : detectDone ? 'pending' : 'pending';
                }
                if (id === 'webcam') {
                    if (activeStep === 'webcam') return 'active';
                    return webcamDone ? 'done' : shareDone >= shareTotal && shareTotal > 0 ? 'pending' : 'pending';
                }
                if (id === 'start') {
                    if (activeStep === 'start') return startReady ? 'done' : 'active';
                    return startReady ? 'done' : 'pending';
                }
                return 'pending';
            };
            const badgeFor = (id, status, index) => {
                if (status === 'done') return '✓';
                if (status === 'active' && id === 'detect') return '!';
                return String(index + 1);
            };
            return (
                <nav className="proctor-step-nav" aria-label="Proctoring setup steps">
                    {PROCTOR_STEPS.map((step, i) => {
                        const status = statusFor(step.id);
                        return (
                            <div key={step.id} className={`proctor-step-item ${status}`}>
                                <span className="proctor-step-badge">{badgeFor(step.id, status, i)}</span>
                                <span>{step.label}</span>
                            </div>
                        );
                    })}
                </nav>
            );
        };

        const ProctoringMonitorStrip = ({ streams }) => {
            const webcamRef = React.useRef(null);
            const screenRefs = React.useRef([]);

            React.useEffect(() => {
                if (!window.TA_PROCTOR || !streams) return undefined;
                const cleanups = [];
                if (streams.webcam && webcamRef.current) {
                    cleanups.push(window.TA_PROCTOR.attachStream(webcamRef.current, streams.webcam));
                }
                (streams.screens || []).forEach((stream, i) => {
                    const el = screenRefs.current[i];
                    if (el && stream) cleanups.push(window.TA_PROCTOR.attachStream(el, stream));
                });
                return () => cleanups.forEach((fn) => { try { fn(); } catch (_) {} });
            }, [streams]);

            if (!streams || (!streams.webcam && !(streams.screens || []).length)) return null;

            return (
                <div className="proctor-monitor-strip" aria-label="Proctoring monitors">
                    {streams.webcam ? (
                        <div className="proctor-monitor-tile">
                            <video ref={webcamRef} muted playsInline autoPlay />
                            <span className="proctor-monitor-label">Webcam</span>
                        </div>
                    ) : null}
                    {(streams.screens || []).map((stream, i) => (
                        <div key={`screen-${i}`} className="proctor-monitor-tile">
                            <video
                                ref={(el) => { screenRefs.current[i] = el; }}
                                muted
                                playsInline
                                autoPlay
                            />
                            <span className="proctor-monitor-label">
                                Screen {i + 1}
                            </span>
                        </div>
                    ))}
                </div>
            );

            <div

                aria-modal="true"
                aria-label="Camera required"
            >
                <div className="panel max-w-md w-full rounded-2xl p-8 sm:p-10 text-center shadow-card border border-red-400/40 bg-white">

        const LiveSpeechView = ({

            const [maxTurns, setMaxTurns] = React.useState(context?.speech_phases || 5);
            const [cards, setCards] = React.useState([]);

            const [liveCaption, setLiveCaption] = React.useState('');
            const [liveQuestionCaption, setLiveQuestionCaption] = React.useState('');
            const [isInterviewerSpeaking, setIsInterviewerSpeaking] = React.useState(false);

            const [saveNotice, setSaveNotice] = React.useState('');

            const [followUpActive, setFollowUpActive] = React.useState(false);
