<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Talent Portal | Unified Assessment & Hiring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #08080a;
            color: #fff;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.6);
        }

        /* Security: Disable selection */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .instruction-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.05);
        }

        .floating {
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LoginView = ({ sessionId, setSessionId, setView }) => (
            <div className="min-h-screen flex items-center justify-center p-6 fade-in relative">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-600/10 blur-[120px] rounded-full floating"></div>
                <div className="glass max-w-lg w-full p-12 rounded-[2.5rem] relative z-10">
                    <div className="text-center mb-10">
                        <div className="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                            <svg className="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-3.04l.567-.567a2 2 0 012.828 0L14 22m0 0l-1-1m1 1l-1-1M14 22l1-1m1 1l-1-1m-7.5-3.5L12 11M12 11l7.5 3.5M12 11L4.5 14.5"></path></svg>
                        </div>
                        <h1 className="text-3xl font-bold mb-3 tracking-tight">System Login</h1>
                        <p className="text-gray-400">Please enter your <b>Secure Session ID</b> to begin.</p>
                    </div>
                    <form onSubmit={(e) => { e.preventDefault(); if (sessionId.length > 5) setView('instructions'); }} className="space-y-6">
                        <input required className="input-field w-full px-6 py-4 rounded-2xl outline-none text-lg font-medium" placeholder="Paste Session ID here..." value={sessionId} onChange={(e) => setSessionId(e.target.value)} />
                        <button className="btn-primary w-full py-5 rounded-2xl font-bold text-lg">Initialize Session</button>
                    </form>
                    <div className="mt-8 pt-6 border-t border-white/5 text-center">
                        <button onClick={() => setView('admin')} className="text-sm text-gray-500 hover:text-indigo-400 transition-colors underline">Recruiter? Post New Job</button>
                    </div>
                </div>
            </div>
        );

        const InstructionsView = ({ onStart }) => {
            const [agreed, setAgreed] = React.useState(false);
            return (
                <div className="min-h-screen flex items-center justify-center p-6 fade-in">
                    <div className="glass max-w-2xl w-full p-12 rounded-[3rem]">
                        <h2 className="text-3xl font-bold mb-6">Assessment Rules</h2>
                        <div className="space-y-3 mb-8">
                            {['Global 20-minute timer for all tasks.', 'No tab switching permitted.', 'Copy/Paste is disabled.', 'AI monitors all input streams.'].map((rule, i) => (
                                <div key={i} className="rule-item text-sm">✨ {rule}</div>
                            ))}
                        </div>
                        
                        <label className="flex items-center gap-4 mb-8 cursor-pointer group">
                            <input type="checkbox" className="w-6 h-6 rounded border-white/10 bg-white/5 accent-indigo-500" checked={agreed} onChange={(e) => setAgreed(e.target.checked)} />
                            <span className="text-gray-400 group-hover:text-white transition-colors text-sm">I have read and agree to follow the assessment rules.</span>
                        </label>

                        <button onClick={onStart} disabled={!agreed} className="btn-primary w-full py-5 rounded-2xl font-bold text-lg disabled:opacity-30 disabled:cursor-not-allowed">
                            Start Assessment
                        </button>
                    </div>
                </div>
            );
        };

        const AdminView = ({ setView }) => {
            const [jobTitle, setJobTitle] = useState('');
            const [jd, setJd] = useState('');
            const [isCreating, setIsCreating] = useState(false);
            const [generatedLink, setGeneratedLink] = useState('');

            const handleCreateJob = async (e) => {
                e.preventDefault();
                setIsCreating(true);
                try {
                    const response = await fetch('https://randy-gaunt-bradley.ngrok-free.dev/webhook/job-create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify({ title: jobTitle, description: jd })
                    });
                    const data = await response.json();
                    if (data.jobUrl) {
                        setGeneratedLink(data.jobUrl);
                    } else {
                        alert("Job Created! Use the portal link to invite candidates.");
                    }
                } catch (e) {
                    alert("Error creating job. Check n8n connection.");
                } finally {
                    setIsCreating(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 fade-in">
                    <div className="glass max-w-2xl w-full p-12 rounded-[3rem]">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-3xl font-bold gradient-text">Post New Vacancy</h2>
                            <button onClick={() => setView('login')} className="text-gray-500 hover:text-white">Back</button>
                        </div>

                        {!generatedLink ? (
                            <form onSubmit={handleCreateJob} className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Job Title</label>
                                    <input required className="input-field w-full px-6 py-4 rounded-2xl outline-none" placeholder="e.g. Senior Full Stack Developer" value={jobTitle} onChange={(e) => setJobTitle(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Job Description (JD)</label>
                                    <textarea required className="input-field w-full px-6 py-4 rounded-2xl outline-none h-48 resize-none" placeholder="Paste full JD here..." value={jd} onChange={(e) => setJd(e.target.value)} />
                                </div>
                                <button disabled={isCreating} className="btn-primary w-full py-5 rounded-2xl font-bold text-lg disabled:opacity-50">
                                    {isCreating ? 'Publishing...' : 'Publish Job & Generate Link'}
                                </button>
                            </form>
                        ) : (
                            <div className="text-center space-y-6">
                                <div className="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h3 className="text-2xl font-bold">Job Published Successfully!</h3>
                                <p className="text-gray-400 text-sm">Send this link to your candidates:</p>
                                <div className="bg-black/40 p-4 rounded-xl font-mono text-xs break-all border border-white/10 select-all">
                                    {generatedLink}
                                </div>
                                <button onClick={() => setGeneratedLink('')} className="text-indigo-400 font-bold">Create Another</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AssessmentView = ({ currentStep, timeLeft, question, answer, setAnswer, handleAssessmentSubmit, isLoading, sessionId }) => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 fade-in">
                <div className="max-w-5xl w-full flex justify-between items-end mb-10 px-4 text-left">
                    <div>
                        <span className="text-xs font-bold text-indigo-400 uppercase tracking-[0.2em] mb-3 block">Adaptive AI Assessment</span>
                        <h1 className="text-4xl font-bold">Phase <span className="gradient-text">{String(currentStep).padStart(2, '0')}</span> <span className="text-gray-500 font-light text-sm ml-2 uppercase tracking-widest bg-white/5 px-3 py-1 rounded-full border border-white/10">Dynamic</span></h1>
                    </div>
                    <div className={`glass px-8 py-4 rounded-3xl flex items-center gap-4 ${timeLeft < 30 ? 'text-red-400 border-red-500/30' : 'text-indigo-300'}`}>
                        <div className="text-right">
                            <p className="text-[10px] uppercase font-bold tracking-widest opacity-50 mb-1">Phase Time</p>
                            <p className="text-2xl font-mono font-bold leading-none">{Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}</p>
                        </div>
                    </div>
                </div>
                <div className="max-w-5xl w-full h-2 bg-white/5 rounded-full mb-12 overflow-hidden mx-4">
                    <div className="h-full btn-primary transition-all duration-700 ease-out" style={{ width: `${Math.min((currentStep / 10) * 100, 100)}%` }}></div>
                </div>
                <main className="max-w-5xl w-full glass rounded-[3rem] p-12 md:p-20 relative overflow-hidden text-left">
                    {isLoading && <div className="absolute inset-0 bg-black/40 backdrop-blur-md z-50 flex flex-col items-center justify-center"><div className="w-16 h-16 border-4 border-white/5 border-t-indigo-500 rounded-full animate-spin mb-6"></div><p className="text-lg font-medium tracking-wide">AI Analyzing Response & Scoring...</p></div>}
                    <div className="mb-12">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-[10px] font-bold uppercase tracking-widest mb-6"><span className="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>Technical Challenge</div>
                        <h3 className="text-3xl md:text-4xl font-semibold leading-tight text-gray-100 italic">"{question}"</h3>
                    </div>
                    <textarea className="input-field w-full px-8 py-8 rounded-[2rem] h-64 outline-none text-xl leading-relaxed mb-10 placeholder:text-gray-700 resize-none" placeholder="Detail your technical strategy and reasoning..." value={answer} onChange={(e) => setAnswer(e.target.value)}></textarea>
                    <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-6 glass-dark px-6 py-3 rounded-2xl">
                            <div><p className="text-[10px] uppercase font-bold text-gray-500 tracking-tighter mb-1">Session Token</p><p className="font-mono text-xs text-indigo-300 truncate w-32">{sessionId}</p></div>
                            <div className="w-px h-8 bg-white/10"></div>
                            <div><p className="text-[10px] uppercase font-bold text-gray-500 tracking-tighter mb-1">AI Detection</p><p className="text-xs font-bold text-green-500 uppercase tracking-tighter">Active</p></div>
                        </div>
                        <button onClick={handleAssessmentSubmit} disabled={answer.length < 5 || isLoading} className="btn-primary px-12 py-5 rounded-[1.5rem] font-bold text-xl flex items-center gap-4 disabled:opacity-30 disabled:grayscale">Submit Response <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></button>
                    </div>
                </main>
            </div>
        );

        const FinishedView = ({ result, feedback, onReview }) => (
            <div className="min-h-screen flex items-center justify-center p-6 fade-in">
                <div className="glass max-w-3xl w-full p-20 rounded-[4rem] text-center">
                    <div className={`w-24 h-24 ${result === 'PASS' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'} rounded-[2rem] flex items-center justify-center mx-auto mb-10 rotate-12`}>
                        {result === 'PASS' ? (
                            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7"></path></svg>
                        ) : (
                            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                        )}
                    </div>
                    <h1 className="text-5xl font-bold mb-6 tracking-tight">{result === 'PASS' ? 'Assessment Passed' : 'Assessment Completed'}</h1>
                    <p className="text-xl text-gray-400 mb-8 leading-relaxed">
                        {result === 'PASS'
                            ? "Great work! Your technical depth matches our requirements. Our talent team will contact you for the next steps."
                            : "Thank you for your time. Your assessment is complete and our team will review the results."}
                    </p>
                    
                    <div className="space-y-6">
                        {feedback && (
                            <div className="glass-dark p-6 rounded-2xl text-left border border-white/5 mb-8">
                                <p className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2">AI Feedback Summary</p>
                                <p className="text-gray-300 italic">"{feedback}"</p>
                            </div>
                        )}
                        
                        <button onClick={onReview} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-500/20 transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3">
                            <i className="fas fa-graduation-cap"></i> Review My Answers & Learn
                        </button>
                    </div>
                </div>
            </div>
        );

        const ReviewView = ({ history, onBack }) => (
            <div className="min-h-screen p-6 md:p-12 fade-in max-w-6xl mx-auto">
                <div className="flex items-center justify-between mb-12 sticky top-0 bg-[#050505]/80 backdrop-blur-md py-4 z-50">
                    <div>
                        <h2 className="text-4xl font-bold gradient-text">Learning & Review</h2>
                        <p className="text-gray-500 mt-2">See how you performed and read suggested improvements.</p>
                    </div>
                    <button onClick={onBack} className="glass px-6 py-3 rounded-xl hover:bg-white/5 transition-all">Back</button>
                </div>

                <div className="space-y-8">
                    {history.map((item, index) => (
                        <div key={index} className="glass rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden border-l-4 border-l-indigo-500">
                            <div className="flex items-center gap-4 mb-6">
                                <span className="bg-indigo-500/10 text-indigo-400 px-4 py-1.5 rounded-full text-xs font-bold">PHASE {item.phase}</span>
                            </div>
                            <h3 className="text-2xl font-semibold mb-8 text-gray-100">Q: {item.question_text}</h3>
                            
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-bold uppercase tracking-widest text-gray-500 flex items-center gap-2">
                                        <i className="fas fa-user text-indigo-400"></i> Your Response
                                    </h4>
                                    <div className="p-6 rounded-2xl bg-white/5 border border-white/5 text-gray-300 italic leading-relaxed">
                                        "{item.answer_text || 'No answer provided'}"
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <h4 className="text-[10px] font-bold uppercase tracking-widest text-emerald-400 flex items-center gap-2">
                                        <i className="fas fa-magic"></i> Suggested Better Answer
                                    </h4>
                                    <div className="p-6 rounded-2xl bg-emerald-500/5 border border-emerald-500/20 text-indigo-50 font-medium leading-relaxed">
                                        {item.suggested_answer || "Great answer! Our AI couldn't suggest any major improvements for this specific response."}
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
                
                <div className="text-center py-20">
                    <p className="text-gray-500 mb-6">This completes your learning review.</p>
                    <button onClick={() => window.location.reload()} className="btn-primary px-12 py-4 rounded-2xl font-bold">Exit Portal</button>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('login');
            const [sessionId, setSessionId] = useState('');
            const [candidateEmail, setCandidateEmail] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [currentStep, setCurrentStep] = useState(1);
            const [totalSteps, setTotalSteps] = useState(5);
            const [timeLeft, setTimeLeft] = useState(180);
            const [question, setQuestion] = useState("Loading your first technical challenge...");
            const [answer, setAnswer] = useState("");
            const [result, setResult] = useState(null);
            const [feedback, setFeedback] = useState("");
            const [tabSwitchCount, setTabSwitchCount] = useState(0);
            const [assessmentHistory, setAssessmentHistory] = useState([]);

            useEffect(() => {
                const preventActions = (e) => e.preventDefault();
                document.addEventListener('copy', preventActions);
                document.addEventListener('paste', preventActions);
                document.addEventListener('contextmenu', preventActions);
                return () => {
                    document.removeEventListener('copy', preventActions);
                    document.removeEventListener('paste', preventActions);
                    document.removeEventListener('contextmenu', preventActions);
                };
            }, []);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'hidden' && view === 'assessment') {
                        setTabSwitchCount(prev => prev + 1);
                        alert("⚠️ SECURITY WARNING: Tab switching is monitored. This incident has been logged.");
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [view]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const sId = params.get('session');
                const email = params.get('email');
                if (sId) {
                    setSessionId(sId);
                    setCandidateEmail(email || '');
                }
            }, []);

            const handleStartAssessment = async () => {
                setView('assessment');
                setIsLoading(true);
                try {
                    const response = await fetch('https://randy-gaunt-bradley.ngrok-free.dev/webhook/assessment-start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify({ sessionId, email: candidateEmail })
                    });
                    
                    let textData = await response.text();
                    let sanitizedText = textData.trim();
                    if (sanitizedText.startsWith('=')) sanitizedText = sanitizedText.substring(1).trim();

                    let data;
                    try { data = JSON.parse(sanitizedText); } catch (e) { data = { question: sanitizedText }; }
                    
                    let q = data.question || data.nextQuestion || data.output || data.text || sanitizedText;
                    if (typeof q === 'string' && q.trim().startsWith('{')) {
                        try { let parsed = JSON.parse(q); q = parsed.question || parsed.text || parsed.message || parsed.content || q; } catch(e) {}
                    }
                    if (typeof q === 'object') {
                        q = q.question || q.text || q.message || q.content || JSON.stringify(q);
                    }
                    if (typeof q === 'string') q = q.replace(/^"|"$/g, '').trim();

                    if (q) {
                        setQuestion(q);
                        setTimeLeft(180);
                    }
                } catch (e) {
                    console.error("Init Error", e);
                    setQuestion("Error loading challenge. Please refresh.");
                } finally {
                    setIsLoading(false);
                }
            };

            // Timer Logic
            useEffect(() => {
                if (view === 'assessment' && timeLeft > 0 && !isLoading) {
                    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (view === 'assessment' && timeLeft === 0) {
                    handleAssessmentSubmit();
                }
            }, [timeLeft, view, isLoading]);

            const handleAssessmentSubmit = async () => {
                if (!answer.trim()) return;
                setIsLoading(true);
                try {
                    const response = await fetch('https://randy-gaunt-bradley.ngrok-free.dev/webhook/assessment-answer', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify({
                            sessionId,
                            answer,
                            phase: currentStep,
                            email: candidateEmail,
                            tabSwitches: tabSwitchCount
                        })
                    });

                    let textData = await response.text();
                    let sanitizedText = textData.trim();
                    if (sanitizedText.startsWith('=')) sanitizedText = sanitizedText.substring(1).trim();

                    let data;
                    try { data = JSON.parse(sanitizedText); } catch (e) { data = { question: sanitizedText }; }

                    if (data.isFinal || data.result || currentStep >= totalSteps) {
                        setView('finished');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        setFeedback(data.feedback || "Assessment completed successfully.");
                    } else {
                        let nextQ = data.nextQuestion || data.question || data.output || "";
                        if (typeof nextQ === 'string' && nextQ.trim().startsWith('{')) {
                            try { let parsed = JSON.parse(nextQ); nextQ = parsed.question || parsed.text || parsed.message || parsed.content || nextQ; } catch(e) {}
                        }
                        if (typeof nextQ === 'object') {
                            nextQ = nextQ.question || nextQ.text || nextQ.message || nextQ.content || JSON.stringify(nextQ);
                        }
                        if (typeof nextQ === 'string') nextQ = nextQ.replace(/^"|"$/g, '').trim();

                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep(prev => prev + 1);
                            setTimeLeft(180);
                            setAnswer("");
                        }
                    }
                } catch (e) {
                    alert("Communication Error. Please retry.");
                } finally { setIsLoading(false); }
            };

            const fetchAndShowReview = async () => {
                setIsLoading(true);
                try {
                    // This assumes window.supabase is initialized correctly
                    const { data, error } = await window.supabase
                        .from('assessment_questions')
                        .select('*')
                        .eq('session_id', sessionId)
                        .order('phase', { ascending: true });

                    if (error) throw error;
                    setAssessmentHistory(data || []);
                    setView('review');
                } catch (e) {
                    alert("Error fetching assessment history. Make sure you are connected to the database.");
                } finally {
                    setIsLoading(false);
                }
            };

            const renderView = () => {
                switch (view) {
                    case 'login': return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} />;
                    case 'instructions': return <InstructionsView onStart={handleStartAssessment} />;
                    case 'assessment': return <AssessmentView currentStep={currentStep} totalSteps={totalSteps} timeLeft={timeLeft} question={question} answer={answer} setAnswer={setAnswer} handleAssessmentSubmit={handleAssessmentSubmit} isLoading={isLoading} sessionId={sessionId} />;
                    case 'finished': return <FinishedView result={result} feedback={feedback} onReview={fetchAndShowReview} />;
                    case 'review': return <ReviewView history={assessmentHistory} onBack={() => setView('finished')} />;
                    case 'admin': return <AdminView setView={setView} />;
                    default: return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} />;
                }
            };

            return (
                <div className="min-h-screen bg-[#050505] text-white font-sans selection:bg-indigo-500/30">
                    {renderView()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
