        const SpeechAssessmentView = ({
            speechIndex,
            speechTotal,
            absolutePhase,
            timeLeft,
            phaseTimeLimit,
            question,
            isLoading,
            candidateEmail,
            integrityViolationCount,
            contentMasked,
            onSubmitSpeech,
            onQuestionPlaybackComplete,
            timerReady,
        }) => {
            const transcriberRef = React.useRef(null);
            const speakRef = React.useRef(null);
            const transcriptRef = React.useRef('');
            const recordingPayloadRef = React.useRef(null);
            const timerStartedRef = React.useRef(false);
            const stoppingRef = React.useRef(false);
            const [isRecording, setIsRecording] = React.useState(false);
            const [isSpeaking, setIsSpeaking] = React.useState(false);
            const [isStopping, setIsStopping] = React.useState(false);
            const [isRefiningTranscript, setIsRefiningTranscript] = React.useState(false);
            const [typedQuestion, setTypedQuestion] = React.useState('');
            const [transcript, setTranscript] = React.useState('');
            const [recordError, setRecordError] = React.useState('');
            const [audioHint, setAudioHint] = React.useState('');
            const [micLevel, setMicLevel] = React.useState(0);
            const [recordingReady, setRecordingReady] = React.useState(false);
            const phases = Array.from({ length: speechTotal }, (_, i) => i + 1);
            const pct = speechTotal > 0 ? Math.min(100, (speechIndex / speechTotal) * 100) : 0;
            const wordCount = transcript.trim() ? transcript.trim().split(/\s+/).length : 0;
            const canSubmit = !contentMasked && !isLoading && !isRecording && !isStopping
                && wordCount >= 4 && recordingReady;

            const updateTranscript = React.useCallback((text) => {
                const clean = window.TA_SPEECH?.liveSanitize
                    ? window.TA_SPEECH.liveSanitize(text)
                    : String(text || '').replace(/\s+/g, ' ').trim();
                transcriptRef.current = clean;
                setTranscript(clean);
            }, []);

            const notifyPlaybackComplete = React.useCallback(() => {
                if (timerStartedRef.current) return;
                timerStartedRef.current = true;
                onQuestionPlaybackComplete?.();
            }, [onQuestionPlaybackComplete]);

            const startQuestionPlayback = React.useCallback(() => {
                if (!question || !window.TA_SPEECH) return;
                speakRef.current?.cancel?.();
                setTypedQuestion('');
                setIsSpeaking(true);
                if (window.TA_SPEECH.speakQuestionWithTypewriter) {
                    speakRef.current = window.TA_SPEECH.speakQuestionWithTypewriter(question, {
                        onUpdate: setTypedQuestion,
                        onEnd: () => {
                            setIsSpeaking(false);
                            notifyPlaybackComplete();
                        },
                    });
                } else {
                    window.TA_SPEECH.speakQuestion(question);
                    setTypedQuestion(question);
                    setIsSpeaking(false);
                    notifyPlaybackComplete();
                }
            }, [question, notifyPlaybackComplete]);

            React.useEffect(() => {
                transcriptRef.current = '';
                setTranscript('');
                setRecordError('');
                setAudioHint('');
                setMicLevel(0);
                setIsRecording(false);
                setIsStopping(false);
                setIsRefiningTranscript(false);
                recordingPayloadRef.current = null;
                setRecordingReady(false);
                timerStartedRef.current = false;
                if (transcriberRef.current) {
                    transcriberRef.current.cancel();
                    transcriberRef.current = null;
                }
            }, [absolutePhase, question]);

            React.useEffect(() => {
                if (!question || contentMasked || isLoading) return undefined;
                const t = setTimeout(() => startQuestionPlayback(), 400);
                return () => {
                    clearTimeout(t);
                    speakRef.current?.cancel?.();
                };
            }, [question, speechIndex, contentMasked, isLoading, startQuestionPlayback]);

            const startRecording = async () => {
                setRecordError('');
                setAudioHint('');
                if (!window.TA_SPEECH?.createLiveTranscriber) {
                    setRecordError('Speech module not loaded. Refresh the page.');
                    return;
                }
                try {
                    speakRef.current?.cancel?.();
                    setIsSpeaking(false);
                    setTypedQuestion(question);
                    await new Promise((resolve) => setTimeout(resolve, 350));
                    transcriptRef.current = '';
                    setTranscript('');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    transcriberRef.current?.cancel?.();
                    transcriberRef.current = window.TA_SPEECH.createLiveTranscriber({
                        onTranscript: updateTranscript,
                        onMicLevel: (level) => setMicLevel(Math.max(0, Math.min(1, Number(level) || 0))),
                        onFinalTranscript: (refined) => {
                            if (!refined) return;
                            updateTranscript(refined);
                            if (recordingPayloadRef.current?.blob) {
                                recordingPayloadRef.current = {
                                    ...recordingPayloadRef.current,
                                    text: refined,
                                };
                            }
                            setIsRefiningTranscript(false);
                        },
                        onStatus: (status) => {
                            if (status === 'recording') setRecordError('');
                        },
                    });
                    await transcriberRef.current.start();
                    setIsRecording(true);
                } catch (e) {
                    transcriberRef.current?.cancel?.();
                    transcriberRef.current = null;
                    setRecordError('Microphone access required for communication assessment.');
                }
            };

            const stopRecording = async () => {
                if (!isRecording || stoppingRef.current) return;
                stoppingRef.current = true;
                setIsRecording(false);
                setMicLevel(0);
                setIsStopping(true);
                try {
                    const session = transcriberRef.current;
                    let text = transcriptRef.current || transcript;
                    let blob = null;
                    let durationSeconds = 0;
                    let delivery = null;
                    if (session) {
                        const stopped = await session.stop();
                        text = stopped.text || text;
                        blob = stopped.blob;
                        durationSeconds = stopped.durationSeconds;
                        delivery = stopped.delivery;
                    }
                    transcriberRef.current = null;
                    if (window.TA_SPEECH?.sanitizeTranscript) {
                        text = window.TA_SPEECH.sanitizeTranscript(text);
                    }
                    updateTranscript(text);

                    const minBytes = Math.max(800, Math.floor((durationSeconds || 0) * 350));
                    if (!blob || blob.size < minBytes) {
                        setRecordError(
                            `Audio too short (${blob ? Math.round(blob.size / 1024) + ' KB' : '0 KB'} for ${Math.round(durationSeconds || 0)}s). Record a longer answer and try again.`
                        );
                        recordingPayloadRef.current = null;
                        setRecordingReady(false);
                        setIsRefiningTranscript(false);
                        return;
                    }
                    recordingPayloadRef.current = { text, blob, durationSeconds, delivery };
                    setRecordingReady(true);
                    setRecordError('');
                    setIsRefiningTranscript(true);
                } catch (e) {
                    console.error(e);
                    setRecordError('Could not process recording. Check microphone permissions.');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    setIsRefiningTranscript(false);
                } finally {
                    setIsStopping(false);
                    stoppingRef.current = false;
                }
            };

            const handleSubmit = async () => {
                const payload = recordingPayloadRef.current;
                if (!payload?.blob) {
                    setRecordError('Record your answer first, then submit.');
                    return;
                }
                try {
                    const submitResult = await onSubmitSpeech({
                        transcript: payload.text || transcript,
                        blob: payload.blob,
                        durationSeconds: payload.durationSeconds,
                        delivery: payload.delivery,
                    });
                    transcriptRef.current = '';
                    setTranscript('');
                    recordingPayloadRef.current = null;
                    setRecordingReady(false);
                    if (submitResult?.audioSaved) {
                        setAudioHint('Voice recording saved.');
                    } else if (submitResult?.audioError) {
                        setAudioHint('Answer submitted. Audio not saved: ' + submitResult.audioError);
                    }
                } catch (e) {
                    console.error(e);
                    setRecordError('Could not submit your answer. Please try again.');
                }
            };

            const showTimer = timerReady && phaseTimeLimit != null && timeLeft != null;

            return (
                <Shell subtitle={`Phase 2 · Voice interview · Question ${speechIndex} of ${speechTotal}`} fullWidth>
                    <div className="assessment-workspace fade-in assessment-lock">
                        <AssessmentSidebar
                            phases={phases}
                            currentStep={speechIndex}
                            totalSteps={speechTotal}
                            candidateEmail={candidateEmail}
                            integrityViolationCount={integrityViolationCount}
                            pct={pct}
                            sessionLabel="Phase 2 — voice communication questions"
                        />
                        <div className="assessment-main">
                            <div className="shrink-0 px-4 sm:px-5 lg:px-6 py-4 border-b border-surface-border/60">
                                <div className="speech-phase-header gap-4">
                                    <div className="min-w-0 flex-1">
                                        <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mb-1">Phase 2 · Voice</p>
                                        <h1 className="text-xl sm:text-2xl font-bold text-white tracking-tight leading-tight">
                                            Question {speechIndex}
                                        </h1>
                                        <p className="text-sm text-slate-500 mt-1">
                                            {isSpeaking
                                                ? 'Listen to the question — timer starts when playback finishes'
                                                : 'Record your spoken answer below, then submit'}
                                        </p>
                                    </div>
                                    {showTimer ? (
                                        <TimerRing seconds={timeLeft} totalSeconds={phaseTimeLimit} prominent />
                                    ) : isSpeaking ? (
                                        <div className="shrink-0 rounded-xl border border-indigo-500/30 bg-indigo-500/10 px-4 py-3 text-center">
                                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300">Playing question</p>
                                            <p className="text-xs text-slate-400 mt-1">Timer not started yet</p>
                                        </div>
                                    ) : null}
                                </div>
                            </div>

                            <div className="flex-1 min-h-0 overflow-y-auto px-4 sm:px-5 lg:px-6 py-4 flex flex-col">
                                {speechIndex === 1 ? (
                                    <div className="mb-4 rounded-xl border border-indigo-500/20 bg-indigo-500/5 px-4 py-3 sm:px-5 sm:py-4 shrink-0">
                                        <p className="text-sm text-indigo-100 font-medium">You are now in Phase 2 — voice communication interview</p>
                                        <p className="text-xs text-slate-400 mt-1 leading-relaxed">
                                            This is a speech-to-speech round. Take a moment to settle in a quiet space before recording.
                                        </p>
                                    </div>
                                ) : null}

                                <div className="speech-answer-panel flex-1 min-h-0 flex flex-col rounded-xl border border-surface-border bg-[#0f1419]/80 relative">
                                    {isLoading && (
                                        <div className="absolute inset-0 bg-surface/85 backdrop-blur-sm z-10 rounded-xl flex flex-col items-center justify-center gap-4">
                                            <div className="w-10 h-10 border-2 border-surface-border border-t-accent rounded-full animate-spin" />
                                            <p className="text-sm text-slate-400">Processing your response…</p>
                                        </div>
                                    )}

                                    <div className="shrink-0 px-5 sm:px-6 pt-5 pb-4 border-b border-surface-border/80">
                                        <div className="flex items-start justify-between gap-3 mb-3">
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Question</p>
                                            <button
                                                type="button"
                                                onClick={startQuestionPlayback}
                                                disabled={contentMasked || isLoading || isRecording}
                                                className="btn-secondary px-3 py-1.5 rounded-lg text-xs shrink-0"
                                            >
                                                {isSpeaking ? 'Playing…' : 'Replay question'}
                                            </button>
                                        </div>
                                        {contentMasked ? (
                                            <div className="rounded-lg border border-amber-500/30 bg-amber-500/10 px-5 py-8 text-center">
                                                <p className="text-base font-semibold text-amber-100 mb-2">Content protected</p>
                                                <p className="text-sm text-slate-400 leading-relaxed">
                                                    Return to fullscreen and close developer tools to continue.
                                                </p>
                                            </div>
                                        ) : (
                                            <div className="question-protected text-base sm:text-lg text-slate-100 leading-relaxed min-h-[3.5rem]">
                                                {typedQuestion || (isSpeaking ? '' : question)}
                                                {isSpeaking ? (
                                                    <span className="inline-block w-0.5 h-[1.1em] bg-accent ml-0.5 align-middle animate-pulse" aria-hidden="true" />
                                                ) : null}
                                            </div>
                            )}
                        </div>

                                    <div className="flex-1 flex flex-col min-h-0 px-4 sm:px-5 lg:px-6 py-4">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">
                                            Your spoken answer
                                        </label>
                                        <div
                                            className={`input-field speech-transcript-box w-full px-4 py-4 rounded-lg text-sm sm:text-base leading-relaxed ${
                                                isRecording ? 'border-accent/40 bg-accent/5' : ''
                                            }`}
                                        >
                                            <p className="text-slate-200 whitespace-pre-wrap break-words">
                                                {transcript || (isRecording
                                                    ? 'Listening… speak now — words appear here live.'
                                                    : isStopping
                                                        ? 'Saving recording…'
                                                        : 'Press Record, speak your answer, press Stop, then submit below.')}
                                                {isRecording ? (
                                                    <span className="inline-block w-0.5 h-[1em] bg-emerald-400 ml-0.5 align-middle animate-pulse" aria-hidden="true" />
                                                ) : null}
                                            </p>
                                        </div>

                                        {isRecording ? (
                                            <div className="mt-4 shrink-0">
                                                <div className="flex items-center justify-between text-xs text-slate-500 mb-2">
                                                    <span className="font-medium uppercase tracking-wide">Microphone level</span>
                                                    <span className={micLevel > 0.05 ? 'text-emerald-400' : 'text-amber-400'}>
                                                        {micLevel > 0.05 ? 'Receiving audio' : 'Speak now — waiting for voice'}
                                                    </span>
                                                </div>
                                                <div className="h-2.5 rounded-full bg-surface-border overflow-hidden">
                                                    <div
                                                        className="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 transition-[width] duration-75 ease-out"
                                                        style={{ width: `${Math.round(micLevel * 100)}%` }}
                                                    />
                                                </div>
                                            </div>
                                        ) : null}

                                        <div className="mt-4 speech-action-row shrink-0">
                                            {!isRecording ? (
                                                <button
                                                    type="button"
                                                    onClick={startRecording}
                                                    disabled={contentMasked || isLoading || isStopping || isSpeaking}
                                                    className="btn-primary px-6 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-40 w-full sm:w-auto"
                                                >
                                                    {isStopping ? 'Saving…' : 'Start recording'}
                        </button>
                                            ) : (
                                                <button
                                                    type="button"
                                                    onClick={stopRecording}
                                                    disabled={isStopping}
                                                    className="px-6 py-2.5 rounded-xl text-sm font-semibold bg-red-600 hover:bg-red-500 text-white w-full sm:w-auto"
                                                >
                                                    Stop recording
                                                </button>
                                            )}
                                            {isRecording ? (
                                                <span className="inline-flex items-center gap-2 text-xs text-red-300">
                                                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse" aria-hidden="true" />
                                                    Recording in progress
                                                </span>
                                            ) : null}
                                        </div>

                                        {recordError ? <p className="text-sm text-red-400 mt-3">{recordError}</p> : null}
                                        {!recordError && isRecording ? (
                                            <p className="text-xs text-slate-500 mt-2">Tip: use headphones so the mic does not pick up the question audio.</p>
                                        ) : null}
                                        {audioHint ? <p className="text-xs text-slate-500 mt-2">{audioHint}</p> : null}
                                    </div>

                                    <div className="shrink-0 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 px-5 sm:px-6 py-4 border-t border-surface-border bg-[#0c121a]/50 rounded-b-xl">
                                        <div>
                                            <p className="text-xs text-slate-500">
                                                {canSubmit
                                                    ? 'Ready to submit'
                                                    : isRecording
                                                        ? 'Stop recording when you finish speaking'
                                                        : isStopping
                                                            ? 'Saving your recording…'
                                                            : isRefiningTranscript
                                                                ? 'You can submit now — refining transcript in background'
                                                                : 'Record at least a few words before submitting'}
                                            </p>
                                            <p className="text-xs text-slate-600 mt-0.5 tabular-nums">{wordCount} words</p>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={handleSubmit}
                                            disabled={!canSubmit}
                                            className="btn-primary px-10 py-3.5 rounded-xl text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed w-full sm:w-auto"
                                        >
                                            Submit answer
                                        </button>
                                    </div>
                                </div>
                            </div>
                    </div>
                </div>
            </Shell>
        );
        };

        const cleanUrlParam = (value) => {
            if (!value) return '';
            return decodeURIComponent(String(value)).trim().split(/\n/)[0].split(/\s+regards/i)[0].trim();
        };

        const parseSessionConfig = (raw) => {
            if (!raw) return {};
            if (typeof raw === 'object') return raw;
            try { return JSON.parse(raw); } catch (e) { return {}; }
        };

        const isVoiceHistoryMode = (mode) => {
            const m = String(mode || '').toLowerCase();
            return m === 'speech' || m === 'live_speech' || m === 'live speech';
        };

        const resolveAssessmentMode = (data, phaseNum, phaseRow) => {
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            const speechPhases = Number(cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const stage = String(data?.assessment_stage || 'technical').toLowerCase();
            const isSpeech =
                stage === 'speech' ||
                Number(phaseNum) > maxQ ||
                isVoiceHistoryMode(phaseRow?.mode);
            return {
                mode: isSpeech ? 'speech' : 'text',
                techMaxSteps: maxQ,
                speechTotalSteps: speechPhases,
                totalSteps: isSpeech ? maxQ + speechPhases : maxQ,
            };
        };

        const speechPhasesFromResponse = (data) => {
            const cfg = parseSessionConfig(data?.config);
            return Number(data?.speech_phases || cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
        };

        const buildClientSpeechFallback = (cfg, speechIndex) => {
            const role = String(cfg?.requisition_title || 'this role').trim();
            const lanes = [
                'Describe a situation where you had to explain a complex technical topic to a non-technical stakeholder. How did you ensure they understood?',
                'Tell me about a time you faced pressure, a tight deadline, or conflict at work. How did you communicate and stay composed?',
                `Why are you interested in the ${role} role, and what would you focus on in your first 90 days?`,
                'Describe a time you had to collaborate with another team or stakeholder who disagreed with your approach. How did you handle it?',
                'Tell me about a mistake or setback you learned from. What did you change in how you communicate or work afterward?',
            ];
            const idx = Math.max(0, Math.min(lanes.length - 1, Number(speechIndex || 1) - 1));
            return lanes[idx];
        };

        const resolveQuestionForPhase = (row, phaseNum, data) => {
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            let q = String(row?.question_text || row?.question || '').trim();
            if (!q && Number(phaseNum) > maxQ) {
                q = buildClientSpeechFallback(cfg, Number(phaseNum) - maxQ);
            }
            if (!q && Number(phaseNum) === 1) {
                let screening = data?.screening;
                if (typeof screening === 'string') {
                    try { screening = JSON.parse(screening); } catch (e) { screening = {}; }
                }
                q = String(screening?.phase_1_question || cfg?.phase_1_question || '').trim();
            }
            return q;
        };

        const resolveResumeTarget = (history, data) => {
            if (!history?.length) return null;
            const idx = history.findIndex(isPhaseUnanswered);
            if (idx < 0) return null;
            const row = history[idx];
            const phaseNum = Number(row?.phase) || idx + 1;
            const questionText = resolveQuestionForPhase(row, phaseNum, data);
            return { phaseIndex: idx, phaseNum, row, questionText };
        };

        const inspectSessionProgress = (data) => {
            const history = buildHistoryFromSession(data);
            const cfg = parseSessionConfig(data?.config);
            const maxQ = Number(data?.max_phases) || Number(cfg?.max_questions) || ASSESSMENT_PHASE_DEFAULTS.tech;
            const speechPhases = Number(cfg?.speech_phases) || ASSESSMENT_PHASE_DEFAULTS.speech;
            const stage = String(data?.assessment_stage || 'technical').toLowerCase();
            const techAnswered = history.filter((h) => {
                const p = Number(h.phase);
                return p >= 1 && p <= maxQ && !isPhaseUnanswered(h);
            }).length;
            const resume = resolveResumeTarget(history, data);
            if (!resume) {
                return {
                    kind: 'completed',
                    techTotal: maxQ,
                    speechTotal: speechPhases,
                    techAnswered: Math.min(techAnswered, maxQ),
                };
            }
            const { phaseNum } = resume;
            if (phaseNum > maxQ || stage === 'speech' || stage === 'live_speech') {
                if (stage === 'live_speech') {
                    return {
                        kind: 'live_speech',
                        techTotal: maxQ,
                        speechTotal: speechPhases,
                        techAnswered: maxQ,
                        nextPhaseNum: phaseNum,
                        speechIndex: phaseNum - maxQ,
                    };
                }
                return {
                    kind: phaseNum === maxQ + 1 ? 'speech_intro' : 'speech',
                    techTotal: maxQ,
                    speechTotal: speechPhases,
                    techAnswered: maxQ,
                    nextPhaseNum: phaseNum,
                    speechIndex: phaseNum - maxQ,
                };
            }
            return {
                kind: 'technical',
                techTotal: maxQ,
                speechTotal: speechPhases,
                techAnswered,
                nextPhaseNum: phaseNum,
            };
        };

        const normalizeJobId = (value) => String(value || '').trim().toLowerCase();

        const sessionStatusBlocked = (status) => sessionStatusIsClosed(status);

        const pickSessionForJob = (rows, jobId) => pickActiveSessionForJob(rows, jobId);

        const isPhaseUnanswered = (h) => {
            if (!h) return false;
            const a = h.answer_text;
            return a === null || a === undefined || String(a).trim() === '';
        };

        const buildHistoryFromSession = (data) => {
            let history = parseInterviewHistory(data?.interview_history);
            if (history.length) return history;

            let screening = data?.screening;
            if (typeof screening === 'string') {
                try { screening = JSON.parse(screening); } catch (e) { screening = {}; }
            }
            const cfg = parseSessionConfig(data?.config);
            const q = String(
                screening?.phase_1_question ||
                cfg?.phase_1_question ||
                ''
            ).trim();
            if (!q) return [];

            const sec = Number(
                screening?.time_limit_seconds ||
                screening?.phase_1_time_limit_seconds ||
                cfg?.phase_1_time_limit_seconds ||
                240
            ) || 240;

            return [{
                phase: 1,
                question_text: q,
                answer_text: null,
                time_limit_seconds: sec,
                deadline_at: null,
            }];
        };

        const parseInterviewHistory = (raw) => {
            let history = raw || [];
            if (typeof history === 'string') {
                try { history = JSON.parse(history); } catch (e) { history = []; }
            }
            return Array.isArray(history) ? history : [];
        };

        const getAiTimeLimitSeconds = (phaseRow) => {
            const limit = Number(phaseRow?.time_limit_seconds);
            return Number.isFinite(limit) && limit > 0 ? limit : null;
        };

        const computeRemainingFromPhase = (phaseRow) => {
            if (!phaseRow) return null;
            if (phaseRow.deadline_at) {
                return Math.max(0, Math.floor((new Date(phaseRow.deadline_at).getTime() - Date.now()) / 1000));
            }
            return getAiTimeLimitSeconds(phaseRow);
        };

        const normalizeInterviewHistory = (raw) => {
            let history = raw || [];
            if (typeof history === 'string') {
                try { history = JSON.parse(history); } catch (e) { history = []; }
            }
            if (!Array.isArray(history)) return [];
            return history
                .map((item, index) => ({
                    phase: item.phase ?? index + 1,
                    mode: item.mode || '',
                    question_text: item.question_text || item.question || '—',
                    answer_text: item.answer_text ?? item.answer ?? '',
                    score: item.score != null ? item.score : '—',
                    feedback: (item.feedback && String(item.feedback).trim())
                        ? String(item.feedback).trim()
                        : '—',
                    suggested_answer: (item.suggested_answer && String(item.suggested_answer).trim())
                        ? String(item.suggested_answer).trim()
                        : (item.suggestedAnswer && String(item.suggestedAnswer).trim())
                            ? String(item.suggestedAnswer).trim()
                            : '—',
                    soft_skills: item.soft_skills && typeof item.soft_skills === 'object' ? item.soft_skills : null,
                    speech_metrics: item.speech_metrics && typeof item.speech_metrics === 'object' ? item.speech_metrics : null,
                    answer_audio_url: item.answer_audio_url || null,
                    scoring_source: item.scoring_source || '',
                    stt_source: item.stt_source || '',
                    complexity_tier: item.complexity_tier || null,
                }))
                .sort((a, b) => Number(a.phase) - Number(b.phase));
        };

        const isSpeechHistoryItem = (item, techMax = ASSESSMENT_PHASE_DEFAULTS.tech) => {
            if (!item) return false;
            if (isVoiceHistoryMode(item.mode)) return true;
            return Number(item.phase) > techMax;
        };

        const inferTechPhaseCount = (history) => {
            const voice = (history || []).filter(
                (h) => isVoiceHistoryMode(h.mode) || Number(h.phase) > ASSESSMENT_PHASE_DEFAULTS.tech
            );
            if (voice.length) return Math.min(...voice.map((h) => Number(h.phase))) - 1;
            return ASSESSMENT_PHASE_DEFAULTS.tech;
        };

        const inferTotalPhaseCount = (history, cfg) => {
            const techMax = inferTechPhaseCount(history);
            const speechMax = Number(cfg?.speech_phases ?? ASSESSMENT_PHASE_DEFAULTS.speech);
            return techMax + (speechMax > 0 ? speechMax : 0);
        };

        const avgSpeechSkill = (rows, key) => {
            const vals = (rows || [])
                .map((r) => Number(r.soft_skills?.[key]))
                .filter((n) => Number.isFinite(n));
            if (!vals.length) return null;
            return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
        };

        const SkillBar = ({ label, value }) => {
            const v = Number(value);
            const pct = Number.isFinite(v) ? Math.max(0, Math.min(100, v)) : 0;
            const barTone = pct >= 70 ? 'bg-emerald-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500';
            return (
                        <div>
                    <div className="flex justify-between text-xs mb-1.5">
                        <span className="text-slate-400">{label}</span>
                        <span className={`font-semibold tabular-nums ${scoreTone(v)}`}>
                            {Number.isFinite(v) ? v : '—'}
                        </span>
                        </div>
                    <div className="h-2 rounded-full bg-surface-border overflow-hidden">
                        <div className={`h-full ${barTone} rounded-full transition-all`} style={{ width: `${pct}%` }} />
                    </div>
                </div>
            );
        };

        const SpeechMetricsGrid = ({ metrics }) => {
            if (!metrics || typeof metrics !== 'object') return null;
            const items = [
                ['Speaking pace', metrics.words_per_minute != null ? `${metrics.words_per_minute} WPM` : null],
                ['Duration', metrics.duration_seconds != null ? `${metrics.duration_seconds}s` : null],
                ['Words spoken', metrics.word_count != null ? String(metrics.word_count) : null],
                ['Filler words', metrics.filler_word_count != null ? String(metrics.filler_word_count) : null],
                ['Long pauses', metrics.long_pause_count != null ? String(metrics.long_pause_count) : null],
                ['Avg pause', metrics.avg_pause_ms != null ? `${metrics.avg_pause_ms} ms` : null],
                ['Time to start', metrics.time_to_first_word_ms != null ? `${metrics.time_to_first_word_ms} ms` : null],
            ].filter(([, v]) => v != null && v !== '');
            if (!items.length) return null;
            return (
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                    {items.map(([label, val]) => (
                        <div key={label} className="rounded-lg border border-surface-border bg-surface-elevated/40 px-3 py-2.5">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">{label}</p>
                            <p className="text-sm font-semibold text-slate-200 tabular-nums mt-0.5">{val}</p>
                                </div>
                    ))}
                </div>
            );
        };

        const SpeechPhaseInsights = ({ item }) => {
            const skills = item.soft_skills;
            const hasSkills = skills && typeof skills === 'object' && Object.keys(skills).length > 0;
            const audioUrl = item.answer_audio_url;
            const meta = [item.scoring_source && `Scoring: ${item.scoring_source}`, item.stt_source && `Transcript: ${item.stt_source}`]
                .filter(Boolean)
                .join(' · ');
            if (!hasSkills && !item.speech_metrics && !audioUrl) return null;
            return (
                <div className="space-y-4">
                    {hasSkills ? (
                        <div className="rounded-xl border border-indigo-500/25 bg-indigo-500/5 p-4 sm:p-5 space-y-3">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300">Communication skills</p>
                            <SkillBar label="Clarity" value={skills.clarity} />
                            <SkillBar label="Confidence" value={skills.confidence} />
                            <SkillBar label="Professionalism" value={skills.professionalism} />
                            <SkillBar label="Relevance" value={skills.relevance} />
                        </div>
                    ) : null}
                    {item.speech_metrics ? (
                                    <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3">Delivery metrics</p>
                            <SpeechMetricsGrid metrics={item.speech_metrics} />
                                        </div>
                    ) : null}
                    {audioUrl ? (
                        <div className="rounded-xl border border-surface-border bg-surface-elevated/30 p-4">
                            <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-3">Voice recording</p>
                            <audio controls preload="metadata" className="w-full h-10" src={audioUrl}>
                                Your browser does not support audio playback.
                            </audio>
                            {meta ? <p className="text-xs text-slate-500 mt-2">{meta}</p> : null}
                                    </div>
                    ) : null}
                </div>
            );
        };

        const SpeechSummaryCard = ({ speechRows }) => {
            if (!speechRows?.length) return null;
            const avgScore = (() => {
                const vals = speechRows.map((r) => Number(r.score)).filter((n) => Number.isFinite(n));
                return vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
            })();
            const dims = [
                ['Clarity', avgSpeechSkill(speechRows, 'clarity')],
                ['Confidence', avgSpeechSkill(speechRows, 'confidence')],
                ['Professionalism', avgSpeechSkill(speechRows, 'professionalism')],
                ['Relevance', avgSpeechSkill(speechRows, 'relevance')],
            ].filter(([, v]) => v != null);
            return (
                <div className="panel rounded-2xl p-6 mb-8 border border-indigo-500/20 bg-indigo-500/5">
                    <div className="flex flex-wrap items-start justify-between gap-4 mb-5">
                                    <div>
                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-300 mb-1">Voice round summary</p>
                            <p className="text-sm text-slate-300">{speechRows.length} voice question{speechRows.length === 1 ? '' : 's'} completed</p>
                                        </div>
                        {avgScore != null ? (
                            <p className={`text-2xl font-bold tabular-nums ${scoreTone(avgScore)}`}>{avgScore}<span className="text-sm text-slate-500 font-medium">/100</span></p>
                        ) : null}
                                    </div>
                    {dims.length ? (
                        <div className="grid sm:grid-cols-2 gap-3">
                            {dims.map(([label, val]) => (
                                <SkillBar key={label} label={label} value={val} />
                            ))}
                        </div>
                    ) : null}
                </div>
            );
        };

        const PhaseReviewCard = ({ item, techMax, speechIndex, speechTotal, totalPhases }) => {
            const isSpeech = isSpeechHistoryItem(item, techMax);
            const phaseLabel = `Phase ${item.phase} of ${totalPhases}`;
            const voiceLabel = speechTotal > 0 ? `Voice Q${speechIndex} of ${speechTotal}` : `Voice Q${speechIndex}`;
            const hasAnswer = Boolean(String(item.answer_text || '').trim());
            return (
                <article className={`panel rounded-2xl p-6 sm:p-8 ${isSpeech ? 'border border-indigo-500/15' : ''}`}>
                    <div className="flex flex-wrap items-center justify-between gap-3 mb-5 pb-4 border-b border-surface-border">
                        <div className="flex flex-wrap items-center gap-2">
                            <span className={`badge ${isSpeech ? 'bg-indigo-500/15 text-indigo-200 border border-indigo-500/30' : 'badge-accent'}`}>
                                {phaseLabel}
                            </span>
                            {isSpeech ? (
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-500">
                                    {voiceLabel}
                                </span>
                            ) : null}
                        </div>
                        {item.score !== '—' && Number.isFinite(Number(item.score)) ? (
                            <div className="text-right">
                                <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Score</p>
                                <p className={`text-xl font-bold tabular-nums ${scoreTone(item.score)}`}>{item.score}<span className="text-sm text-slate-500 font-medium">/100</span></p>
                            </div>
                        ) : (
                            <span className="text-lg font-bold tabular-nums text-slate-500">—</span>
                        )}
                    </div>

                    let resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                    data = resolved.data;

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < totalSteps) {
                        const fromDb = await pollNextQuestionFromSession(sessionId, nextPhaseNum);
                        if (fromDb?.nextQuestion) {
                            data = { ...data, ...fromDb };
                            resolved = { data, nextQ: fromDb.nextQuestion };
                        }
                    }

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < totalSteps) {
                        await new Promise((r) => setTimeout(r, 2000));
                        data = await postAssessmentAnswer(payload);
                        resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                        data = resolved.data;
                    }

                    if (data.startSpeech || (data.assessment_mode === 'speech' && data.nextQuestion)) {
                        const speechPhases = speechPhasesFromResponse(data);
                        let nextQ = data.nextQuestion || extractNextQuestion(data);
                        let speechTimer = {
                            time_limit_seconds: data.time_limit_seconds,
                            deadline_at: data.deadline_at,
                        };
                        const speechPhaseNum = totalSteps + 1;
                        if (!nextQ && sessionId) {
                            const fromDb = await pollNextQuestionFromSession(sessionId, speechPhaseNum, 6, 1000);
                            if (fromDb?.nextQuestion) {
                                nextQ = fromDb.nextQuestion;
                                speechTimer = {
                                    time_limit_seconds: fromDb.time_limit_seconds,
                                    deadline_at: fromDb.deadline_at,
                                };
                            }
                        }
                        if (!nextQ) {
                            alert(
                                'The first voice question is still being prepared. Please wait a few seconds and submit your last answer once more.'
                            );
                            return;
                        }
                        setAssessmentMode('speech');
                        setTechMaxSteps(totalSteps);
                        setSpeechTotalSteps(speechPhases);
                        setTotalSteps(totalSteps + speechPhases);
                        setPendingSpeechIntro({
                            nextQuestion: nextQ,
                            speechPhases,
                            ...speechTimer,
                        });
                        setView('speech-intro');
                        return;
                    }

                    if (data.isFinal === true) {
                        setView('finished');
                        sessionStorage.removeItem('assessment_started');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback(data.feedback || 'Assessment completed.');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                        if (sessionId) sessionStorage.setItem('current_session_id', sessionId);
                        if (candidateEmail) sessionStorage.setItem('candidate_email', candidateEmail);
                    } else {
                        const nextQ = resolved?.nextQ || extractNextQuestion(data);

                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep((prev) => prev + 1);
                            setAnswer('');
                            applyTimerFromPhase({
                                time_limit_seconds: data.time_limit_seconds,
                                deadline_at: data.deadline_at,
                            });
                        } else {
                            alert(
                                'AI did not return the next question yet. Please click Submit once more — ' +
                                'your answer for this phase is already saved.'
                            );
                        }
                    }
                } catch (e) {
                    console.error('Submit Error:', e);
                    alert('Connection error. Please try submitting again.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleBeginSpeechFromIntro = async () => {
                if (isLoading) return;
                if (!window.TA_LIVE?.fetchLiveSpeechStart) {
                    alert('Live speech module not loaded. Refresh the page.');
                    return;
                }
                setIsLoading(true);
                try {
                    const ctx = await window.TA_LIVE.fetchLiveSpeechStart(
                        WEBHOOK_BASE,
                        sessionId,
                        candidateEmail
                    );
                    const relay = window.TA_LIVE.resolveRelayUrl(ctx, LIVE_SPEECH_RELAY_FALLBACK);
                    if (!relay) {
                        alert('live_relay_url is not set. Update n8n CFG or run relay locally on port 8080.');
                        return;
                    }
                    setLiveSpeechContext({
                        ...ctx,
                        session_id: ctx.session_id || sessionId,
                        candidate_email: ctx.candidate_email || candidateEmail,
                        live_relay_url: relay,
                    });
                    setAssessmentMode('live_speech');
                    setPendingSpeechIntro(null);
                    setView('live-speech');
                } catch (e) {
                    console.error('Live speech start error:', e);
                    alert(e?.message || 'Could not start live voice interview. Check n8n workflow is active.');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLiveSpeechFinished = async (data) => {
                let result = data?.result || '';
                let score = data?.score;
                let feedback = data?.feedback || 'Assessment completed.';

                // Prefer fresh DB values — relay UI may only have speech-only score before final PATCH.
                if (sessionId && supabase) {
                    try {
                        const { data: row } = await supabase
                            .from('assessment_sessions')
                            .select('result, score, speech_score, status, assessment_stage')
                            .eq('id', sessionId)
                            .single();
                        if (row) {
                            if (row.result) result = row.result;
                            if (row.score != null) score = Number(row.score);
                            if (row.status === 'completed' && !result && row.score != null) {
                                result = Number(row.score) >= 60 ? 'PASS' : 'FAIL';
                            }
                        }
                    } catch (e) {
                        console.warn('Could not refresh session after live speech:', e);
                    }
                }

                setView('finished');
                sessionStorage.removeItem('assessment_started');
                setResult(result || (Number(score) >= 60 ? 'PASS' : 'FAIL'));
                if (score != null) setOverallScore(Number(score));
                setFeedback(feedback);
                sessionStorage.removeItem('time_left');
                sessionStorage.removeItem('deadline_at');
                deadlineAtRef.current = null;
                setLiveSpeechContext(null);
                if (sessionId) sessionStorage.setItem('current_session_id', sessionId);
                if (candidateEmail) sessionStorage.setItem('candidate_email', candidateEmail);
            };

            const handleSpeechSubmit = async ({ transcript, blob, durationSeconds, delivery }) => {
                if (isLoading) return { audioSaved: false, audioError: 'busy' };
                setIsLoading(true);
                let audioSaved = false;
                let audioError = '';
                try {
                    const TA = window.TA_SPEECH;
                    const cleanTranscript = TA?.sanitizeTranscript
                        ? TA.sanitizeTranscript(transcript)
                        : String(transcript || '').trim();
                    const metrics = TA
                        ? TA.computeMetrics(cleanTranscript, durationSeconds, delivery)
                        : { duration_seconds: Math.round(durationSeconds || 0) };
                    const weakBrowser = TA?.isWeakTranscript?.(cleanTranscript) ?? !cleanTranscript;
                    let audioUrl = '';
                    if (TA && blob && supabase && sessionId) {
                        const upload = TA.uploadAudioWithTimeout
                            ? await TA.uploadAudioWithTimeout(supabase, sessionId, currentStep, blob, 20000)
                            : await TA.uploadAudio(supabase, sessionId, currentStep, blob);
                        audioUrl = upload?.url || '';
                        audioSaved = !!upload?.saved;
                        audioError = upload?.error || '';
                    } else if (blob && !supabase) {
                        audioError = 'storage_not_configured';
                    }
                    const payload = {
                        sessionId,
                        phase: currentStep,
                        email: candidateEmail,
                        answer: (!weakBrowser && cleanTranscript)
                            ? cleanTranscript
                            : (audioUrl ? '[Audio recorded]' : '[No speech detected]'),
                        assessment_mode: 'speech',
                        audio_url: audioUrl,
                        speech_metrics: metrics,
                        tabSwitches: integrityViolationCount,
                        integrityViolations: integrityViolationCount,
                    };
                    let data = await postAssessmentAnswer(payload);
                    const nextPhaseNum = currentStep + 1;
                    let resolved = await resolveNextQuestionPayload(data, sessionId, nextPhaseNum);
                    data = resolved.data;

                    if (!resolved.nextQ && data.isFinal !== true && currentStep < techMaxSteps + speechTotalSteps) {
                        const fromDb = await pollNextQuestionFromSession(sessionId, nextPhaseNum);
                        if (fromDb?.nextQuestion) {
                            data = { ...data, ...fromDb };
                            resolved = { data, nextQ: fromDb.nextQuestion };
                        }
                    }

                    if (data.isFinal === true) {
                        setView('finished');
                        sessionStorage.removeItem('assessment_started');
                        setResult(data.result || (data.score > 60 ? 'PASS' : 'FAIL'));
                        if (data.score != null) setOverallScore(Number(data.score));
                        setFeedback(data.feedback || 'Assessment completed.');
                        sessionStorage.removeItem('time_left');
                        sessionStorage.removeItem('deadline_at');
                        deadlineAtRef.current = null;
                    } else {
                        const nextQ = resolved?.nextQ || extractNextQuestion(data);
                        if (nextQ) {
                            setQuestion(nextQ);
                            setCurrentStep((prev) => prev + 1);
                            armSpeechPhaseTimer({
                                time_limit_seconds: data.time_limit_seconds,
                                deadline_at: data.deadline_at,
                            });
                        }
                    }
                } catch (e) {
                    console.error('Speech submit error:', e);
                    alert('Could not submit speech answer. Please try again.');
                    return { audioSaved: false, audioError: e.message || 'submit_failed' };
                } finally {
                    setIsLoading(false);
                }
                return { audioSaved, audioError };
            };

            useEffect(() => {
                if (view !== 'assessment' || isLoading) return;

                const tick = () => {
                    const deadline = deadlineAtRef.current || sessionStorage.getItem('deadline_at');
                    let remaining;
                    if (deadline) {
                        remaining = Math.max(0, Math.floor((new Date(deadline).getTime() - Date.now()) / 1000));
                    } else {
                        const stored = sessionStorage.getItem('time_left');
                        const parsed = stored != null ? parseInt(stored, 10) : NaN;
                        remaining = Number.isFinite(parsed) ? Math.max(0, parsed) : null;
                    }
                    setTimeLeft(remaining);
                    if (remaining != null) sessionStorage.setItem('time_left', String(remaining));
                };

                tick();
                const interval = setInterval(tick, 1000);
                return () => clearInterval(interval);
            }, [view, isLoading]);

            useEffect(() => {
                if (view === 'assessment' && timeLeft === 0 && !isLoading && deadlineAtRef.current) {
                    if (assessmentMode === 'speech') {
                        handleSpeechSubmit({
                            transcript: '[Timeout - No response provided]',
                            blob: null,
                            durationSeconds: 0,
                        });
                    } else {
                    handleAssessmentSubmit(true);
                }
                }
            }, [timeLeft, view, isLoading, assessmentMode]);

            const resolveSessionIdForReview = () => {
                const params = new URLSearchParams(window.location.search);
                const fromUrl = cleanUrlParam(params.get('session'));
                const fromStorage = cleanUrlParam(sessionStorage.getItem('current_session_id'));
                const fromState = cleanUrlParam(sessionId);
                return fromUrl || fromStorage || fromState;
            };

            const handleExitPortalAfterScheduling = useCallback(() => {
                sessionStorage.removeItem('current_session_id');
                sessionStorage.removeItem('candidate_email');
                sessionStorage.removeItem('time_left');
                sessionStorage.removeItem('deadline_at');
                sessionStorage.removeItem('assessment_started');
                deadlineAtRef.current = null;
                setSessionId('');
                setCandidateEmail('');
                setView('login');
                try {
                    const url = new URL(window.location.href);
                    url.searchParams.delete('session');
                    url.searchParams.delete('email');
                    url.searchParams.delete('job');
                    window.history.replaceState({}, '', url.pathname + url.search);
                } catch (_) { /* ignore */ }
            }, []);

            const fetchAndShowReview = async () => {
                const sid = resolveSessionIdForReview();
                if (!sid) {
                    alert('Session ID missing. Open the assessment link from your email again.');
                    return;
                }
                setIsLoading(true);
                try {
                    const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(sid);
                    let query = supabase
                        .from('assessment_sessions')
                        .select('id, interview_history, result, status, score, config');
                    if (isUuid) {
                        query = query.eq('id', sid);
                    } else {
                        query = query.eq('gmail_thread_id', sid);
                    }
                    const { data, error } = await query.maybeSingle();

                    if (error) throw error;
                    if (!data) {
                        alert('Session not found. Check the link or contact support.');
                        return;
                    }

                    const rows = normalizeInterviewHistory(data.interview_history);
                    if (rows.length === 0) {
                        alert('No interview history saved yet for this session.');
                        return;
                    }

                    setSessionId(data.id || sid);
                    sessionStorage.setItem('current_session_id', data.id || sid);
                    setSessionConfig(parseSessionConfig(data.config));
                    setAssessmentHistory(rows);
                    setFeedback(pickLatestFeedback(rows, feedback));
                    if (data.score != null) setOverallScore(Number(data.score));
                    if (data.result) setResult(data.result);
                    setView('review');
                } catch (e) {
                    console.error('Supabase Fetch Error:', e);
                    alert(`Could not load interview history: ${e.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const renderView = () => {
                switch (view) {
                    case 'login':
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} linkSessionReady={linkSessionReady} />;
                    case 'instructions':
                        return <InstructionsView onStart={handleStartAssessment} sessionId={sessionId} supabase={supabase} />;
                    case 'speech-intro':
                        return (
                            <SpeechIntroView
                                onBegin={handleBeginSpeechFromIntro}
                                techSteps={techMaxSteps}
                                speechSteps={speechTotalSteps}
                                isLoading={isLoading}
                            />
                        );
                    case 'live-speech':
                        if (!liveSpeechContext) {
                            return (
                                <Shell subtitle="Live speech">
                                    <div className="p-8 text-center text-slate-400">Loading live session…</div>
                                </Shell>
                            );
                        }
                        return (
                            <LiveSpeechView
                                context={liveSpeechContext}
                                relayFallback={LIVE_SPEECH_RELAY_FALLBACK}
                                tabSwitches={integrityViolationCount}
                                candidateEmail={candidateEmail}
                                integrityViolationCount={integrityViolationCount}
                                isLoading={isLoading}
                                onFinished={handleLiveSpeechFinished}
                                onError={(msg) => alert(msg || 'Live speech error')}
                            />
                        );
                    case 'assessment':
                        if (assessmentMode === 'speech') {
                            const speechIndex = currentStep - techMaxSteps;
                            return (
                                <SpeechAssessmentView
                                    speechIndex={speechIndex}
                                    speechTotal={speechTotalSteps}
                                    absolutePhase={currentStep}
                                    timeLeft={timeLeft}
                                    phaseTimeLimit={phaseTimeLimit}
                                    question={question}
                                    isLoading={isLoading}
                                    candidateEmail={candidateEmail}
                                    integrityViolationCount={integrityViolationCount}
                                    contentMasked={devToolsDetected || fullscreenRequired}
                                    onSubmitSpeech={handleSpeechSubmit}
                                    onQuestionPlaybackComplete={startSpeechPhaseTimer}
                                    timerReady={speechTimerReady}
                                />
                            );
                        }
                        return (
                            <AssessmentView
                                currentStep={currentStep}
                                totalSteps={totalSteps}
                                timeLeft={timeLeft}
                                phaseTimeLimit={phaseTimeLimit}
                                question={question}
                                answer={answer}
                                setAnswer={setAnswer}
                                handleAssessmentSubmit={handleAssessmentSubmit}
                                isLoading={isLoading}
                                candidateEmail={candidateEmail}
                                integrityViolationCount={integrityViolationCount}
                                contentMasked={devToolsDetected || fullscreenRequired}
                            />
                        );
                    case 'finished':
                        return <FinishedView result={result} overallScore={overallScore} feedback={feedback} onReview={fetchAndShowReview} isLoading={isLoading} sessionId={sessionId} supabase={supabase} onExitPortal={handleExitPortalAfterScheduling} />;
                    case 'review':
                        return (
                            <ReviewView
                                history={assessmentHistory}
                                overallFeedback={pickLatestFeedback(assessmentHistory, feedback)}
                                sessionConfig={sessionConfig}
                                onBack={() => setView('finished')}
                            />
                        );
                    case 'admin':
                        return <AdminView setView={setView} />;
                    default:
                        return <LoginView sessionId={sessionId} setSessionId={setSessionId} setView={setView} supabase={supabase} linkSessionReady={linkSessionReady} />;
                }
            };

            const hasUrlBootstrap = /[?&](session|email)=/i.test(window.location.search);

            return (
                <div className="min-h-screen w-full max-w-full app-bg text-slate-200 antialiased">
                    {urlEntryError && view === 'login' && (
                        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[60] max-w-md w-[calc(100%-2rem)] p-4 rounded-xl border border-red-500/40 bg-red-950/90 text-red-100 text-sm shadow-lg">
                            {urlEntryError}
                        </div>
                    )}
                    {isLoading && view === 'login' && hasUrlBootstrap && (
                        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#080b10]/88 backdrop-blur-sm px-6">
                            <div className="w-10 h-10 rounded-full border-2 border-indigo-400/30 border-t-indigo-400 animate-spin mb-4" aria-hidden="true" />
                            <p className="text-sm text-slate-300" data-bootstrap-wait>Loading your assessment portal…</p>
                        </div>
                    )}
                    {renderView()}
                    {fullscreenRequired && isPortalLockedView(view) && (
                        <FullscreenRequiredOverlay
                            onRestore={restorePortalFullscreen}
                            onSecurityKeyDown={handleSecurityKeyDown}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
