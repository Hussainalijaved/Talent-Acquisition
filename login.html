<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONVO — Talent Admin Login</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #063d78 0%, #0b5cab 45%, #f8fafc 45%);
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        }
        .login-brand { font-size: 28px; font-weight: 800; color: #0b5cab; letter-spacing: -0.04em; }
        .login-sub { color: #64748b; font-size: 14px; margin: 6px 0 28px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        .field input {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px;
            font-size: 15px; font-family: inherit;
        }
        .field input:focus { outline: none; border-color: #0b5cab; box-shadow: 0 0 0 3px rgba(11, 92, 171, 0.12); }
        .btn-login {
            width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
            background: linear-gradient(135deg, #0b5cab, #084a8f); color: #fff;
            font-size: 15px; font-weight: 700; font-family: inherit; margin-top: 8px;
        }
        .btn-login:disabled { opacity: 0.65; cursor: wait; }
        .msg { margin-top: 14px; font-size: 13px; padding: 10px 12px; border-radius: 8px; display: none; }
        .msg.show { display: block; }
        .msg.err { background: #fef2f2; color: #b91c1c; }
        .msg.ok { background: #ecfdf5; color: #047857; }
        .foot { margin-top: 22px; text-align: center; font-size: 13px; color: #64748b; }
        .foot a { color: #0b5cab; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">CONVO</div>
        <p class="login-sub">Talent Admin — sign in to continue</p>
        <form id="loginForm">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="username" required placeholder="you@company.com" />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
            </div>
            <button type="submit" class="btn-login" id="submitBtn">Sign in</button>
        </form>
        <div id="msg" class="msg"></div>
        <p class="foot">
            <a href="careers.html">← Careers portal</a>
            · <a href="setup-admin.html" id="setupLink" style="display:none">First-time setup</a>
        </p>
    </div>
    <script src="auth-config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || 'dashboard.html';
        const msg = document.getElementById('msg');

        function showMsg(text, type) {
            msg.textContent = text;
            msg.className = 'msg show ' + (type || '');
        }

        if (params.get('error') === 'inactive') {
            showMsg('Your account is inactive. Contact a super admin.', 'err');
        }

        (async function () {
            try {
                const session = await TAAuth.getSession();
                if (session) {
                    location.replace(redirect);
                    return;
                }
                if (await TAAuth.needsBootstrap()) {
                    document.getElementById('setupLink').style.display = 'inline';
                    showMsg('No super admin yet — use First-time setup.', 'ok');
                }
            } catch (e) {
                console.warn(e);
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            showMsg('', '');
            try {
                await TAAuth.signIn(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                await TAAuth.loadProfile();
                location.replace(redirect);
            } catch (err) {
                showMsg(err.message || 'Sign in failed', 'err');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
