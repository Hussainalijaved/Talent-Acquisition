<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONVO — Talent Admin Login</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="convo-body convo-auth-page">
    <div class="convo-auth-card">
        <div class="convo-auth-brand">CONVO</div>
        <p class="convo-auth-sub">Talent Admin — sign in to continue</p>
        <form id="loginForm">
            <div class="convo-auth-field">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="username" required placeholder="you@company.com" />
            </div>
            <div class="convo-auth-field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
            </div>
            <button type="submit" class="convo-auth-btn" id="submitBtn">Sign in</button>
        </form>
        <div id="msg" class="convo-auth-msg"></div>
        <p class="convo-auth-foot">
            <a href="careers.html">← Careers portal</a>
            · <a href="setup-admin.html" id="setupLink" style="display:none">First-time setup</a>
        </p>
    </div>
    <script src="auth-config.js"></script>
    <script src="admin-auth.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect') || 'dashboard.html';
        const msg = document.getElementById('msg');

        function showMsg(text, type) {
            msg.textContent = text;
            msg.className = 'convo-auth-msg show ' + (type || '');
        }

        if (params.get('error') === 'inactive') {
            showMsg('Your account is inactive. Contact a super admin.', 'err');
        }

        (async function () {
            try {
                const session = await TAAuth.getSession();
                if (session) {
                    location.replace(redirect);
                    return;
                }
                if (await TAAuth.needsBootstrap()) {
                    document.getElementById('setupLink').style.display = 'inline';
                    showMsg('No super admin yet — use First-time setup.', 'ok');
                }
            } catch (e) {
                console.warn(e);
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            showMsg('', '');
            try {
                await TAAuth.signIn(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                await TAAuth.loadProfile();
                location.replace(redirect);
            } catch (err) {
                let m = err.message || 'Sign in failed';
                if (/not confirmed/i.test(m)) {
                    m = 'Email not confirmed. Ask super admin to confirm your account in Supabase (auth.users → email_confirmed_at), or turn off Confirm email in Auth settings.';
                }
                showMsg(m, 'err');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
