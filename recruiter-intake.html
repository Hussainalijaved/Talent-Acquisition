<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Talent Admin…</title>
    <meta http-equiv="refresh" content="0;url=dashboard.html" />
    <script>
        (function () {
            var p = new URLSearchParams(location.search);
            var tab = p.get('tab') || 'intake';
            var map = { intake: 'screen', results: 'candidates', jobs: 'jobs' };
            var view = map[tab] || 'overview';
            var url = 'dashboard.html?view=' + encodeURIComponent(view);
            var wh = p.get('webhook');
            if (wh) url += '&webhook=' + encodeURIComponent(wh);
            location.replace(url);
        })();
    </script>
</head>
<body style="font-family:system-ui,sans-serif;padding:40px;text-align:center;color:#475569">
    <p>Recruiter portal is now part of <strong>Talent Admin</strong>.</p>
    <p><a href="dashboard.html">Open dashboard</a></p>
</body>
</html>
