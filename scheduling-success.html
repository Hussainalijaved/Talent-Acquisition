<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you — CONVO</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <link rel="stylesheet" href="portal-ui.css" />
    <link rel="stylesheet" href="ui-polish.css" />
</head>
<body class="convo-body convo-portal-page">
    <main class="convo-portal-main">
        <div class="convo-portal-card" style="text-align:center">
            <div class="convo-portal-icon success">✓</div>
            <h1 id="title">Thank you</h1>
            <p class="subtitle" id="message">Your response has been recorded.</p>
            <div class="convo-portal-detail" id="detailBox" hidden>
                <strong id="detailLabel">Details</strong>
                <span id="detailText"></span>
            </div>
            <p class="portal-footer">You can close this window. We will send a confirmation email shortly.</p>
        </div>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'user';
        const label = params.get('label') || '';
        const count = params.get('count') || '';

        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const detailBox = document.getElementById('detailBox');
        const detailText = document.getElementById('detailText');
        const detailLabel = document.getElementById('detailLabel');

        if (role === 'interviewer') {
            title.textContent = 'Options submitted';
            message.textContent = 'Thank you. The candidate will receive an email to choose one of your proposed times.';
            if (count) {
                detailBox.hidden = false;
                detailLabel.textContent = 'Slots offered';
                detailText.textContent = count + ' weekday option(s) sent.';
            }
        } else if (role === 'candidate') {
            title.textContent = 'Interview time confirmed';
            message.textContent = 'Thank you. Your selected time has been saved and calendar invites will follow.';
            if (label) {
                detailBox.hidden = false;
                detailLabel.textContent = 'Your selection';
                detailText.textContent = label;
            }
        }

        if (label && role === 'candidate') {
            detailBox.hidden = false;
            detailLabel.textContent = 'Your selection';
            detailText.textContent = label;
        }
    </script>
</body>
</html>
