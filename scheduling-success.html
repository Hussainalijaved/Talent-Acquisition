<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank you</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card: rgba(20, 28, 47, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: linear-gradient(135deg, #4f46e5, #6366f1);
            --green: linear-gradient(135deg, #059669, #10b981);
            --text: #fff;
            --muted: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: var(--green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
        }
        h1 { margin: 0 0 12px; font-size: 26px; font-weight: 800; }
        p { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0 0 12px; }
        .detail {
            margin: 20px 0;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border-left: 4px solid #10b981;
            text-align: left;
            font-size: 14px;
            color: #cbd5e1;
        }
        .detail strong { color: #fff; display: block; margin-bottom: 6px; }
        .footer { margin-top: 28px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✓</div>
        <h1 id="title">Thank you</h1>
        <p id="message">Your response has been recorded.</p>
        <div class="detail" id="detailBox" hidden>
            <strong id="detailLabel">Details</strong>
            <span id="detailText"></span>
        </div>
        <p class="footer">You can close this window. We will send a confirmation email shortly.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'user';
        const label = params.get('label') || '';
        const count = params.get('count') || '';

        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const detailBox = document.getElementById('detailBox');
        const detailText = document.getElementById('detailText');
        const detailLabel = document.getElementById('detailLabel');

        if (role === 'interviewer') {
            title.textContent = 'Options submitted';
            message.textContent = 'Thank you. The candidate will receive an email to choose one of your proposed times.';
            if (count) {
                detailBox.hidden = false;
                detailLabel.textContent = 'Slots offered';
                detailText.textContent = count + ' weekday option(s) sent.';
            }
        } else if (role === 'candidate') {
            title.textContent = 'Interview time confirmed';
            message.textContent = 'Thank you. Your selected time has been saved and calendar invites will follow.';
            if (label) {
                detailBox.hidden = false;
                detailLabel.textContent = 'Your selection';
                detailText.textContent = label;
            }
        }

        if (label && role === 'candidate') {
            detailBox.hidden = false;
            detailLabel.textContent = 'Your selection';
            detailText.textContent = label;
        }
    </script>
</body>
</html>
