<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview scheduling — CONVO</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <link rel="stylesheet" href="portal-ui.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scheduling-portal.js"></script>
</head>
<body class="convo-body convo-portal-layout">
    <nav class="convo-nav">
        <a href="careers.html" class="convo-nav-brand"><span class="convo-nav-logo">CONVO</span><span class="convo-nav-tag">Scheduling</span></a>
    </nav>
    <main class="convo-portal-main">
        <div class="convo-portal-card" style="text-align:center">
            <div class="portal-spinner" id="spinner"></div>
            <span class="portal-status-pill" id="statusPill">Checking…</span>
            <h1 id="title">Interview scheduling</h1>
            <p class="subtitle" id="message">Please wait while we prepare your interview time options.</p>
            <p class="load-err" id="err" hidden></p>
            <a class="convo-portal-btn" id="actionBtn" href="#" hidden style="display:inline-block;text-decoration:none">Pick interview time</a>
            <p class="portal-footer" id="hint">You can leave this page — we will also email you when slots are ready.</p>
        </div>
    </main>
    <script>
        const SP = window.SchedulingPortal;
        const sessionId = SP.parseSessionId();
        const POLL_MS = 8000;

        const spinner = document.getElementById('spinner');
        const statusPill = document.getElementById('statusPill');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const errEl = document.getElementById('err');
        const actionBtn = document.getElementById('actionBtn');
        const hint = document.getElementById('hint');

        function showError(msg) {
            spinner.hidden = true;
            errEl.hidden = false;
            errEl.textContent = msg;
            statusPill.textContent = 'Error';
        }

        function renderState(state) {
            if (state.status === 'confirmed') {
                spinner.hidden = true;
                statusPill.textContent = 'Confirmed';
                title.textContent = 'Interview time confirmed';
                message.textContent = 'Your slot is saved. Check your email for calendar details.';
                actionBtn.hidden = true;
                hint.textContent = 'You can close this window.';
                return true;
            }

            if (state.status === 'slots_ready') {
                spinner.hidden = true;
                statusPill.textContent = 'Ready';
                title.textContent = 'Choose your interview time';
                message.textContent =
                    state.slots.length +
                    ' option(s) are ready. Pick the time that works best for you.';
                actionBtn.hidden = false;
                actionBtn.href = SP.candidatePickUrl(sessionId);
                actionBtn.textContent = 'Pick interview time';
                hint.textContent = 'This page will also redirect automatically in a few seconds.';
                setTimeout(function () {
                    window.location.replace(SP.candidatePickUrl(sessionId));
                }, 4000);
                return true;
            }

            statusPill.textContent = 'Waiting';
            title.textContent = 'Almost there';
            message.textContent =
                'Your interviewer is being notified to propose interview slots. ' +
                'This usually takes a few minutes, but they may respond later tonight.';
            hint.textContent =
                'Keep this tab open, or come back later — we will also email you when slots are ready.';
            return false;
        }

        async function tick() {
            if (!sessionId) {
                showError('Missing session. Open the link from your assessment or email.');
                return;
            }
            try {
                const state = await SP.pollScheduling(sessionId);
                if (renderState(state)) return;
            } catch (err) {
                showError((err && err.message) || 'Could not load scheduling status.');
            }
        }

        if (!sessionId) {
            showError('Missing session in URL.');
        } else {
            tick();
            setInterval(tick, POLL_MS);
        }
    </script>
</body>
</html>
