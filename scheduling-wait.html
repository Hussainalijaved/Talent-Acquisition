<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview scheduling — CONVO</title>
    <link rel="stylesheet" href="convo-ui.css" />
    <link rel="stylesheet" href="portal-ui.css" />
    <link rel="stylesheet" href="ui-polish.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scheduling-portal.js"></script>
</head>
<body class="convo-body convo-portal-layout">
    <nav class="convo-nav">
        <a href="careers.html" class="convo-nav-brand"><span class="convo-nav-logo">CONVO</span><span class="convo-nav-tag">Scheduling</span></a>
    </nav>
    <main class="convo-portal-main">
        <div class="convo-portal-card" style="text-align:center">
            <div class="portal-spinner" id="spinner"></div>
            <span class="portal-status-pill" id="statusPill">Checking…</span>
            <h1 id="title">Interview scheduling</h1>
            <p class="subtitle" id="message">Please wait while we prepare your interview time options.</p>
            <p class="load-err" id="err" hidden></p>
            <div id="waitChoices" hidden>
                <button type="button" class="convo-portal-btn" id="keepWaitBtn">I&apos;ll keep waiting here</button>
                <button type="button" class="convo-portal-btn secondary" id="emailExitBtn">Email me when slots are ready</button>
                <p class="hint" style="margin-top:14px">You can close this page after choosing email — we will notify you when it is time to pick a slot.</p>
            </div>
            <a class="convo-portal-btn" id="actionBtn" href="#" hidden style="display:inline-block;text-decoration:none">Pick interview time</a>
            <button type="button" class="convo-portal-btn secondary" id="emailExitActiveBtn" hidden>Close — notify me by email</button>
            <p class="portal-footer" id="hint">You can leave this page — we will also email you when slots are ready.</p>
        </div>
    </main>
    <script>
        const SP = window.SchedulingPortal;
        const sessionId = SP.parseSessionId();
        const POLL_MS = 8000;

        const spinner = document.getElementById('spinner');
        const statusPill = document.getElementById('statusPill');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const errEl = document.getElementById('err');
        const actionBtn = document.getElementById('actionBtn');
        const hint = document.getElementById('hint');
        const waitChoices = document.getElementById('waitChoices');
        const keepWaitBtn = document.getElementById('keepWaitBtn');
        const emailExitBtn = document.getElementById('emailExitBtn');
        const emailExitActiveBtn = document.getElementById('emailExitActiveBtn');

        let waitMode = 'choose';
        let pollTimer = null;

        function exitToLogin() {
            if (pollTimer) clearInterval(pollTimer);
            try {
                sessionStorage.removeItem('current_session_id');
                sessionStorage.removeItem('candidate_email');
                sessionStorage.removeItem('assessment_started');
                sessionStorage.removeItem('time_left');
                sessionStorage.removeItem('deadline_at');
            } catch (_) { /* ignore */ }
            window.location.replace('index.html');
        }

        function showError(msg) {
            spinner.hidden = true;
            waitChoices.hidden = true;
            emailExitActiveBtn.hidden = true;
            errEl.hidden = false;
            errEl.textContent = msg;
            statusPill.textContent = 'Error';
        }

        function renderWaitingUi() {
            statusPill.textContent = 'Waiting';
            title.textContent = 'Almost there';
            actionBtn.hidden = true;
            errEl.hidden = true;

            if (waitMode === 'choose') {
                spinner.hidden = true;
                waitChoices.hidden = false;
                emailExitActiveBtn.hidden = true;
                message.textContent =
                    'Your interviewer is being notified to propose interview slots. ' +
                    'Choose whether to wait here or get an email when times are ready.';
                hint.textContent = '';
                return false;
            }

            waitChoices.hidden = true;
            spinner.hidden = false;
            emailExitActiveBtn.hidden = false;
            message.textContent =
                'Your interviewer may respond in a few minutes or later tonight. This page checks automatically.';
            hint.textContent = 'We will also email you when slots are ready.';
            return false;
        }

        function renderState(state) {
            if (state.status === 'confirmed') {
                spinner.hidden = true;
                waitChoices.hidden = true;
                emailExitActiveBtn.hidden = true;
                statusPill.textContent = 'Confirmed';
                title.textContent = 'Interview time confirmed';
                message.textContent = 'Your slot is saved. Check your email for calendar details.';
                actionBtn.hidden = true;
                hint.textContent = 'You can close this window.';
                return true;
            }

            if (state.status === 'slots_ready') {
                spinner.hidden = true;
                waitChoices.hidden = true;
                emailExitActiveBtn.hidden = true;
                statusPill.textContent = 'Ready';
                title.textContent = 'Choose your interview time';
                message.textContent =
                    state.slots.length +
                    ' option(s) are ready. Pick the time that works best for you.';
                actionBtn.hidden = false;
                actionBtn.href = SP.candidatePickUrl(sessionId);
                actionBtn.textContent = 'Pick interview time';
                hint.textContent = 'This page will also redirect automatically in a few seconds.';
                setTimeout(function () {
                    window.location.replace(SP.candidatePickUrl(sessionId));
                }, 4000);
                return true;
            }

            return renderWaitingUi();
        }

        async function tick() {
            if (!sessionId) {
                showError('Missing session. Open the link from your assessment or email.');
                return;
            }
            try {
                const state = await SP.pollScheduling(sessionId);
                if (renderState(state)) {
                    if (pollTimer) clearInterval(pollTimer);
                    return;
                }
            } catch (err) {
                showError((err && err.message) || 'Could not load scheduling status.');
            }
        }

        keepWaitBtn.addEventListener('click', function () {
            waitMode = 'active';
            renderWaitingUi();
        });

        emailExitBtn.addEventListener('click', exitToLogin);
        emailExitActiveBtn.addEventListener('click', exitToLogin);

        if (!sessionId) {
            showError('Missing session in URL.');
        } else {
            tick();
            pollTimer = setInterval(tick, POLL_MS);
        }
    </script>
</body>
</html>
