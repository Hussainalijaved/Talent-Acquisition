<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live speech flow harness</title>
  <script src="/live-speech.js"></script>
</head>
<body>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const relayUrl = params.get('relay') || 'ws://127.0.0.1:8792';
  const TOTAL_Q = 5;
  const result = {
    sessionStarts: 0,
    flushIgnoredWithQueuedAudio: false,
    awaitingByQ: {},      // qNum -> true
    micOpenByQ: {},       // qNum -> true
    answeredByQ: {},      // qNum -> true (relay confirmed)
    interviewComplete: false,
    micCheckOpened: false,
    introOpened: false,
    errors: [],
  };

  let lastAwaitingNumber = null;

  try {
    if (!window.TA_LIVE?.LiveSpeechSession) throw new Error('TA_LIVE.LiveSpeechSession missing');

    const session = new window.TA_LIVE.LiveSpeechSession({
      relayUrl,
      context: { session_id: 'flow-test', speech_phases: TOTAL_Q, speech_answer_seconds: 120 },
      tabSwitches: 0,
      onStatus: () => {},
      onTranscript: () => {},
      onLevel: () => {},
      onTurn: () => {},
      onQuestion: () => {},
      onAnswer: ({ number, warmup }) => {
        if (warmup == null && number >= 1) result.answeredByQ[number] = true;
      },
      onAwaitingAnswer: ({ number }) => {
        lastAwaitingNumber = number;
        if (number === -1) { /* mic check */ }
        else if (number === 0) { /* intro */ }
        else if (number >= 1) result.awaitingByQ[number] = true;
      },
      onMicOpen: () => {
        const q = lastAwaitingNumber;
        if (q === -1) result.micCheckOpened = true;
        else if (q === 0) result.introOpened = true;
        else if (q >= 1) result.micOpenByQ[q] = true;
        // Simulate the candidate giving a short spoken answer then submitting.
        setTimeout(() => {
          try { session.submitAnswer?.(); } catch (_) {}
        }, 200);
      },
      onNextQuestionReady: () => {},
      onInterviewComplete: () => { result.interviewComplete = true; },
      onComplete: () => {},
      onError: (err) => result.errors.push(err?.message || String(err)),
    });

    result.sessionStarts += 1;
    await Promise.race([
      session.start(),
      new Promise((_, reject) => setTimeout(() => reject(new Error('session.start timeout')), 15000)),
    ]);

    // Stale flush must NOT drop already-queued interviewer audio.
    const tinyPcm = btoa(String.fromCharCode(0, 0, 0, 0));
    session.playQueue.push({ b64: tinyPcm, rate: 24000 });
    session.playQueue.push({ b64: tinyPcm, rate: 24000 });
    const queuedBeforeFlush = session.playQueue.length;
    session.handleMessage(JSON.stringify({ type: 'flush_playback' }));
    result.flushIgnoredWithQueuedAudio = queuedBeforeFlush > 0 && session.playQueue.length === queuedBeforeFlush;
    session.clearPlayback();

    // Drive until interview complete (allow a grace window after the last answer).
    const deadline = Date.now() + 45000;
    while (Date.now() < deadline) {
      if (result.interviewComplete) break;
      await new Promise((r) => setTimeout(r, 100));
    }

    session.cancel?.();
  } catch (e) {
    result.errors.push(e?.message || String(e));
  } finally {
    window.__flowTestResult = result;
    window.__flowTestDone = true;
  }
})();
</script>
</body>
</html>
